# Species
- type: loadoutEffectGroup
  id: NitrogenBreather
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - SlimePerson
    - Vox
    - Cyclorite #🌟Starlight🌟

- type: loadoutEffectGroup
  id: OxygenBreather
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - Arachnid
    - Diona
    - Dwarf
    - Human
    - Moth
    - Reptilian
    - Vulpkanin # Starlight
    - Felionoid #🌟Starlight🌟
    - Resomi #🌟Starlight🌟
    - Avali #🌟Starlight🌟
    - Thaven # Starlight
    - Protogen # Far Horizons
    - ProtoArachnid # Far Horizons
    - ProtoAvali # Far Horizons
    - ProtoCyclops # Far Horizons
    - ProtoDawi # Far Horizons
    - ProtoDionae # Far Horizons
    - ProtoFeline # Far Horizons
    - ProtoHumie # Far Horizons
    - ProtoMoth # Far Horizons
    - ProtoReptile # Far Horizons
    - ProtoResomi # Far Horizons
    - ProtoSlimePerson # Far Horizons
    - ProtoThaven # Far Horizons
    - ProtoVox # Far Horizons
    - ProtoVulp # Far Horizons

- type: loadoutEffectGroup
  id: EffectSpeciesVox
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - Vox

- type: loadoutEffectGroup #🌟Starlight🌟
  id: NonBreather
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - Shadekin
    - ProtoKin # Far Horizons

# Basic
- type: loadout
  id: EmergencyOxygen
  effects:
  - !type:GroupLoadoutEffect
    proto: OxygenBreather
  storage:
    back:
    - BoxSurvival

- type: loadout
  id: EmergencyNitrogen
  effects:
  - !type:GroupLoadoutEffect
    proto: NitrogenBreather
  storage:
    back:
    - BoxSurvivalNitrogen

