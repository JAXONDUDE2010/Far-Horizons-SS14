# Armory - Gun Base
- type: entity
  abstract: true
  id: ShelfArmoryBase
  parent: ShelfBaseReinforced
  name: armory weapon rack
  description: Stores guns, but with STYLE!
  components:
  - type: Sprite
    sprite: Structures/Storage/closet.rsi
    noRot: true
    layers:
    - state: shotguncase
      map: ["enum.StorageVisualLayers.Base"]
    - state: shotguncase_door
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: paper
      visible: false
      sprite: Structures/Storage/closet_labels.rsi
      offset: "-0.065,0"
      map: ["enum.PaperLabelVisuals.Layer"]
    - state: panel_open
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
      visible: false
    - state: electrified_ai
      sprite: Interface/Misc/ai_hud.rsi
      shader: unshaded
      visible: false
      map: ["enum.ElectrifiedLayers.HUD"]
    - state: electrified
      sprite: Effects/electricity.rsi
      shader: unshaded
      visible: false
      map: ["enum.ElectrifiedLayers.Sparks"]
#    sprite: _Afterlight/Structures/Storage/closet-large.rsi
#    layers:
#    - state: lectercase
#      map: ["enum.StorageVisualLayers.Base"]
#    - state: unlocked
#      shader: unshaded
#    - state: lecter-0
#    - map: ["enum.StorageFillLayers.Fill"]
#    - state: closed
#      map: ["enum.StorageVisualLayers.Door"]
#    - state: locked
#      map: ["enum.LockVisualLayers.Lock"]
#      shader: unshaded
#  - type: StorageFillVisualizer
#    maxFillLevels: 5
#    fillBaseName: lecter
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: AccessReader
    access: [["Armory"]]
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,3,2 #Long 1
    - 5,0,8,2 #Long 2
    - 10,0,13,2 #Long 3
    - 15,0,18,2 #Long 4
    - 0,4,3,4 #Pistol 1&2
    - 0,5,0,5 #Pistol Bottom 1
    - 2,5,2,5 #Pistol Bottom 2
    - 5,4,8,4 #Pistol 3&4
    - 5,5,5,5 #Pistol Bottom 3
    - 7,5,7,5 #Pistol Bottom 4
    - 10,4,13,9 #Ammo 1
    - 15,4,18,9 #Ammo 2

