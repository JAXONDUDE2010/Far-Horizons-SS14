#Glass

- type: constructionGraph
  id: GlassRailing
  start: start
  graph:
    - node: start
      edges:
        - to: glassrailing
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Glass
              amount: 1
              doAfter: 2
        - to: glassrailingCorner
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Glass
              amount: 2
              doAfter: 2.5
        - to: glassrailingCornerSmall
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Glass
              amount: 1
              doAfter: 2
        - to: glassrailingRound
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Glass
              amount: 2
              doAfter: 2

    - node: glassrailing
      entity: GlassRailing
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetGlass1
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.25

    - node: glassrailingCorner
      entity: GlassRailingCorner
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetGlass1
              amount: 2
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.5

    - node: glassrailingCornerSmall
      entity: GlassRailingCornerSmall
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetGlass1
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.25

    - node: glassrailingRound
      entity: GlassRailingRound
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetGlass1
              amount: 2
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.5

