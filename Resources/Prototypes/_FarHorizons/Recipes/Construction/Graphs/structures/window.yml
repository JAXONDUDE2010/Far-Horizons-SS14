- type: constructionGraph
  id: WindowSyndie
  start: start
  graph:
    - node: start
      edges:
        - to: windowsyndie
          steps:
            - material: Glass
              amount: 2
              doAfter: 3

        - to: reinforcedWindowSyndie
          steps:
            - material: ReinforcedGlass
              amount: 2
              doAfter: 2

    - node: windowsyndie
      entity: WindowSyndie
      edges:
        - to: start
          completed:
            - !type:GivePrototype
              prototype: SheetGlass1
              amount: 2
            - !type:DeleteEntity {}
          steps:
            - tool: Screwing
              doAfter: 1
            - tool: Anchoring
              doAfter: 2

    - node: reinforcedWindowSyndie
      entity: ReinforcedWindowSyndie
      edges:
        - to: start
          completed:
            - !type:GivePrototype
              prototype: SheetRGlass1
              amount: 2
            - !type:DeleteEntity {}
          steps:
            - tool: Welding
              doAfter: 5
            - tool: Screwing
              doAfter: 1
            - tool: Prying
              doAfter: 2
            - tool: Welding
              doAfter: 5
            - tool: Screwing
              doAfter: 1
            - tool: Anchoring
              doAfter: 2