- type: constructionGraph
  id: FHAirlock
  start: start
  graph:
    - node: start
      edges:
        - to: assembly
          completed:
            - !type:SetAnchor
              value: false
          steps:
            - material: Steel
              amount: 4
              doAfter: 2

    - node: assembly
      entity: FHAirlockAssembly
      actions:
        - !type:SnapToGrid {}
        - !type:SetAnchor {}
      edges:
        - to: wired
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: Cable
              amount: 5
              doAfter: 2.5
        - to: start
          conditions:
            - !type:EntityAnchored
              anchored: false
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 4
            - !type:DeleteEntity {}
          steps:
            - tool: Welding
              doAfter: 3

    - node: wired
      entity: FHAirlockAssembly
      edges:
        - to: electronics
          conditions:
            - !type:EntityAnchored {}
          steps:
            - component: DoorElectronics
              store: board
              name: construction-graph-component-door-electronics-circuit-board
              icon:
                sprite: "Objects/Misc/module.rsi"
                state: "door_electronics"
              doAfter: 3
        - to: assembly
          completed:
            - !type:SpawnPrototype
              prototype: CableApcStack1
              amount: 5
          steps:
            - tool: Cutting
              doAfter: 2.5

    - node: electronics
      edges:
        - to: airlock
          conditions:
            - !type:EntityAnchored {}
          steps:
            - tool: Screwing
              doAfter: 2.5
        - to: wired
          conditions:
            - !type:EntityAnchored {}
          completed:
            - !type:EmptyAllContainers
              pickup: true
              emptyAtUser: true
          steps:
            - tool: Prying
              doAfter: 5

    ## Standard FarHorizons airlock
    - node: airlock
      entity: FHAirlock
      doNotReplaceInheritingEntities: true
      actions:
        - !type:SetWiresPanelSecurity
          wiresAccessible: true
      edges:
        - to: wired
          conditions:
            - !type:EntityAnchored {}
            - !type:DoorWelded {}
            - !type:DoorBolted
              value: false
            - !type:WirePanel {}
            - !type:AllWiresCut
          completed:
            - !type:EmptyAllContainers
              pickup: true
              emptyAtUser: true
          steps:
            - tool: Prying
              doAfter: 5
