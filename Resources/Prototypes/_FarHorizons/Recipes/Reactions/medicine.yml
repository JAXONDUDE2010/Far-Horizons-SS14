# Restored wizden content
- type: reagent
  id: Necrosol
  name: reagent-name-necrosol
  group: Medicine
  desc: reagent-desc-necrosol
  physicalDesc: reagent-physical-desc-necrotic
  flavor: medicine
  color: "#86a5bd"
  worksOnTheDead: true
  plantMetabolism:
  - !type:PlantAdjustToxins
    amount: -5
  - !type:PlantAdjustHealth
    amount: 5
  - !type:PlantCryoxadone {}
  metabolisms:
    Bloodstream:
      effects:
        - !type:EvenHealthChange
          conditions:
          - !type:TemperatureCondition
            max: 213.0
          damage:
            Brute: -2
            Burn: -2
        - !type:HealthChange
          conditions:
          - !type:TemperatureCondition
            max: 213.0
          damage:
            types:
              Poison: -2