- type: shader
  id: GlitchingEffect
  kind: source
  path: "/Textures/_FarHorizons/Shaders/glitching_effect.swsl"
  params:
    sortPower: 0.03
    threshold: 0.005
    maxSteps: 30
    waveFrequency: 5.0
    waveSpeed: 4.0
    waveAmplitude: 0.001
    vignettePower: 1.3
    vignetteFalloff: 1.5

- type: shader
  id: LimbTargetting
  kind: source
  path: "/Textures/_FarHorizons/Shaders/limb_targetting.swsl"
  params:
    width: 0.75
    outerColor: 0, 1, 0
    innerFill: false
    innerColor: 0, 1, 0
    lineSpeed: 5
    lineFreq: 40000
    colorFactor: 0.5

- type: shader
  id: HeatDistortionFH # stuck the "FH" on the end in case upstream decides to make a HeatDistortion shader
  kind: source
  path: "/Textures/_FarHorizons/Shaders/heat_distortion.swsl"