- type: entity
  parent: BaseToggleAction
  id: ActionToggleSecuritySiren
  name: Toggle Security Siren
  description: Toggles the security siren on and off.
  components:
  - type: Action
    icon:
      sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/security.rsi
      state: siren
    useDelay: 1
    itemIconStyle: BigAction

- type: entity
