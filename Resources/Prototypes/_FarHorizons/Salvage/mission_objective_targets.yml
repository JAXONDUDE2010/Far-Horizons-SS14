- type: entity
  id: CrateSalvageMissionObjective
  parent: BaseStructureDynamic
  name: Lost crate
  description: Someone is paying you to deliver it.
  components:
    - type: InteractionOutline
    - type: Transform
      noRot: true
    - type: Sprite
      sprite: Structures/Storage/Crates/command.rsi
      layers:
        - state: base
        - state: closed
    - type: Icon
      sprite: Structures/Storage/Crates/command.rsi
      state: icon
    - type: Physics
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.4,-0.4,0.4,0.29"
          density: 50
          mask:
          - CrateMask
          layer:
          - MachineLayer
    - type: Damageable
      damageContainer: Inorganic
      damageModifierSet: Metallic
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 30
        behaviors:
        - !type:DoActsBehavior
          acts: ["Destruction"]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak