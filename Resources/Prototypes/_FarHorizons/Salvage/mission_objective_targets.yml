- type: entity
  id: CrateSalvageMissionObjective
  parent: BaseStructureDynamic
  name: Lost crate
  description: Someone is paying you to deliver it.
  components:
    - type: InteractionOutline
    - type: Transform
      noRot: true
    - type: Sprite
      sprite: Structures/Storage/Crates/command.rsi
      layers:
        - state: base
        - state: closed
    - type: Icon
      sprite: Structures/Storage/Crates/command.rsi
      state: icon
    - type: Physics
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.4,-0.4,0.4,0.29"
          density: 50
          mask:
          - CrateMask
          layer:
          - MachineLayer
    - type: Damageable
      damageContainer: Inorganic
      damageModifierSet: Metallic
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 30
        behaviors:
        - !type:DoActsBehavior
          acts: ["Destruction"]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak

- type: entity
  id: FolderSalvageMissionObjective
  parent: BaseItem
  name: Document folder
  description: Secrets inside are meant to be forgotten.
  components:
  - type: Sprite
    sprite: Objects/Misc/folders.rsi
    layers:
    - state: folder-colormap
      color: "#3f3f3f"
    - state: folder-base
  - type: Item
    sprite: Objects/Misc/folders.rsi
    size: Small
    shape: null
  - type: Appearance
  - type: Flammable
    fireSpread: true
    alwaysCombustible: true
    damage:
      types:
        Heat: 1
  - type: FireVisuals
    sprite: Effects/fire.rsi
    normalState: fire
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Ash:
            min: 1
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  id: ServerSalvageMissionObjective
  parent: BaseMachine
  name: Suspicious device
  description: This looks out of place.
  components:
    - type: Sprite
      sprite: Structures/Machines/rndpointsource.rsi
      layers:
      - state: rndpointsource-off
      - state: rndpointsource
        shader: unshaded
        map: ["enum.PowerDeviceVisualLayers.Powered"]
    - type: PointLight
      radius: 1.5
      energy: 1.6
      color: "#3db83b"