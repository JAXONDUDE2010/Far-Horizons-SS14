- type: entity
  name: Floor Buffer
  id: FloorCleaner
  parent: BaseItem
  description: Quickly clean anything in your way by just running over it!
  components:
    - type: Sprite
      sprite: Objects/Misc/moproach_shoes.rsi
      state: mopshoes
    - type: FloorBuffer
      solutionContainer: watertank
    - type: SolutionContainerManager
      solutions:
        watertank:
          maxVol: 60
    - type: RefillableSolution
      solution: watertank
    - type: ExaminableSolution
      solution: watertank
      exactVolume: true
    - type: ReagentDraw
      enabled: false
      solutionContainer: watertank
      whitelistedReagants: 
      - Water
      drainRate: 1
    - type: SolutionTransfer
      canSend: false
      transferAmount: 20
    - type: Absorbent
      pickupAmount: 10
      solutionName: watertank
    - type: AmbientSound
      sound: "/Audio/_FarHorizons/Machines/floor_buffer.ogg"
      range: 10
      volume: -5
      enabled: false
    - type: Actions
    - type: ActionsContainer
    - type: ContainerContainer
      containers:
        actions: !type:Container
          showEnts: false
          occludes: true