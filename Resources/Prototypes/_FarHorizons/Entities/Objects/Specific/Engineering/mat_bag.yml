- type: entity
  name: Construction Bag #Far Horizons - The Great Capitalization Crusade
  id: MatBag
  parent: BaseStorageItem
  description: A rough, dirty, heavy duty construction bag with a magnet messily welded onto its side, it can be attached to the rig clip, allowing for use of a toolbelt alongside it.
  components:
  - type: ItemToggle
    onUse: false
    onActivate: false
    verbToggleOn: "Activate Magnet"
    verbToggleOff: "Deactivate Magnet"
    soundActivate:
      collection: sparks
      params:
        variation: 0.250
    soundDeactivate:
      collection: sparks
      params:
        variation: 0.250
  - type: AltUseToggle
  - type: ComponentToggler
    components: 
    - type: MagnetPickup
      requiresEquipping: false
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Engineering/mat_bag.rsi
    state: icon
  - type: Clothing
    sprite: _FarHorizons/Objects/Specific/Engineering/mat_bag.rsi
    slots: belt
  - type: Item
    size: Ginormous
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,9,3
    quickInsert: true
    areaInsert: true
    whitelist:
      tags:
        - ConstructionMaterial
        - CableCoil
        - Tile
  - type: Dumpable
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: "magnet" }
          False: { state: "icon" }
  - type: Tag
    tags:
    - Webbing