- type: entity
  parent: [ BaseBorgModuleJanitor, BaseProviderBorgModule]
  id: BorgModuleAdvancedJanitorMisc
  name: Advanced Misc. Janitorial Cyborg Module
  description: An advanced janitorial module that attaches some extra useful items for the ever busy cleaning cyborg.
  components:
  - type: Sprite
    layers:
    - state: janitor
    - {sprite: _FarHorizons/Objects/Specific/Robotics/borgmodule.rsi, state: icon-light-replacer-adv }
  - type: ItemBorgModule
    hands:
    - item: BorgWeaponLauncherHydra
    - item: JaniBorgRCD
    - item: LightReplacer
    - item: BorgTrashBag
    - item: WireBrushElectrical
    - item: CleanerGrenade
