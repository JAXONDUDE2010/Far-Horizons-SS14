        emptyLabel: borg-slot-cleanergrenade-empty
        emptyRepresentative: CleanerGrenade
        whitelist:
          tags:
          - Cleanade
  - type: BorgModuleIcon
    icon: { sprite: _FarHorizons/Interface/Actions/actions_borg.rsi, state: adv-light-replacer-module }

