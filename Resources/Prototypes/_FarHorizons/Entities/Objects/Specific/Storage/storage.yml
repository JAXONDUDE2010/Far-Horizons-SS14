#region Survial Cases
- type: entity
  name: Metal Case
  parent: BaseStorageItem
  id: BaseCaseSurvival
  description: A large metal case for storing survival essentials.
  abstract: true
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,4,1
    - 0,3,4,4
  - type: PhysicalComposition
    materialComposition:
      Steel: 300
  - type: Sprite
    sprite: _FarHorizons/Objects/Storage/Departmental/medical.rsi
    state: med_survival
  - type: Item
    size: Large
    heldPrefix: medsurv
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 10

