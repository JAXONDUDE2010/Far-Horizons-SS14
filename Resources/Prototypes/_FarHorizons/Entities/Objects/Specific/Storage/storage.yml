#region Hard Pouches
- type: entity
  name: Hard Pouch Base
  parent: BaseStorageItem
  description: "A metallic pouch used for storing items efficently."
  id: BaseHardPouch
  abstract: true
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,3,1
  - type: Sprite
    sprite: _FarHorizons/Objects/Storage/Departmental/medical.rsi
    state: med_hardpouch
  - type: Item
    size: Normal
    heldPrefix: medhard

- type: entity
  name: Medical Hard Pouch
  parent: BaseHardPouch
  description: "A metallic pouch used for storing medical items efficently."
  id: HardPouchMedical
  components:
