    tags:
    - Trash
    - CentrifugeCompatible
    - ExternalContainerInjectorVial
  - type: PhysicalComposition
    materialComposition:
      ReinforcedGlass: 5
  - type: FitsInDispenser
    solution: beaker
  - type: SpaceGarbage
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Chemistry/reinforced_vial_small.rsi
