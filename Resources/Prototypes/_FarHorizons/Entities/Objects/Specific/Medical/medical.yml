- type: entity
  name: Security Medical Treatment Kit
  description: A heavy duty version of the first aid kit typically utilized by security medical staff.
  parent: BaseStorageItem
  id: SecurityMedkitFH
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/firstaidkits.rsi
    state: BrigKube
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 8 #Chonky - Crowbar damage, for reference.
  - type: Storage
    whitelist:
      tags:
        - Bottle 
        - Brutepack
        - Bloodpack
        - AmmoniaPack
        - Gauze
        - Ointment
        - PillCanister
        - AutoMender
        - Hypospray
        - Vial
        - ExternalContainerInjectorVial
        - Tourniquet
      components:
        - Injector
        - Pill
    grid:
    - 0,1,0,2
    - 1,0,4,3
    - 5,1,5,2
  - type: Item
    size: Normal
    sprite: _FarHorizons/Objects/Specific/Medical/firstaidkits.rsi
    heldPrefix: BrigKube
  - type: PhysicalComposition
    materialComposition:
      Plastic: 150
  - type: Tag
    tags:
    - Medkit

