- type: entity
  parent: BaseItem
  id: BaseHealingItemFH
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/ointment.rsi
  - type: Item
    size: Small
    sprite: _FarHorizons/Objects/Specific/Medical/ointment.rsi
    heldPrefix: ointment
  # Inherited
  - type: StaticPrice
    price: 0
  - type: ItemPrice
    priceCategory: medical  

#region Blue Ointment

- type: entity
  parent: BaseHealingItemFH
  name: Blue Ointmnet
  description: Regular burn cream mixed in with Dermaline makes for an effective ointment. Lasts much longer than a normal container of ointment.
  id: BlueOintment
  suffix: 20
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/ointment.rsi
    state: ointment_blue
  - type: Item
    size: Small
    sprite: _FarHorizons/Objects/Specific/Medical/ointment.rsi
    heldPrefix: ointment_blue
    storedSprite:
      state: ointment_blue-storage
      sprite: _FarHorizons/Objects/Specific/Medical/ointment.rsi
  - type: Healing
    damageContainers:
      - Biological
    delay: 1.6
    damage:
      types:
        Heat: -5
        Cold: -5
        Shock: -5
        Caustic: -1.5
    healingBeginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: StackPrice
    price: 5
  - type: Stack
    stackType: BlueOintment
    count: 20
  - type: InteractRestriction
    restrictInteractionTarget:
      blacklist:  # Use blacklist instead of whitelist so can be clicked on bags/medkits
        - IPC
  - type: Tag
    tags:
    - Ointment

