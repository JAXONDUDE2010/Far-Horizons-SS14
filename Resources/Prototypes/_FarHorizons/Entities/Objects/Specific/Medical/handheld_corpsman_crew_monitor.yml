- type: entity
  name: CorpBuddy™ 6001
  parent: [ BaseHandheldComputer, BaseSecurityContraband ]
  id: HandheldCorpsmanCrewMonitor 
  description: The device advertises itself as a "new and improved brigbuddy™" but the only notable thing about it is the fresh coat of black paint..
  components:
  - type: Tag
    tags:
      - BrigmedicBeltEquip
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/handheld_corpsman_crewmonitor.rsi
    state: scanner
  - type: ActivatableUI
    key: enum.CrewMonitoringUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CrewMonitoringUIKey.Key:
        type: CrewMonitoringBoundUserInterface
  - type: CrewMonitoringConsole
  - type: CrewMonitoringFilter
    shownDepartments:
    - Security
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
  - type: WirelessNetworkConnection
    range: 500
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5

- type: entity
  id: HandheldCorpsmanCrewMonitorEmpty
  parent: HandheldCorpsmanCrewMonitor
  suffix: Empty
  components:
  - type: Tag
    tags:
      - BrigmedicBeltEquip
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default