- type: entity
  name: corpsman hypospray
  parent: [BaseItem, BaseSecurityContraband]
  description: A compact sterile spray for rapid chemical injection in combat situations. Accepts small vials.
  id: CorpsHypo
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/hypospray.rsi
    state: hypo
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
  - type: Item
    sprite: _FarHorizons/Objects/Specific/Medical/hypospray.rsi
  - type: UseDelay
    delay: 1
  - type: StaticPrice
    price: 750
  - type: ItemSlots
    slots:
      vial_slot:
        name: brigmedic-hypospray-vial-slot-name
        startingItem: ReinforcedMiniatureEmptyChemistryVial
        whitelist:
          tags:
            - ExternalContainerInjectorVial
          components:
            - SolutionContainerManager
          requireAll: true
  - type: ContainerContainer
    containers:
      vial_slot: !type:ContainerSlot
  - type: ExternalContainerInjector
    onlyAffectsMobs: false
    vialSlotId: vial_slot
    vialSolutionName: beaker
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: hypo_fill
    solutionName: beaker
  - type: Tag
    tags:
    - HighRiskItem
    - Hypospray
  - type: StealTarget
    stealGroup: CorpsmanHypoSteal

- type: entity
  name: hypoinjector
  parent: [BaseSyringe, BaseMedicalContraband]
  description: A sterile reusable auto-injector/drawer with a built-in limiter, draw and inject liquids with the push of a button!
  id: SlowAutoinjector
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/syringe.rsi
    layers:
      - state: syringe1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
      - state: syringe_base_draw0
        map: ["enum.SolutionContainerLayers.Base"]
  - type: Icon
    sprite: _FarHorizons/Objects/Specific/Medical/syringe.rsi
    state: "syringe_base_draw0"
  - type: Item
    sprite: _FarHorizons/Objects/Specific/Medical/syringe.rsi
    size: Tiny
  - type: Injector
    activeModeProtoId: SyringeDrawMode
    allowedModes:
    - SyringeDrawMode
    - SyringeInjectMode
    injectorInjectingStartDescription: "hypoinjector-component-injecting-user"
    injectorDrawingStartDescription: "hypoinjector-component-drawing-user"
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: syringe
    inHandsMaxFillLevels: 3
    inHandsFillBaseName: -fill-
  - type: Tag
    tags:
    - Syringe
    - Trash