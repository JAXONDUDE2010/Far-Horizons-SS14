#region Blue Ointment
- type: entity
  parent: [BaseAutoMender, DrinkVisualsOpenable, DrinkVisualsFill] # You have no idea how long this took me to get to layer properly
  name: Blue Ointment Canister
  description: Used to treat those nasty burns. Seems to be able to hold more than a normal Canister.
  id: BlueOintmentEmpty
  suffix: Empty
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/blue_ointment.rsi
    layers:
    - state: empty
    - state: ointment1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: icon_open
      map: ["enum.OpenableVisuals.Layer"]
  - type: Item
    size: Small
    sprite: _FarHorizons/Objects/Specific/Medical/blue_ointment.rsi
    heldPrefix: ointment
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 20
  - type: Healing
    solutionDrain: true
    reagentsToDrain:
    - ReagentId: BurnCreamBlue
      Quantity: 1
    delay: 1.6
    damageContainers:
      - Biological
    damage:
      types:
        Heat: -6
        Cold: -6
        Shock: -6
        Caustic: -2
    healingBeginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: ointment
    inHandsMaxFillLevels: 0
    inHandsFillBaseName: -fill-
  - type: ExaminableSolution
    examinableWhileClosed: false
    heldOnly: false
  - type: InteractRestriction
    restrictInteractionTarget:
      blacklist:  # Use blacklist instead of whitelist so can be clicked on bags/medkits
        - IPC
  - type: Openable
    sound:
      collection: flaskOpenSounds
    closeable: true
    closeSound:
      collection: flaskCloseSounds
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
      Plastic: 100
  - type: Tag
    tags:
    - Ointment

- type: entity
  suffix: Filled
  parent: BlueOintmentEmpty
  id: BlueOintment
  components:
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 20
        reagents:
        - ReagentId: BurnCreamBlue
          Quantity: 20

