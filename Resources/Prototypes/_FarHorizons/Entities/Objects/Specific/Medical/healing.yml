- type: entity
  name: Universal Blood Pack
  description: Does not work with Ammonia-based races and will not accept Amoxla to avoid lethal accidents by colorblind medical doctors.
  parent: BaseAutoMender
  id: BloodpackEmpty
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/blood_pack.rsi
    layers: 
    - state: universalblood
      map: ["enum.SolutionContainerLayers.Base"]
    - state: bloodpack1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Item
    sprite: Objects/Specific/Medical/medical.rsi
    heldPrefix: bloodpack
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 10
  - type: Healing
    solutionDrain: true
    reagentsToDrain:
    - ReagentId: UniversalBlood
      Quantity: 1
    delay: 1
    damageContainers:
      - Biological
    damage:
      types:
        Bloodloss: -10
    modifyBloodLevel: 20 # ~ 6 per use / 60% recovered per pack / 6 uses = 40%, consumes 6u. Not exact but this is as close as I'm getting to 1-1. Small buff for bloodbags ig.
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: SolutionContainerVisuals
    maxFillLevels: 7
    fillBaseName: bloodpack
    solutionName: injector
  - type: InteractRestriction
    restrictInteractionTarget:
      blacklist:  # Use blacklist instead of whitelist so can be clicked on bags/medkits
        - IPC
        - Avali
        - Resomi
  - type: Tag
    tags:
    - Bloodpack
      
- type: entity
  suffix: Filled
  parent: BloodpackEmpty
  id: Bloodpack
  components:
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 10
        reagents:
        - ReagentId: UniversalBlood
          Quantity: 10

- type: entity
  name: Amoxla Pack
  description: Does not work with Non-Ammonia-based races and will not accept Universal Blood to avoid lethal accidents by colorblind medical doctors.
  parent: BloodpackEmpty
  id: BloodpackEmptyAmmonia
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/blood_pack.rsi
    layers: 
    - state: amoxla
      map: ["enum.SolutionContainerLayers.Base"]
    - state: bloodpack1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Item
    sprite: _FarHorizons/Objects/Specific/Medical/medical.rsi
    heldPrefix: ammoniapack
  - type: Healing
    solutionDrain: true
    reagentsToDrain:
    - ReagentId: Amoxla
      Quantity: 1
    delay: 1
    damageContainers:
      - Biological
    damage:
      types:
        Bloodloss: -6
        Asphyxiation: -7
    modifyBloodLevel: 20 # ~ 6% per use
  - type: InteractRestriction 
    restrictInteractionTarget:
      blacklist:
        - Arachnid
        - Cyclorite
        - Diona
        - Dwarf
        - Felionoid
        - Human
        - SlimePerson
        - Moth
        - Reptilian
        - Shadekin
        - Vox
        - Vulpkanin
        - Thaven
        - TrueProtogen
        - IPC
  - type: Tag
    tags:
    - AmmoniaPack

- type: entity
  suffix: Filled
  parent: BloodpackEmptyAmmonia
  id: BloodpackAmmonia
  components:
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 10
        reagents:
        - ReagentId: Amoxla
          Quantity: 10

