    tags:
    - Bottle
    - Trash
  - type: PhysicalComposition
    materialComposition:
      ReinforcedGlass: 25
  - type: SpaceGarbage
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Chemistry/reinforced_bottle.rsi
    layers:
