- type: entity
  name: Mark 1 Rifle
  parent: [BaseWeaponSniper, BaseGunWieldable, BaseSalvageContraband]
  id: WeaponRifleMark1
  description: A very old Mark 1 Rifle used in many old wars. Someone managed to find one out of a museum or something, with the date of production scratched out from usage... but the GSL logo is very new.                                                                               Note - This weapon can be chambered in .30 and .45 ammunition!
  components:
  - type: KnockbackByUserTag
    doestContain:
      Resomi:
        knockback: 2
      Felionoid:
        knockback: 1
      Animal:
        knockback: 2
  - type: BallisticAmmoProvider
    capacity: 10
    proto: CartridgeLightRifleSP
    whitelist:
      tags:
        - CartridgeMagnum
        - CartridgeLightRifle
    soundRack:
      path: /Audio/_FarHorizons/Items/Weapons/Mark1/mark1_cycle_Bolt.ogg
      params:
        variation: 0.05
  - type: Gun
    minAngle: 10
    maxAngle: 40
    soundGunshot:
      path: /Audio/_FarHorizons/Items/Weapons/Mark1/mark1.ogg
      params:
        variation: 0.246
    pump: true
    fireRate: .99
  - type: Sprite
    sprite: /Textures/_FarHorizons/Objects/Weapons/Guns/Snipers/mark1_rifle.rsi
  - type: Clothing
    sprite: /Textures/_FarHorizons/Objects/Weapons/Guns/Snipers/mark1_rifle.rsi
    slots:
      - Back
      - suitStorage
  - type: Item
    size: Large
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -5
    maxAngle: -10
  - type: GunRequiresWield
  - type: StaticPrice
    price: 500

