- type: entity
  name: X-49 multiphase rifle "Rushdown"
  parent: [BaseWeaponBattery, BaseGunWieldable, BaseCommandContraband]
  id: WeaponMultiphaseSMG
  description: After the success of the X-01, Nanotrasen developed a leaner, bulkier variant of the weapon designed for close-quarters combat. It boasts the highest rate of fire manufacturers can achieve and features a self-recharging battery like its predecessor—though it recharges significantly slower
  components:
  - type: Appearance
  - type: Gun
    fireRate: 5.5
    burstFireRate: 12
    shotsPerBurst: 3
    burstCooldown: 0.55
    selectedMode: Fullauto
    availableModes:
    - Fullauto
    - Burst
  - type: Sprite
    sprite: /Textures/_FarHorizons/Objects/Weapons/Guns/Battery/rushdown_gun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: disable-unshaded
      map: ["enum.FireModesLayers.FireMode"]
      shader: unshaded
    - state: disable-unshaded-0
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Lock
  - type: AccessReader
    access: [["BlueShield"]]
  - type: Item
    size: Normal
    shape:
    - 0, 0, 2, 1
  - type: MagazineVisuals
    magState: disable
    steps: 5
    zeroVisible: true
  - type: HitscanBatteryAmmoProvider
    proto: DisablerBolt
    fireCost: 100
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: DisablerBolt
      fireCost: 100
      magState: disable
      visualState: disable-unshaded
    - proto: RedLaserBeam
      fireCost: 200
      magState: kill
      visualState: kill-unshaded
      conditions:
      - !type:AlertLevelCondition
        alertLevels:
        - blue
        - violet
        - yellow
        - red
        - gamma
  - type: Battery
    maxCharge: 1500
    startingCharge: 1500
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 10

- type: entity
  name: Cyborg Dominator
  parent: WeaponDominator
  id: BorgWeaponDominator
  components:
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 25

- type: entity
  name: Cyborg Laser Carbine
  parent: WeaponLaserCarbine
  id: BorgWeaponWeaponLaserCarbine
  components:
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 10

- type: entity
  name: Laser Carbine
  parent: [BaseLaserRifle, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponLaserCarbine
  description: A simple high-capacity laser carbine used everywhere in the galaxy due to cheap production costs.
  components:
  - type: Item
    size: Large
    heldPrefix: laser5
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Battery/laser_gun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: laser
      map: ["enum.FireModesLayers.FireMode"]
      shader: unshaded
    - state: laser-unshaded-10
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: MagazineVisuals
    magState: laser
    steps: 11
    zeroVisible: false
  - type: Appearance
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Battery/laser_gun.rsi
  - type: Gun
    fireRate: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    - FullAuto
  - type: Battery 
    maxCharge: 1500
    startingCharge: 1500
  - type: HitscanBatteryAmmoProvider
    proto: RedLaserBeamCarbine
    fireCost: 30
  - type: StaticPrice
    price: 420

- type: entity
  name: Laser Pistol
  parent: [BaseWeaponBatterySmall, BaseSecurityContraband]
  id: WeaponLaserPistol
  description: The compainion gun to the Laser Carbine, it finds a niche in delivering high-powered laser fire and still being able to fit in your pocket. Takes a little long to charge however.
  components:
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
    storedOffset: 0,-4
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Battery/laser_pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: laser-unshaded-5
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: MagazineVisuals
    magState: laser
    steps: 6
    zeroVisible: false
  - type: Appearance
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Battery/laser_pistol.rsi
  - type: Gun
    fireRate: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: Battery 
    maxCharge: 1000
    startingCharge: 1000
  - type: HitscanBatteryAmmoProvider
    proto: RedLaserBeamCarbine
    fireCost: 50
  - type: StaticPrice
    price: 420

- type: entity
  name: Dominator Rifle
  parent: [ BaseWeaponBatterySmall, BaseGunWieldable, BaseSecurityContraband ]
  id: WeaponDominatorRifle
  description: A bulky, highly advanced rifle that has the ability to switch between three modes, slated to replace standard laser armaments in the near future. Used in riot control, it's lethal mode is weaker to dissuade rather than kill.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Battery/dominator_rifle.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: stun
      map: ["enum.FireModesLayers.FireMode"]
      shader: unshaded
    - state: stun-unshaded-10
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Appearance
  - type: Item
    heldPrefix: stun
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Battery/dominator_rifle.rsi
  - type: MagazineVisuals
    magState: stun
    steps: 11
    zeroVisible: true
  - type: Lock
  - type: AccessReader
    access: [["Security"]]
  - type: Battery 
    maxCharge: 1500
    startingCharge: 1500
  - type: HitscanBatteryAmmoProvider
    proto: BoltTaserRifle
    fireCost: 125
  - type: BatteryWeaponFireModes #TODO - Make wielded inhands configurable. The sprites are there in the file, but cannot be used :/
    fireModes:
    - proto: BoltTaserRifle
      fireCost: 125 # 12
      visualState: stun
      magState: stun
      heldPrefix: stun
      conditions:
      - !type:AlertLevelCondition
        alertLevels:
        - green
        - blue
        - violet
        - yellow
        - red
        - gamma
    - proto: RedLaserBeamDominator
      fireCost: 30 # 50
      visualState: lethal
      magState: lethal
      heldPrefix: lethal
      conditions:
      - !type:AlertLevelCondition
        alertLevels:
        - blue
        - violet
        - yellow
        - red
        - gamma
    - proto: DestroyBeamDominator
      fireCost: 185 # ~8
      visualState: destroy
      magState: destroy
      heldPrefix: destroy
      conditions:
      - !type:AlertLevelCondition
        alertLevels:
        - violet
        - red
        - gamma

