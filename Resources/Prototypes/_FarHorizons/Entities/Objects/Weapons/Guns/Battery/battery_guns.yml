    fireRate: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatteryAmmoProvider
    proto: RedLaserBeamCarbine
    fireCost: 50
  - type: StaticPrice
    price: 420

- type: entity
  name: Dominator Rifle
  parent: [ BaseWeaponBatterySmall, BaseGunWieldable, BaseSecurityContraband ]
  id: WeaponDominatorRifle
  description: A bulky, highly advanced rifle that has the ability to switch between three modes, slated to replace standard laser armaments in the near future. Used in riot control, it's lethal mode is weaker to dissuade rather than kill.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Battery/dominator_rifle.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: stun
      map: ["enum.FireModesLayers.FireMode"]
      shader: unshaded
    - state: stun-unshaded-10
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Appearance
  - type: Item
    heldPrefix: stun
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Battery/dominator_rifle.rsi
  - type: MagazineVisuals
    magState: stun
    steps: 11
    zeroVisible: true
  - type: Lock
  - type: AccessReader
    access: [["Security"]]
  - type: Battery 
    maxCharge: 1500
    startingCharge: 1500
  - type: BatteryAmmoProvider
    proto: BoltTaserRifle
    fireCost: 125
  - type: BatteryWeaponFireModes #TODO - Make wielded inhands configurable. The sprites are there in the file, but cannot be used :/
    fireModes:
    - proto: BoltTaserRifle
      fireCost: 125 # 12
      visualState: stun
      magState: stun
      heldPrefix: stun
      conditions:
      - !type:AlertLevelCondition
        alertLevels:
        - green
        - blue
        - violet
        - yellow
        - red
        - gamma
    - proto: RedLaserBeamDominator
      fireCost: 30 # 50
      visualState: lethal
      magState: lethal
      heldPrefix: lethal
      conditions:
      - !type:AlertLevelCondition
        alertLevels:
        - blue
        - violet
        - yellow
        - red
        - gamma
    - proto: DestroyBeamDominator
      fireCost: 185 # ~8
      visualState: destroy
      magState: destroy
      heldPrefix: destroy
      conditions:
      - !type:AlertLevelCondition
        alertLevels:
        - violet
        - red
        - gamma
  - type: Tag
    tags:
    - Dominator

