- type: entity
  id: CartridgePistolSP
  name: 9mm Cartridge (SP)
  parent: BaseCartridgePistol
  components:
  - type: CartridgeAmmo
    proto: BulletPistolTraceSP
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#3F47DB"

