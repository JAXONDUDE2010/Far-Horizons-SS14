- type: entity
  abstract: true
  parent: BaseItem
  id: BaseMagazineCanisterLightRifle
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeLightRifle
    proto: CartridgeLightRifleSP
    capacity: 480 # 16x mag size
  - type: Item
    size: Large
    shape:
    - 0,0,2,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Canisters/bullet_canister.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: b7.62
  - type: MagazineVisuals
    magState: mag
    steps: 15
    zeroVisible: false
  - type: Appearance

# Boxes
