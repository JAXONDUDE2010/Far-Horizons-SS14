- type: entity
  abstract: true
  parent: BaseItem
  id: BaseMagazineCanisterPistol
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgePistol
    proto: CartridgePistolSP
    capacity: 320 # 16x mag size
  - type: Item
    size: Large
    shape:
    - 0,0,2,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Canisters/bullet_canister.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: b9.19
  - type: MagazineVisuals
    magState: mag
    steps: 15
    zeroVisible: false
  - type: Appearance
  - type: Tag
    tags:
      - AmmoBoxPistol9mm

