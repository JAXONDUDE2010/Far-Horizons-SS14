#region .38
- type: entity
  id: BaseMagazinePistol38
  name: ".38 Special Magazine (Pistol)"
  parent: BaseMagazinePistol
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeRevolver38SP
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeRevolver38
    capacity: 10
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Ammunition/Magazine/Pistol/40.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#575EF5"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#575EF5"
  - type: MagazineVisuals
    magState: mag
    steps: 7
    zeroVisible: false
  - type: Tag
    tags:
      - MagazinePistol38

