    proto: CartridgeRevolver38SP
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeRevolver38
    capacity: 10
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Magazine/Pistol/.38_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
