#region Crafted
- type: entity
  id: MagazinePistolDouble
  name: "Double .35 Magazine (Pistol)"
  description: Just two pistol magazines side-by-side. Only fits in the Enforcinator.
  parent: [BaseItem, BaseSecurityContraband]
  components:
  - type: Tag
    tags:
      - MagazinePistolDouble
  - type: BallisticAmmoProvider
    proto: null
    mayTransfer: true
    whitelist:
      tags:
        - CartridgePistol
        - CartridgePistolImprovised
    capacity: 21
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Magazine/Pistol/enforcinator_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Appearance
  - type: Construction
    graph: MagazinePistolDoubleGraph
    node: magazine

