- type: entity
  abstract: true
  parent: BaseItem
  id: BaseMagazineCanisterRifle556
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeRifle556
    proto: CartridgeRifle556SP
    capacity: 400 # 16x mag size 
  - type: Item
    size: Large
    shape:
    - 0,0,2,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Canisters/bullet_canister.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: b5.56
  - type: MagazineVisuals
    magState: mag
    steps: 15
    zeroVisible: false
  - type: Appearance
  - type: Tag
    tags:
      - AmmoBoxRifle556

