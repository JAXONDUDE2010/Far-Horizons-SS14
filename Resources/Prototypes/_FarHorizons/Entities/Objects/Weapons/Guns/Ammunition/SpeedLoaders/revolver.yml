- type: entity
  id: BaseSpeedLoaderRevolver38
  name: ".38 Special Speed Loader (Revolver)"
  parent: [BaseItem, BaseSecurityContraband]
  abstract: true
  components:
  - type: Tag
    tags:
      - SpeedLoaderRevolver38
  - type: SpeedLoader
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - CartridgeRevolver38
    capacity: 8
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Speedloaders/Pistol/38_speed_loader.rsi
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: MagazineVisuals
    magState: base
    steps: 9

- type: entity
  id: SpeedLoaderRevolver38Empty
  name: ".38 Special Speed Loader (Revolver Any)"
  parent: BaseSpeedLoaderRevolver38
  components:
  - type: BallisticAmmoProvider
    proto: null
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: base-8
      map: ["enum.GunVisualLayers.Mag"]
    - state: base-tip-8
      map: [ "enum.GunVisualLayers.Tip" ]
      color: "#8F4830"
  - type: Appearance

