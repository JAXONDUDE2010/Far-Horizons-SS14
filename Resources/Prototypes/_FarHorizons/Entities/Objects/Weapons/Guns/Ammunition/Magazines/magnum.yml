- type: entity
  name: Pistol Magazine (.44 Magnum)
  parent: [BaseSecuritySalvageContraband, BaseMagazinePistol]
  id: BaseMagazineMagnum
  description: 8-round single stack pistol magazine. Intended to hold general-purpose kinetic ammunition.
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Magazine/Pistol/magnum.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Tag
    tags:
      - MagazineMagnum
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeMagnum
    capacity: 8
  - type: MagazineVisuals
    magState: mag
    steps: 7

- type: entity
  id: MagazineMagnumEmpty
  name: Pistol Magazine (.44 Magnum any)
  suffix: empty
  parent: BaseMagazineMagnum
  components:
  - type: BallisticAmmoProvider
    proto: null
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag

- type: entity
  id: MagazineMagnum
  name: Pistol Magazine (.44 Magnum SP)
  parent: BaseMagazineMagnum
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeMagnumSP
  - type: Sprite
    layers:
    - state: sp
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#575EF5"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#575EF5"

