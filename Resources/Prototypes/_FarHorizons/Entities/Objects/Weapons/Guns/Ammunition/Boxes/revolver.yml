#region .38 Special
- type: entity
  parent: BaseItem
  id: BaseMagazineBoxRevolver38
  name: .38 Special Ammunition Box (Revolver)
  abstract: true
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeRevolver38
    proto: CartridgeRevolver38SP
    capacity: 40
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Ammunition/Boxes/pistol.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

- type: entity
  parent: BaseMagazineBoxRevolver38
  id: MagazineBoxRevolver38SP
  name: .38 Special Ammunition Box (Revolver SP)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    proto: CartridgeRevolver38SP
  - type: Sprite    
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: sp

