- type: entity
  id: BaseSpeedLoaderPistol40
  name: "Speed loader (.38 Special)"
  parent: [BaseItem, BaseSecurityContraband]
  abstract: true
  components:
  - type: Tag
    tags:
      - SpeedLoaderPistol
  - type: SpeedLoader
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - CartridgePistolDP
    capacity: 8
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Speedloaders/Pistol/38_speed_loader.rsi
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: MagazineVisuals
    magState: base
    steps: 9

- type: entity
  id: SpeedLoaderPistol40Empty
  name: "Speed loader (.38 Special any)"
  parent: BaseSpeedLoaderPistol40
  components:
  - type: BallisticAmmoProvider
    proto: null
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: base-8
      map: ["enum.GunVisualLayers.Mag"]
    - state: base-tip-8
      map: [ "enum.GunVisualLayers.Tip" ]
      color: "#8F4830"
  - type: Appearance

