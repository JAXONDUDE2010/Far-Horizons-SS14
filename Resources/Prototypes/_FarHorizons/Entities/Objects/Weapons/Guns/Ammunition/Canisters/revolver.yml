- type: entity
  abstract: true
  parent: BaseItem
  id: BaseMagazineCanisterRevolver38
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeRevolver38
    proto: CartridgeRevolver38SP
    capacity: 320 # 16x mag size
  - type: Item
    size: Large
    shape:
    - 0,0,2,1
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Canisters/bullet_canister.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: b.38
  - type: MagazineVisuals
    magState: mag
    steps: 15
    zeroVisible: false
  - type: Appearance
  - type: Tag
    tags:
      - AmmoBoxRevolver38

# Boxes
