- type: entity
  parent: BaseMagazineBoxPistol
  id: MagazineBoxPistol
  name: 9mm Ammunition Box (Any)
  description: A cardboard box designed to hold 9mm rounds.
  components:
  - type: BallisticAmmoProvider
    proto: null
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

