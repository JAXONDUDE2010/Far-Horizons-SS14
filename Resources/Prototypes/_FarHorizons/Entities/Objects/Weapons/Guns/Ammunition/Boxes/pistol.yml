# Boxes
- type: entity
  parent: BaseMagazineBoxPistol40
  id: MagazineBoxPistol40Practice
  name: Ammunition box (.38 Special Practice)
  description: A cardboard box of .38 special rounds. Intended to hold non-harmful chalk ammunition.
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistol40Practice
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: practice

