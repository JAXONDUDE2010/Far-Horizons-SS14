- type: entity
  parent: BaseMagazineBoxPistol
  id: MagazineBoxPistolSP
  name: 9mm Ammunition Box (SP)
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistolSP
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: sp

