# Holoflare Variations

- type: entity
  id: LowIntensityHoloflare
  name: Dim Holoflare
  categories: [ HideSpawnMenu ]
  components:
  - type: Physics
    bodyType: Dynamic
    fixedRotation: true
  - type: EmbeddableProjectile
    deleteOnRemove: true
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        mask:
          - ItemMask # BulletImpassable
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Projectiles/holoflares.rsi
    state: low
    scale: 0.5,0.5
  - type: AmbientSound
    enabled: true
    volume: -10
    range: 3
    sound:
      path: /Audio/Ambience/Objects/light_hum.ogg
      params:
        loop: true
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Heat: 0
  - type: TimedDespawn
    lifetime: 120 # 2 minutes, same as time for 0 to full
  - type: PointLight
    enabled: true
    color: "#C0E0F8"
    radius: 4.0
    energy: 2.0
    netsync: false

