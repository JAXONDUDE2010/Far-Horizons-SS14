- type: entity
  id: BaseBulletTracer
  abstract: true
  components:
  - type: BulletTracerSender

- type: entity
  id: PelletKinetic
  name: kinetic pellet
  categories: [ HideSpawnMenu ]
  parent: BulletKinetic
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    state: buckshot
  - type: Projectile
    damage:
      types:
        Blunt: 13
        Structural: 15
  - type: TimedDespawn
    lifetime: 0.2 # roughly 5 tiles

- type: entity
  id: ProtoKineticPellet
  categories: [ HideSpawnMenu ]
  parent: PelletKinetic
  components:
  - type: ProjectileSpread
    proto: PelletKinetic
    count: 5
    spread: 25

#PKC variant charge shots

- type: entity
  id: BulletChargeBlunt #For the Crusher Hammer
  name: charge bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: Marks a target for additional damage.
  components:
  - type: Reflective
    reflective:
    - NonEnergy
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: chronobolt
        shader: unshaded
  - type: GatheringProjectile
  - type: DamageMarkerOnCollide
    whitelist:
      components:
        - MobState
    damage:
      types:
        Blunt: 25
  - type: Projectile
    impactEffect: BulletImpactEffectKinetic
    damage:
      types:
        Blunt: 0
  # Short lifespan
  - type: TimedDespawn
    lifetime: 0.4

- type: entity
  id: BulletChargeSlash #For the Crusher Machete/Sickle
  name: charge bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: Marks a target for additional damage.
  components:
  - type: Reflective
    reflective:
    - NonEnergy
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: chronobolt
        shader: unshaded
  - type: GatheringProjectile
  - type: DamageMarkerOnCollide
    whitelist:
      components:
        - MobState
    damage:
      types:
        Slash: 20
    amount: 2
  - type: Projectile
    impactEffect: BulletImpactEffectKinetic
    damage:
      types:
        Blunt: 0
  # Short lifespan
  - type: TimedDespawn
    lifetime: 0.4

- type: entity
  id: BulletChargePierce #For the Crusher Spear
  name: charge bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: Marks a target for additional damage.
  components:
  - type: Reflective
    reflective:
    - NonEnergy
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: chronobolt
        shader: unshaded
  - type: GatheringProjectile
  - type: DamageMarkerOnCollide
    whitelist:
      components:
        - MobState
    damage:
      types:
        Piercing: 15
        Slash: 5
