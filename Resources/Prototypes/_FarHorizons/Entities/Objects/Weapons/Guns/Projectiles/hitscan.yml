# region Tasers
- type: entity
  id: BoltTaserFH
  name: Taser
  parent: BasicHitscanNoBeam
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Shock: 5
  - type: HitscanCrawlerTargetEffects
    knockdownDuration: 3 #in seconds
  - type: HitscanBasicRaycast
    maxDistance: 5 #tiles
  - type: HitscanBasicVisuals
    bullet:
      sprite:
        sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
        state: spark
      color: "#ffff33"

- type: entity
  id: BoltTaserRifle #Use in rifles exclusively
  name: Taser Bolt
  parent: BasicHitscanNoBeam
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Shock: 2
  - type: HitscanStaminaDamage
    staminaDamage: 12 # Very weak but has range. Ten shots given stun will likely fade with time.
  - type: HitscanBasicRaycast
    maxDistance: 20
  - type: HitscanBasicVisuals
    bullet:
      sprite:
        sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
        state: omnilaser_greyscale
      color: "#ffff33"

- type: entity
  id: BoltTaserSpread # Only use in shotguns
  name: Split Taser Bolt
  parent: BasicHitscanNoBeam
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Shock: 12 # Change to 1 shock per shot when spread is added  ~ 12 shock per shot, ~36 shock damage to stamcrit
#  count: 12 Not supported in laser hitscan, readd when support is added.
#  spread: 30 Not supported in laser hitscan, readd when support is added.
  - type: HitscanStaminaDamage
    staminaDamage: 48 # Change to 3 when support is added ~ 48, three shots assuming you hit them all.
  - type: HitscanBasicRaycast
    maxDistance: 4
  - type: HitscanBasicVisuals
    bullet:
      sprite:
        sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
        state: omnilaser_greyscale
      color: "#ffff33"

#region Plasma
- type: entity
  id: BoltPlasmaSpread
  name: Split Plasma Bolt
  parent: BasicHitscanNoBeam
  components:
  - type: HitscanReflect
    reflectiveType: NonEnergy
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 50 # Change to a lower number when support is added # About as strong as slugs (and weaker than current eshotty), does a bit more damage to account for lack of AP. Will likely be stronger in practice due to majority species having heat weakness + flat heat being -4 instead of -5 - assuming you point blank someone with it.
        Structural: 90 # Change to a lower number when support is added
  - type: HitscanBasicRaycast
    maxDistance: 4
    collisionMask: BulletImpassable
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
      state: heavylaser_flash
    bullet:
      sprite:
        sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi # Resprite for plasma-y sprites eventually.
        state: heavylaser
#  count: 8
#  spread: 30 # Immense heat warps the barrel, not very accurate.

#region Lasers
- type: entity
  id: RedLaserBeamSpread
  name:  Split Laser Beam
  parent: BasicHitscan
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 30 # Buckshot is 70 for reference. Performs a bit worse against a blood-red compared to buckshot, which is fine given it goes through glass.
  - type: HitscanBasicRaycast
    maxDistance: 5 #simulates spread, buckshot barely hits past this distance
#  count: 8
#  spread: 30

