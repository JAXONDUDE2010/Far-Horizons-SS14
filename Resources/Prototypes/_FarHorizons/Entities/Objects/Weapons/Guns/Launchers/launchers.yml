- type: entity
  name: M81A1 "Fissure"
  parent: [ BaseWeaponLauncher, BaseGunWieldable, BaseSyndicateContraband]
  id: WeaponLauncherM81A1Fissure
  description: A large, shoulder-fired rocket launcher developed by the Syndicate to provide nuclear operatives with a solution for taking out a large grouping of hostiles or heavily armored targets. The launcher is designed to fire 120mm rockets, which can be equipped with all kinds of modified warheads, however, said rockets are quite expensive. Truly, this is what telecrystals can buy for when it comes to total annihilation.
  components:
  - type: KnockbackByUserTag
    doestContain:
      Skating:
        knockback: 2.5
      Resomi:
        knockback: 5
      Avali:
        knockback: 2.5 # half of what resomi take
      Felionoid:
        knockback: 2.5 # half of what resomi take
      Animal:
        knockback: 5
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Launchers/m81a1_fissure.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Launchers/m81a1_fissure.rsi
  - type: Item
    size: Ginormous
  - type: Gun
    fireRate: 0.83
    soundGunshot:
      path: /Audio/_FarHorizons/Weapons/Guns/Fissure.ogg
  - type: GunRequiresWield
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - RocketAmmo120mm
    proto: RocketAmmo120mmHE
    capacity: 1
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: HeldSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: SpeedModifiedOnWield
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: StaticPrice
    price: 12000

- type: entity
  parent: [ BaseWeaponLauncher, BaseMajorContraband ]
  id: BorgWeaponLauncherHydra
  name: Cyborg Hydra
  description: PLOOP... FSSSSSS... Constructs one additional grenade every minute.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Launchers/hydra_launcher.rsi
    layers:
    - state: icon
      map: [ "enum.GunVisualLayers.Base" ]
  - type: Clothing
    sprite: Objects/Weapons/Guns/Launchers/hydra_launcher.rsi
    slots:
    - Back
    - suitStorage
  - type: Item
    size: Huge
  - type: BatteryAmmoProvider
    proto: GrenadeCleanade
    fireCost: 600
  - type: Battery
    maxCharge: 3600
    startingCharge: 0
  - type: BatterySelfRecharger
    autoRechargeRate: 10

- type: entity
  name: China Lake #Moved so it doesnt get turned back into pre nerf clake
  parent: [BaseWeaponLauncher, BaseSyndicateContraband]
  id: WeaponLauncherChinaLake
  description: A pump-action grenade launcher commonly used by the infamous Nuclear Operatives. PLOOP!
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Launchers/china_lake.rsi
    layers:
      - state: icon
        map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: Objects/Weapons/Guns/Launchers/china_lake.rsi
    slots:
    - Back
    - suitStorage
  - type: Item
    size: Huge
    shape:
    - 0,0,4,2
  - type: AmmoCounter
  - type: Gun
    pump: true
    fireRate: 0.8
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - Grenade
    capacity: 3
    proto: GrenadeFrag
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: GunRequiresWield
  - type: StaticPrice
    price: 10000