- type: entity
  name: Instigator
  parent: [BaseWeaponRevolver, BaseSecurityContraband]
  id: WeaponRevolverInstigator
  description: A simple and reliable double action .38 revolver provided to senior officers, following popular demand of more firepower in a standard security grade sidearm. Named as such due to owners of this firearm having a proclivity to instigate fights.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Revolvers/instigator.rsi
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Revolvers/instigator.rsi
  - type: Item
    storedOffset: 0,-2
  - type: RevolverAmmoProvider
    capacity: 8
    proto: CartridgeRevolver38SP
    chambers: [ True, True, True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null, null, null ]
    whitelist:
      tags:
        - CartridgeRevolver38
        - SpeedLoaderRevolver38

- type: entity
  name: Inspector M500
  parent: [BaseWeaponRevolver, BaseSecurityContraband]
  id: WeaponRevolverInspectorM500
  description: The premium version of the readily-avaliable Inspector, it is only handed out to veteran detectives worthy of such a handcannon. Features an improved double-action trigger allowing for slightly faster firing.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Revolvers/inspector_m500.rsi
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Revolvers/inspector_m500.rsi
  - type: Item
    storedOffset: 0,-2
  - type: Gun
    selectedMode: SemiAuto
    fireRate: 1.7
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/revolver.ogg
  - type: RevolverAmmoProvider
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]

- type: entity
  name: Initiator
  parent: [BaseWeaponRevolver, BaseSecurityContraband]
  id: WeaponRevolverInitiator
  description: The snubnose version of the Inspector, typically used by civilians for a strong yet inaccurate easily concealable firearm. This one in particular appears to be specially fitted for Scurret hands.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Revolvers/initiator.rsi
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Revolvers/initiator.rsi
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    storedOffset: 0,-1
  - type: Gun
    selectedMode: SemiAuto
    fireRate: 1.5
