- type: entity
  name: Oath Breaker
  parent: [BaseWeaponRevolver, BaseSecurityContraband]
  id: WeaponRevolverOathbreaker
  description: Originally commissioned by NanoTransen for station-side detectives, it was deemed too impractical and unwiedly for proper field use. It did, however, find it's niche among Brigmedics which greatly enjoyed utilizing it for brig defense. 
  components:
  - type: Item
    sprite: _FarHorizons/Objects/Weapons/Guns/Revolvers/oath_breaker.rsi
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Revolvers/oath_breaker.rsi
    quickEquip: false
  - type: Tag
    tags:
    - Sidearm
  - type: Gun
    spread: 25
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mateba.ogg
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Revolvers/oath_breaker.rsi
  - type: RevolverAmmoProvider
    whitelist:
      tags:
      - ShellShotgun
      - SpeedLoaderShotgun
    proto: ShellShotgun
    capacity: 3
    chambers: [ True, True, True ]
    ammoSlots: [ null, null, null ]
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/shotgun_insert.ogg
  - type: ContainerContainer
    containers:
      revolver-ammo: !type:Container
  - type: KnockbackByUserTag
    doestContain:
      Resomi:
        knockback: 3
        staminaMultiplier: 20
      Avali:
        knockback: 1
        staminaMultiplier: 20
      Felionoid:
        knockback: 1.5
        staminaMultiplier: 20