- type: entity
  name: MK 78
  parent: [BaseWeaponPistol, BaseSecurityContraband, FlashlightLantern]
  id: WeaponPistolMk58
  description: Designed by Nanotrasen’s Small Arms Division, the Mk78 is a semi-automatic pistol with a simple recoil-operated action and excellent reliability. The new standard sidearm of Nanotrasen’s station security and emergency response teams, feeds from .35 pistol magazines. Comes with a intergrated flashlight, unlike the MK58.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/mk78.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: base-overlay
      shader: unshaded
      visible: false
      map: [ "light" ]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSP
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistol
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistolSP
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      cell_slot: !type:ContainerSlot
  - type: HandheldLight
    addPrefix: false
    wattage: 0.5
  - type: ToggleableVisuals
    inhandVisuals:
      left:
      - state: inhand-left-light
        shader: unshaded
      right:
      - state: inhand-right-light
        shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/mk78.rsi
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
    storedRotation: 0
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/mk78.rsi
    storedOffset: 0,-2
  - type: Gun
    fireRate: 5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg

- type: entity
  name: Enforcer
  parent: [WeaponPistolMk58]
  id: WeaponPistolEnforcer
  description: A burst-fire pistol often issued in NanoTransen armories to supplement larger firearms like the Lecter or Kammerer. Unlike the MK 78, the flashlight is attached rather than intergrated.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/enforcer.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: base-overlay
      shader: unshaded
      visible: false
      map: [ "light" ]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    selectedMode: Burst
    fireRate: 5
    burstFireRate: 7
    shotsPerBurst: 2
    burstCooldown: 0.2
    availableModes:
    - SemiAuto
    - Burst
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/enforcer.rsi
  - type: Item
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/enforcer.rsi
    storedOffset: 0,-2
  - type: Tag
    tags:
    - Enforcer
    - Sidearm

