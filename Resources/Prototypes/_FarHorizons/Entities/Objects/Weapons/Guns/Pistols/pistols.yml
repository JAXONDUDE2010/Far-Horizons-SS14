#region =Neutral=





#region Stock Enforcer
- type: entity
  name: Enforcer
  parent: [BaseWeaponPistol, BaseSecurityContraband]
  id: WeaponPistolEnforcer
  description: A burst-fire pistol typically utilized by law-enforcement in most regions alongisde MK variants manufactured by NeoSol and NanoTrasen. Feeds from 9mm Magazines.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/enforcer.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    selectedMode: Burst
    fireRate: 5
    burstFireRate: 7
    shotsPerBurst: 2
    burstCooldown: 0.2
    availableModes:
    - SemiAuto
    - Burst
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/enforcer.rsi
  - type: Item
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/enforcer.rsi
    storedOffset: 0,-2
  - type: Tag
    tags:
    - Enforcer
    - Sidearm

#region Enforcinator
- type: entity
  name: Enforcinator
  parent: [BaseWeaponPistol, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponPistolEnforcinator
  description: What's wrong with you?
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/Enforcinatorx64/enforcinator_x64.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/Enforcinatorx64/enforcinator_x32.rsi
  - type: Item
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/Enforcinatorx64/enforcinator_x32.rsi
    size: Large
    shape:
    - 0,0,3,0
    - 1,1,0,1
    storedOffset: -5,-4
  - type: GunRequiresWield
  - type: GunWieldBonus
    minAngle: -7
    maxAngle: -7
  - type: Gun
    minAngle: 21
    maxAngle: 32
    selectedMode: Burst
    fireRate: 5
    burstFireRate: 7
    shotsPerBurst: 4
    burstCooldown: 0.2
    availableModes:
    - Burst
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
  - type: Sharp
    butcherDelayModifier: 2
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1
    damage:
      types:
        Slash: 18
    soundHit: /Audio/Weapons/bladeslice.ogg
    angle: 0
    animation: WeaponArcThrust
  - type: Tool
    qualities:
      - Slicing
  - type: Execution
  - type: AltFireMelee
    attackType: Heavy
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolDouble
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistolSP
        priority: 1
        whitelist:
          tags:
            - CartridgePistol

#region MK 58
- type: entity
  name: MK 58
  parent: [BaseWeaponPistol, BaseSecurityContraband]
  id: WeaponPistolMk58
  description: The classic. Faithfully serving police and security forces up until a few decades ago, it now serves as a reward to officers who are dedicated to their craft with a nice mahogany grip and silver slide. Seems to handle even better than a standard-issue firearm.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/mk58.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/mk58.rsi
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
    storedRotation: 0
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/mk58.rsi
    storedOffset: 0,-2
  - type: Gun
    fireRate: 5.5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
#region =NanoTrasen=




#region MK78
- type: entity
  name: MK 78
  parent: [BaseWeaponPistol, BaseSecurityContraband, FlashlightLantern]
  id: WeaponPistolMk78
  description: Designed by Nanotrasen’s Small Arms Division, the MK 78 is a semi-automatic pistol with a simple recoil-operated action and excellent reliability. The new standard sidearm of Nanotrasen’s station security and emergency response teams, feeds from .35 pistol magazines. Comes with a intergrated flashlight and electronic status lights, unlike the MK 58. Feeds from 9mm Magazines.
  suffix: NT
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/mk78.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: base-overlay
      shader: unshaded
      visible: false
      map: [ "light" ]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSP
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistol
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistolSP
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      cell_slot: !type:ContainerSlot
  - type: HandheldLight
    addPrefix: false
    wattage: 0.5
  - type: ToggleableVisuals
    inhandVisuals:
      left:
      - state: inhand-left-light
        shader: unshaded
      right:
      - state: inhand-right-light
        shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/mk78.rsi
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
    storedRotation: 0
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/mk78.rsi
    storedOffset: 0,-2
  - type: Gun
    fireRate: 5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
  - type: ChamberMagazineAmmoProvider
    autoEject: true

