      gun_chamber:
        name: Chamber
        startingItem: CartridgePistolSP
        priority: 1
        whitelist:
          tags:
            - CartridgePistol


- type: entity
  name: Pathology
  parent: [BaseWeaponPistol, BaseSecurityContraband]
  id: WeaponPistolPathology
  description: Corpsman's custom-made pistol, posessing a special intergrated knife that partially injects it's contents upon embedding into it's target via a pressure system. Usage of this weapon is more than likely considered a warcrime, thankfully, you're not in a war.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/pathology.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
    - state: base-1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/pathology.rsi
  - type: Item
    storedOffset: 0,-2
  - type: Gun
    fireRate: 5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 20
  - type: MeleeChemicalInjector
    solution: melee
    transferAmount: 2
  - type: RefillableSolution
    solution: melee
  - type: InjectableSolution
    solution: melee
  - type: SolutionTransfer
    maxTransferAmount: 20
  - type: SolutionContainerVisuals
    maxFillLevels: 10
    fillBaseName: base-
    inHandsFillBaseName: -fill-
    inHandsMaxFillLevels: 4
  - type: Sharp
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1
    damage:
      types:
        Slash: 15 # to explain- a knife does 12 slashing at 1.25/s which equates to 15 slashing at 1/s
    soundHit: /Audio/Weapons/bladeslice.ogg
    angle: 0
    animation: WeaponArcThrust
  - type: Execution
  - type: AltFireMelee
    attackType: Heavy
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true

- type: entity
  name: N1984
  parent: [WeaponPistolMk58, BaseGunWieldable]
  id: WeaponPistolN1984
  description: An exceptionally powerful ‘hand cannon’ designed as part of Nanotrasen's BFG initiative. Chambered in .44, the lord’s caliber, it was deemed too costly to produce as part of standard security-issue gear and a handful are supplied to station-side armories instead. Due to the relative rarity of the gun, it's become somewhat of a status symbol among Security officers and Nanotransen officals alike.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/N1984.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: base-overlay
      shader: unshaded
      visible: false
      map: [ "light" ]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/N1984.rsi
  - type: Item
    sprite: _FarHorizons/Objects/Weapons/Guns/Pistols/N1984.rsi
    storedOffset: 0,-2
  - type: GunWieldBonus
    minAngle: -0
    maxAngle: -10
  - type: Gun
    minAngle: 1
    maxAngle: 20
    angleIncrease: 8
    angleDecay: 9
    fireRate: 3
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/hpistol.ogg
      params:
        variation: 0.05
        pitch: 0.8
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
      gun_magazine:
        name: Magazine
        startingItem: MagazineMagnum
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
