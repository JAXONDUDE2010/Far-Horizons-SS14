- type: entity
  name: Taser
  parent: [BaseItem, BaseSecurityContraband]
  id: WeaponHeldTaser
  description: Widely regarded as incredibly ineffective against fleeing suspects and considered out of date for station-side security, it is still provided for officers that prefer a softer touch.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Melee/taser.rsi
    layers:
    - state: icon_off
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Stunbaton
    energyPerUse: 11
  - type: ItemToggle
    predictable: false
    soundActivate:
      collection: sparks
      params:
        variation: 0.250
    soundDeactivate:
      collection: sparks
      params:
        variation: 0.250
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
      params:
        variation: 0.250
  - type: ItemTogglePrefix
    prefixOn: on
    prefixOff: off
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Effects/sparks1.ogg
    activatedDamage:
      types:
        Shock: 0.7
  - type: MeleeWeapon
    autoAttack: true
    attackRate: 4
    wideAnimationRotation: -90
    damage:
      types:
        Blunt: 0
    angle: 0
  - type: StaminaDamageOnHit
    damage: 3.2
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: UseDelay
  - type: Item
    heldPrefix: off
    storedRotation: 90
    storedOffset: 0,-2
    size: Small
  - type: Clothing
    sprite: _FarHorizons/Objects/Weapons/Melee/taser.rsi
    quickEquip: false
    slots:
    - Belt
  - type: DisarmMalus
    malus: 0.225
  - type: Appearance
  - type: GenericVisualizer
    visuals:
     enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon_on}
          False: {state: icon_off}
  - type: StaticPrice
    price: 80
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
      Plastic: 100