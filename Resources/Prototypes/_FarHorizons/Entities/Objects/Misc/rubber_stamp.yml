- type: entity
  name: TOP SECRET classifier rubber stamp
  parent: [RubberStampBase, BaseCommandContraband]
  id: RubberStampSecret
  categories: [ DoNotMap ]
  components:
    - type: Stamp
      stampedName: "TOP SECRET"
      stampedColor: "#b40000"
      stampState: "paper_stamp-secret"
      sound:
        path: /Audio/Items/Stamp/automatic_stamp.ogg
        params:
          volume: -2
          maxDistance: 5
    - type: Sprite
      sprite: _FarHorizons/Objects/Misc/stamps.rsi
      state: stamp-secret

- type: entity
  name: Corpsman rubber stamp
  parent: [RubberStampBase, BaseSecurityContraband]
  id: RubberStampCorpsman
  categories: [ DoNotMap ]
  components:
    - type: Stamp
      stampedName: "Corpsman"
      stampedColor: "#14568B"
      stampState: "paper_stamp-corpsman"
    - type: Sprite
      sprite: _FarHorizons/Objects/Misc/stamps.rsi
      state: stamp-corpsman
