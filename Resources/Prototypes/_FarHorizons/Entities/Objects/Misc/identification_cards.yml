#Base
#region Base

- type: entity
  parent: Clothing
  id: IDCardStandard
  name: Identification Card 
  description: A card necessary to access various areas aboard the station.
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Misc/id_cards.rsi
  - type: Clothing
    slots:
    - idcard
    sprite: _FarHorizons/Objects/Misc/id_cards.rsi
  - type: Item
    size: Small
    heldPrefix: default
    storedRotation: -90
  - type: Access
  - type: IdCard
  - type: StationRecordKeyStorage
  - type: Tag
    tags:
    - DoorBumpOpener
    - WhitelistChameleon
    - WhitelistChameleonIdCard
  - type: StealTarget
    stealGroup: IDCard

#endregion

