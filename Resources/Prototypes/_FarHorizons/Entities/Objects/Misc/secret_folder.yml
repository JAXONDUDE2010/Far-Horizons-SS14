- type: entity
  id: BoxFolderSecret
  parent: BoxBase
  name: TOP SECRET documents folder
  suffix: Captain
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Misc/secret_folder.rsi
      state: secret_folder
      layers: []
    - type: Item
      storedSprite:
        sprite: _FarHorizons/Objects/Misc/secret_folder.rsi
        state: secret_folder
      size: Small
      shape: null
    - type: Lock
    - type: AccessReader
      access: [ [ "Captain" ] ]  # TODO: make other secret folders
    - type: ContainerContainer
      containers:
        SecretFolder-privilegedId: !type:ContainerSlot
        storagebase: !type:Container
    - type: Storage
      maxItemSize: Small
      grid:
        - 0,0,4,3
      whitelist:
        tags:
          - Document
    - type: StorageFill
      contents:
        - id: Paper  # TODO: secret content and stamp
