- type: entity
  parent: PlushieHuman
  id: PlushieFuria
  name: Furia Plushie
  description: A model Security Officer... most of the time. Pair her with Romero and Amali for an unstoppable trio!
  components:
    - type: Item
      size: Small
      sprite: _FarHorizons/Objects/Fun/Plushies/furia_plushie.rsi
    - type: Sprite
      sprite: _FarHorizons/Objects/Fun/Plushies/furia_plushie.rsi
      layers:
        - state: icon
    - type: EmitSoundOnUse
      sound:
        path: /Audio/Voice/Human/womanlaugh.ogg
    - type: EmitSoundOnLand
      sound:
        path: /Audio/Voice/Human/femalescream_5.ogg
    - type: EmitSoundOnActivate
      sound:
        path: /Audio/Voice/Human/womanlaugh.ogg
    - type: EmitSoundOnTrigger
      sound:
        path: /Audio/Voice/Human/femalescream_5.ogg
    - type: EmitSoundOnCollide
      sound:
        path: /Audio/Voice/Human/femalescream_5.ogg
    - type: MeleeWeapon
      wideAnimationRotation: 180
      soundHit:
        path: /Audio/Items/Handcuffs/cuff_start.ogg
    - type: ItemToggle
      onUse: false
      verbToggleOn: plushie-voicebox-activate
      verbToggleOff: plushie-voicebox-deactivate
    - type: ComponentToggler
      components:
        - type: DatasetVocalizer
          dataset: PlushiesFuria
        - type: TextToSpeech
          voice: venti