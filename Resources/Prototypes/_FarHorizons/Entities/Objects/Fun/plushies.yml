- type: entity
  parent: BaseLizardPlushie
  id: PlushieBreaks 
  name: Guards Plushie # far horizons | im gonna fucking loose it
  description: Guarding your sector at the low cost of your sanity! #yeah my sanitys gone too
  components:
  - type: Item
    size: Small
    sprite: _FarHorizons/Objects/Fun/Plushies/breaks_plushie.rsi
  - type: Sprite
    sprite: _FarHorizons/Objects/Fun/Plushies/breaks_plushie.rsi
    state: icon
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Animals/wawa_yawn.ogg # far horizons | changing this because of wizden removing liz happy cus copyright
  - type: EmitSoundOnLand
