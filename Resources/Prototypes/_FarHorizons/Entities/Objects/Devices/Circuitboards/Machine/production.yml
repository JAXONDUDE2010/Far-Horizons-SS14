- type: entity
  id: AutofabMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: Autofab Machine Board
  description: A machine printed circuit board for an Autofab.
  components:
    - type: MachineBoard
      prototype: Autofab
      stackRequirements:
        Manipulator: 4
        Glass: 1

- type: entity
  parent: BaseMachineCircuitboard
  id: AutofabSubzeroMachineCircuitboard
  name: Subzero Autofab Machine Board
  description: A machine printed circuit board for a Subzero Autofab.
  components:
  - type: MachineBoard
    prototype: AutofabSubzero
    stackRequirements:
      Manipulator: 3
      Glass: 1
      Cable: 10

- type: entity
  id: ProtofabMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: Protofab Machine Board
  description: A machine printed circuit board for a Protofab.
  components:
