#region Base

- type: entity
  abstract: true
  parent: BaseItem
  id: EncryptionKeySyndi
  name: encryption key
  description: A small cypher chip for headsets.
  components:
  - type: EncryptionKey
  - type: Item
    sprite: /_FarHorizons/Objects/Devices/syndicate_encryption_keys.rsi
  - type: Sprite
    sprite: /_FarHorizons/Objects/Devices/syndicate_encryption_keys.rsi

- type: entity
  abstract: true
  parent: BaseItem
