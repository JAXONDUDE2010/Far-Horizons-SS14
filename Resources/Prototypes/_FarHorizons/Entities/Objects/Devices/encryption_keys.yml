  name: Station-Executive Encryption Key
  description: An encryption key used by someone working very high up at a NeoSol Station.
  components:
  - type: EncryptionKey
    channels:
    - SyndiCommand
    - SyndiSec
    - SyndiEngi
    - SyndiSci
    - SyndiMed
    - SyndiService
    - SyndiCommon
    - GSL # Why was there a FH comment on a FH based file... Guh My stupidity is big.
    - CFA
    defaultChannel: SyndiCommand
  - type: Sprite
    layers:
    - state: crypt_gold
    - state: cap_label


