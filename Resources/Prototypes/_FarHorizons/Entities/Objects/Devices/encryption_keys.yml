#region Base

- type: entity
  abstract: true
  parent: BaseItem
  id: EncryptionKeySyndi
  name: Encryption Key
  description: A small cipher chip for headsets.
  suffix: S
  components:
  - type: EncryptionKey
  - type: Item
    sprite: /Textures/_FarHorizons/Objects/Devices/syndicate_encryption_keys.rsi
  - type: Sprite
    sprite: /Textures/_FarHorizons/Objects/Devices/syndicate_encryption_keys.rsi

#region misc stuff

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyTrinary
  name: trinary combination encryption & translator key
  description: Obtaining such a complex key typically requires violently ripping it out from an IPC or Protogen.
  components:
    - type: EncryptionKey
      channels:
      - Trinary
      defaultChannel: Trinary
    - type: Sprite
      layers:
      - state: crypt_silver
      - state: ai_label

- type: entity
  parent: [ EncryptionKey, BaseSecurityContraband ]
  id: EncryptionKeySecurityMedical
  name: sec-med encryption key
  description: An encryption key used by someone who both takes and saves lives.
  components:
  - type: EncryptionKey
    channels:
    - Security
    - Medical
    defaultChannel: Security
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: secmed_label

- type: entity
  parent: [ EncryptionKey, BaseNanotrasenContraband ] #both name and sprites are placeholders, can easily change later
  id: EncryptionKeyLambda
  name: Lambda Encryption Key
  suffix: NT
  description: An encryption key used by someone with a lotta fancy gear.
  components:
  - type: EncryptionKey
    channels:
    - Lambda
    defaultChannel: Lambda
  - type: Sprite
    layers:
    - state: crypt_silver
    - state: nano_label

