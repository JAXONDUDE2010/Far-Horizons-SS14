- type: entity
  parent: BaseMedicalPDA
  id: CorpsmanPDA
  name: corpsman PDA
  description: The pulse looks attuned to the beat of your own heart.
  components:
  - type: Pda
    id: CorpsmanIDCard
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-brigmedic
  - type: PdaBorderColor
    borderColor: "#A32D26"
    accentHColor: "#d7d7d0"
    accentVColor: "#d7d7d0"
  - type: Icon
    state: pda-brigmedic
  - type: CartridgeLoader
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NanoTaskCartridge
    - NewsReaderCartridge
    - WantedListCartridge
    - MedTekCartridge

