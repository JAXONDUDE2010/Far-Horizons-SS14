#Medical

- type: entity
  parent: BaseMedicalPDA
  id: SurgeonPDA
  name: Surgeon PDA
  description: Shiny and sterile, for the most part. You can see some bloodstains around the edges if you look close enough.
  components:
  - type: Pda
    id: SurgeonIDCard
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-medical
  - type: PdaBorderColor
    borderColor: "#d7d7d0"
    accentVColor: "#447987"
  - type: Icon
    state: pda-medical

- type: entity
