- type: entity
  parent: [BaseItem, BaseNanotrasenContraband]
  id: NTChameleonProjectorNoBattery
  name: chameleon projector
  description: Holoparasite technology used to create a hard-light replica of any object around you. Disguise is destroyed when picked up or deactivated.
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Devices/nt_chameleon_projector.rsi
    layers:
    - state: icon
    - state: powered
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
    - state: decharging
      map: [ "enum.PowerDeviceVisualLayers.Charging" ]
      visible: false
  - type: ChameleonProjector
    whitelist:
      components:
      - Anchorable
      - Item
      tags:
      - Bot
    blacklist:
      components: 
      - ChameleonDisguise 
      - Door 
      - MindContainer 
      - Pda 
      - SubFloorHide 
      tags:
      - Catwalk 
      - Wall 
      - Window 
    disguiseProto: ChameleonDisguise
  - type: StaticPrice
    price: 5000

- type: entity
  parent: NTChameleonProjectorNoBattery
  id: NTChameleonProjector
  name: chameleon projector
  description: Holoparasite technology used to create a hard-light replica of any object around you. Disguise is destroyed when picked up or deactivated.
  suffix: Battery
  components:
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.BatteryVisuals.State:
        enum.PowerDeviceVisualLayers.Powered:
          Full: { visible: true }
          Neither: { visible: true }
          Empty: { visible: false }
      enum.BatteryVisuals.Charging:
        enum.PowerDeviceVisualLayers.Charging:
          Charging: { visible: false }
          Decharging: { visible: true }
          Constant: { visible: false }
  - type: BatteryVisuals
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: PowerCellDraw
    drawRate: 4 # About 3 minutes with a medium cell.
  - type: ToggleCellDraw
  - type: ItemToggle
    onActivate: false
    onUse: false