- type: entity
  parent: FoodBakingBase
  id: FoodCheeseMagical
  name: Magical Cheese Wedge
  description: A piece of magical cheese summoned from a whole different dimension... Why is it slightly blue...?
  components:
  - type: FlavorProfile
    flavors:
      - terrible
      - cheesy
  - type: Sprite
    color: "#728FCE"
    state: cheesewedge
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: Nutriment
          Quantity: 3.75
  - type: Tag
    tags:
    - Slice
    - Paper
  - type: FoodSequenceElement
    entries:
      Taco: CheeseTaco
      Burger: CheeseBurger
  - type: Item
    size: Tiny
    storedOffset: 0,-3
    inhandVisuals:
      left:
      - state: cheesewedge-inhand-left
      right:
      - state: cheesewedge-inhand-right