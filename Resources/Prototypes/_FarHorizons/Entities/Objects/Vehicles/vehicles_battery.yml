- type: entity
  id: VehicleJanicart
  parent: VehicleBatteryBuckleBase
  name: Janicart
  description: The janitor's trusty steed.
  components:
  - type: VehicleBuckle
    armorAffectsVehicle: true
  - type: Vehicle
    brokenState: destroyed
    handsNeeded: 2
  - type: Sprite
    drawdepth: OverMobs
    sprite: Objects/Vehicles/janicart.rsi
    layers:
    - state: vehicle
      map: ["enum.VehicleVisualLayers.Base"]
    noRot: true
  - type: ItemSlots
    slots:
      key_slot:
        name: Keys
        whitelist:
          requireAll: true
          tags:
          - VehicleKey
          - JanicartKeys
      trashbag_slot:
        name: janitorial-trolley-slot-component-slot-name-trashbag
        whitelist:
          tags:
            - TrashBag
  - type: SolutionContainerManager
    solutions:
      watertank:
        maxVol: 100
  - type: RefillableSolution
    solution: watertank
  - type: ExaminableSolution
    solution: watertank
    exactVolume: true
  - type: ReagantDraw
    enabled: false
    solutionContainer: watertank
    whitelistedReagants: 
    - Water
    drainRate: 1
  - type: ItemMapper
    mapLayers:
      storage:
        whitelist:
          tags:
            - TrashBag
    sprite: Objects/Vehicles/janicart.rsi
  - type: FloorBuffer
    solutionContainer: watertank
  - type: AmbientSound
    sound: "/Audio/_FarHorizons/Machines/floor_buffer.ogg"
    range: 10
    volume: -5
    enabled: false

- type: entity
  id: VehicleJanicartFilled
  parent: VehicleJanicart
  suffix: Filled, Keys
  components: 
    - type: SolutionContainerManager
      solutions:
        watertank:
          reagents:
          - ReagentId: Water
            Quantity: 100
          maxVol: 100
    - type: ContainerFill
      containers:
        cell_slot:
        - PowerCellMedium
        key_slot:
        - VehicleKeyJanicart
    - type: VehicleMods
      vehicleType: Electric
      startingEquipment:
        - BasicTires
        - ElectricEngine
        - BasicHeadlight

