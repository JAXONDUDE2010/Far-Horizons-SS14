#region Buckle Vehicles
- type: entity
  id: VehicleBatteryBuckleBase
  abstract: true
  save: false
  parent: BaseVehicleRideableDamageable
  components:
    - type: Strap
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.4
          density: 100
          restitution: 0.0
          mask:
          - MobMask
          layer:
          - MobLayer
    - type: ContainerContainer
      containers:
        key_slot: !type:ContainerSlot
        cell_slot: !type:ContainerSlot
        vehicle_mods_container: !type:Container
    - type: PowerCellSlot
      cellSlotId: cell_slot
      fitsInCharger: false
    - type: PowerCellDraw
      enabled: false
    - type: FootstepModifier
      footstepSoundCollection:
        path: /Audio/Effects/Footsteps/borgwalk4.ogg
        params:
          pitch: 1.15
          variation: 0.05
    - type: Vehicle
      requireIgnition: true 
      baseState: vehicle
      brokenState: vehicle_broken
      startupTime: 2
      handsNeeded: 1
      riderWhitelist:
        tags:
          - CanPilot
      disallowWielding: true
      allowGunKnockback: true
      soundHit:
        collection: MetalThud
    - type: VehicleBuckle
      unbuckleTime: 2
      dismountOnStun: true
      dismountOnKnockdown: true
      northOffset: "0, -0.12"
      southOffset: "0, -0.12"
      eastOffset: "0, -0.2"
      westOffset: "-0, -0.2"
      northDrawDepth: BelowMobs
    - type: VehicleMods
      vehicleType: Electric
      equipmentSlots: [tires, engine, armor, headlight]

#region NT
- type: entity
  id: VehicleSecway
  parent: [VehicleBatteryBuckleBase, BaseSecurityContraband]
  name: Secway
  description: The future of transportation. Popularized by St. James, the patron saint of security officers and internet forum moderators.
  suffix: NT
  components:
  - type: ItemSlots
    slots:
      key_slot:
        name: Keys
        whitelist:
          requireAll: true
          tags:
          - VehicleKey
          - SecwayKeys
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        disableEject: true
        swap: true
  - type: Sprite
    drawdepth: OverMobs
    sprite: _FarHorizons/Objects/Vehicles/secway.rsi
    layers:
    - state: vehicle
      map: ["enum.VehicleVisualLayers.Base"]
    noRot: true
  - type: VehicleBuckle
    armorAffectsVehicle: true
  - type: VehicleMods
    vehicleType: Electric
    equipmentSlots: [tires, engine, armor, headlight, lightbar]
  - type: ItemMapper
    mapLayers:
      lightarmor:
        whitelist:
          tags:
            - VehicleLightArmor
  - type: StealTarget
    stealGroup: VehicleSecwaySteal
  - type: Tag
    tags:
    - Secway
    - DoorBumpOpener
    - FootstepSound

- type: entity
  id: VehicleSecwayFilled
  parent: VehicleSecway
  suffix: Filled, NT
  components: 
    - type: ContainerFill
      containers:
        cell_slot:
        - PowerCellMedium
        key_slot:
        - VehicleKeySecway
    - type: VehicleMods
      startingEquipment:
        - BasicTires
        - ElectricEngine
        - BasicArmorKit
        - BasicHeadlight
        - SecSiren

- type: entity
  id: VehicleSecwayArmoredLight
  parent: VehicleSecway
  suffix: Filled, NT, Armored
  components: 
    - type: ContainerFill
      containers:
        cell_slot:
        - PowerCellMedium
        key_slot:
        - VehicleKeySecway
    - type: VehicleMods
      startingEquipment:
        - BasicTires
        - ElectricEngine
        - LightArmorKit
        - BasicHeadlight
        - SecSiren

- type: entity
  id: VehicleSecwayTurbo
  parent: VehicleSecway
  name: Secway Turbo
  description: An upgraded Secway, it is better in every single aspect.
  components:
