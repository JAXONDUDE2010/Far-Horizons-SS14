        map: ["enum.VehicleVisualLayers.Base"]
      noRot: true
    - type: ItemSlots
      slots:
        key_slot:
          name: Keys
          whitelist:
            requireAll: true
            tags:
            - VehicleKey
            - SecwayTurboKeys
