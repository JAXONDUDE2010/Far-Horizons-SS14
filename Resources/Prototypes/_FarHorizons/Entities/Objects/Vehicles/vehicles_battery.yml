#region Sec/Seg ways
- type: entity
  id: VehicleSecway
  parent: [BaseVehicleSecway, BaseSecurityContraband]
  name: Secway
  description: The future of transportation. Popularized by St. James, the patron saint of security officers and internet forum moderators.
  suffix: NT
  components:
  - type: StealTarget
    stealGroup: VehicleSecwaySteal
  - type: Tag
    tags:
    - Secway

- type: entity
  id: VehicleSecwayBatterywithKeys
  parent: VehicleSecway
  suffix: Battery, Keys, NT
  components: 
    - type: ContainerFill
      containers:
        cell_slot:
        - PowerCellMedium
        key_slot:
        - VehicleKeySecway
        vehicle_mods_container:
        - SecwayLight
        - SecSiren

- type: entity
  id: VehicleSecwayArmoredLightBatteryNT
  parent: VehicleSecway
  suffix: Battery, NT
  description: A simple yet efficent modifcation of station-issued Secways, able to hold up to light arms fire fairly well.
  name: Lightly Armored Secway
  components:
    - type: Sprite
      drawdepth: OverMobs
      sprite: _FarHorizons/Objects/Vehicles/Armored/nanotransen_secway_armored_light.rsi
      layers:
      - state: vehicle
        map: ["enum.VehicleVisualLayers.Base"]
      noRot: true
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 200
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:SpawnEntitiesBehavior
          spawn:
            VehicleSecwayBatterywithKeys:
              min: 1
              max: 1
    - type: Damageable
      damageContainer: StructuralInorganic
      damageModifierSet: VehicleLightArmor
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.4
          density: 100
          restitution: 0.0
          mask:
          - MobMask
          layer:
          - MobLayer
    - type: ContainerFill
      containers:
        cell_slot:
        - PowerCellMedium
        vehicle_mods_container:
        - SecwayLightBright
        - SecSiren
    - type: Construction
      graph: SecwayArmoredLightGraph
      node: vehicle

- type: entity
  id: VehicleSecwayTurboBatterywithKeys
  parent: VehicleSecway
  name: Secway Turbo
  suffix: Battery, Keys, NT
  description: An upgraded Secway, it is better in every single aspect.
  components:
    - type: MovementSpeedModifier
      baseWalkSpeed: 6
      baseSprintSpeed: 9
    - type: Sprite
      drawdepth: OverMobs
      sprite: _FarHorizons/Objects/Vehicles/secway_turbo.rsi
      layers:
      - state: vehicle
        map: ["enum.VehicleVisualLayers.Base"]
      noRot: true
    - type: ItemSlots
      slots:
        key_slot:
          name: Keys
          whitelist:
            requireAll: true
            tags:
            - VehicleKey
            - SecwayTurboKeys
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          # Swappable batteries until we can get secway recharge stations
          disableEject: true
          #swap: false
    - type: PowerCellDraw
      drawRate: 1.5 # Eats through cells
      enabled: false 
    - type: ContainerFill
      containers:
        cell_slot:
        - PowerCellMedium
        key_slot:
        - VehicleKeySecwayTurbo
        vehicle_mods_container:
        - SecwayLight
        - SecSiren

- type: entity
  id: VehicleSegwayBatterywithKeys
  parent: VehicleSecway
  suffix: Battery, Keys
  name: Segway
  components:
    - type: Sprite
      drawdepth: OverMobs
      sprite: _FarHorizons/Objects/Vehicles/segway.rsi
      layers:
      - state: vehicle
        map: ["enum.VehicleVisualLayers.Base"]
      noRot: true 
    - type: ItemSlots
      slots:
        key_slot:
          name: Keys
          whitelist:
            requireAll: true
            tags:
            - VehicleKey
            - SegwayKeys
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          disableEject: true
          # Swappable batteries until we can get secway recharge stations
          #swap: false 
    - type: ContainerFill
      containers:
        cell_slot:
        - PowerCellMedium
        key_slot:
        - VehicleKeySegway
    - type: Tag
      tags:
      - Segway

