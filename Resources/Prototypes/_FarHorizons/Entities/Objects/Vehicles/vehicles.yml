- type: entity
  id: BaseVehicle
  components:
  - type: AmbientSound
    sound: "/Audio/Effects/Vehicle/vehicleengineidle.ogg"
    range: 10
    volume: -5
    enabled: false
  - type: MovementSpeedModifier
    baseWalkSpeed: 4.5
    baseSprintSpeed: 6
  - type: Tag
    tags:
      - DoorBumpOpener
      - FootstepSound

- type: entity
  parent: BaseVehicle
  id: BaseVehicleRideable
  abstract: true
  name: Vehicle
  components:
  - type: InputMover
  - type: MobMover
  - type: Rotatable
  - type: InteractionOutline
  - type: Pullable
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        density: 360
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - TableLayer
  - type: Appearance
  - type: StaticPrice
    price: 750 # Grand Theft Auto.

- type: entity
  parent: BaseVehicleRideable
  id: BaseVehicleRideableDamageable
  name: VehicleDamageable
  components:
  - type: Repairable
    fuelcost: 20
    doAfterDelay: 20
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:ExplodeBehavior

- type: entity
  id: VehicleWheelchair
  parent: [BaseVehicleRideable, BaseFoldable, BaseItem]
  name: wheelchair
  description: A chair with big wheels. It looks like you can move in these on your own.
  components:
    - type: Sprite
      sprite: Objects/Vehicles/wheelchair.rsi
      layers:
      - state: wheelchair
        map: ["enum.VehicleVisualLayers.AutoAnimate", "unfoldedLayer"]
      - state: wheelchair_folded
        map: ["foldedLayer"]
        visible: false
      noRot: true
    - type: Vehicle
      acceleration: 2 # higher acceleration the faster it reaches max baseSpeed
      friction: 2 # higher friction counteracts the current speed so higher makes it easier to turn but has the inverse effect also it counter acts acceleration
      frictionNoInput: 2 # same as friction but for when the user doesn't input anything so lower friction means it will take them longer to stop
      requireIgnition: false 
      baseState: wheelchair
    - type: VehicleBuckle
      unbuckletime: 1
      dismountonstun: true
      dismountonknockdown: true
      northOffset: "0, -0.15"
      southOffset: "0, -0.15"
      eastOffset: "0, -0.15"
      westOffset: "-0, -0.15"
      northDrawDepth: OverMobs
      southDrawDepth: BelowMobs
      eastDrawDepth: OverMobs
      westDrawDepth: OverMobs
    - type: MovementSpeedModifier
      baseSprintSpeed: 4.5
      baseWalkSpeed: 2.5
    - type: Strap
      buckleOffset: "0,0"
      maxBuckleDistance: 1
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.2
          density: 360
          restitution: 0.0
          mask:
            - MobMask
    - type: StaticPrice
      price: 70

- type: entity
  parent: VehicleWheelchair
  id: VehicleWheelchairFolded
  suffix: folded
  components:
    - type: Foldable
      folded: true

- type: entity
  id: VehicleSecway
  parent: BaseVehicleRideable
  name: secway
  description: The future of transportation. Popularized by St. James, the patron saint of security officers and internet forum moderators.
  components:
  - type: Vehicle
    acceleration: 2
    friction: 4.5
    frictionNoInput: 4.5
    requireIgnition: true 
    baseState: vehicle
    startupTime: 2
  - type: VehicleBuckle
    unbuckletime: 2
    dismountonstun: true
    dismountonknockdown: true
    northOffset: "0, -0.12"
    southOffset: "0, -0.12"
    eastOffset: "0, -0.2"
    westOffset: "-0, -0.2"
    northDrawDepth: BelowMobs
    southDrawDepth: OverMobs
    eastDrawDepth: OverMobs
    westDrawDepth: OverMobs
  - type: Sprite
    sprite: Objects/Vehicles/secway.rsi
    layers:
    - state: vehicle
      map: ["enum.VehicleVisualLayers.AutoAnimate"]
    noRot: true
  - type: Strap
    maxBuckleDistance: 1
  - type: MovementSpeedModifier
    baseWalkSpeed: 6
    baseSprintSpeed: 9
  - type: ItemSlots
    slots:
      key_slot:
        name: Keys
        whitelist:
          requireAll: true
          tags:
          - VehicleKey
          - SecwayKeys
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
        # Swappable batteries until we can get secway recharge stations
        #disableEject: true
        #swap: false 
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: false
  - type: PowerCellDraw
    drawRate: 1
    enabled: false
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Effects/Footsteps/borgwalk4.ogg

- type: entity
  id: VehicleATV
  parent: BaseVehicleRideable
  name: ATV
  description: All-Tile Vehicle.
  components:
  - type: RandomMetadata
    descriptionSegments: [DescriptionsATV]
  - type: MovementSpeedModifier
    baseWalkSpeed: 10
    baseSprintSpeed: 15
  - type: Vehicle
    acceleration: 2
    friction: 4.5
    frictionNoInput: 4.5
    requireIgnition: true 
    baseState: vehicle
    startupTime: 2
    startUp: 
      path: /Audio/Effects/Vehicle/vehiclestartup.ogg
      params:
        volume: -3
  - type: VehicleBuckle
    unbuckletime: 2
    dismountonstun: true
    dismountonknockdown: true
    ejectOnCrash: true
    ejectionSpeed: 12
    northOffset: "0, -0.12"
    southOffset: "0, -0.12"
    eastOffset: "0, -0.2"
    westOffset: "-0, -0.2"
    northDrawDepth: OverMobs
    southDrawDepth: OverMobs
    eastDrawDepth: BelowMobs
    westDrawDepth: BelowMobs
  - type: Sprite
    sprite: Objects/Vehicles/atv.rsi
    layers:
    - state: vehicle
      map: ["enum.VehicleVisualLayers.AutoAnimate"]
    noRot: true
  - type: Strap
    maxBuckleDistance: 1
  - type: ItemSlots
    slots:
      key_slot:
        name: Keys
        whitelist:
          requireAll: true
          tags:
          - VehicleKey
          - ATVKeys
  - type: SolutionContainerManager
    solutions:
      fueltank:
        #reagents:
        #- ReagentId: WeldingFuel
        #  Quantity: 1000
        maxVol: 250
  - type: RefillableSolution
    solution: fueltank
  - type: ExaminableSolution
    solution: fueltank
    exactVolume: true
  - type: ReagantDraw
    enabled: false
    solutionContainer: fueltank
    whitelistedReagants: 
    - WeldingFuel
    drainRate: 0.25
  - type: UnpoweredFlashlight
  - type: PointLight
    enabled: false
    radius: 3.5
    softness: 2
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/_FarHorizons/Vehicles/atvwalk.ogg
      params:
        volume: -8
        pitch: 0.9
        variation: 0.10