- type: entity
  id: BaseVehicle
  save: false
  abstract: true
  components:
  - type: AmbientSound
    sound: "/Audio/Effects/Vehicle/vehicleengineidle.ogg"
    range: 10
    volume: -5
    enabled: false
  - type: Tag
    tags:
      - DoorBumpOpener
      - FootstepSound
  - type: ActionsContainer

- type: entity
  parent: BaseVehicle
  id: BaseVehicleRideable
  abstract: true
  save: false
  name: Vehicle
  components:
  - type: InputMover
  - type: MobMover
  - type: MovementSpeedModifier
    baseSprintSpeed: 0
    baseWalkSpeed: 0
    baseAcceleration: 0.1
    baseFriction: 1
  - type: InteractionOutline
  - type: Pullable
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: Appearance
  - type: StaticPrice
    price: 750 # Grand Theft Auto.
  - type: GravityAffected

- type: entity
  parent: BaseVehicleRideable
  id: BaseVehicleRideableDamageable
  abstract: true
  save: false
  name: VehicleDamageable
  components:
  - type: Repairable
    doAfterDelay: 20
    qualityNeeded: Anchoring
  - type: Pierceable 
    level: HardenedMetal
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Breakage"]
      - !type:EmptyContainersBehaviour
        containers:
        - storagebase
  - type: ActivatableUI
    key: enum.VehicleEquipmentUiKey.Key
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.VehicleEquipmentUiKey.Key:
        type: VehicleEquipmentBoundUserInterface

- type: entity
  id: VehicleWheelchair
  parent: [BaseVehicleRideable, BaseFoldable, BaseItem]
  name: Wheelchair
  description: A chair with big wheels. It looks like you can move in these on your own.
  components:
    - type: Sprite
      drawdepth: BelowMobs
      sprite: _FarHorizons/Objects/Vehicles/wheelchair.rsi 
      layers:
      - state: wheelchair
        map: ["enum.VehicleVisualLayers.Base", "unfoldedLayer"]
      - state: wheelchair_folded
        map: ["foldedLayer"]
        visible: false
      noRot: true
    - type: Vehicle
      requireIgnition: false 
      baseState: wheelchair
      handsNeeded: 0
      riderWhitelist:
        tags:
          - CanPilot
      soundHit:
        collection: MetalThud
    - type: VehicleBuckle
      unbuckleTime: 1
      dismountOnStun: true
      dismountOnKnockdown: true
      armorAffectsVehicle: true
      northOffset: "0, -0.15"
      southOffset: "0, -0.15"
      eastOffset: "0, -0.15"
      westOffset: "-0, -0.15"
      southDrawDepth: BelowMobs
    - type: MovementSpeedModifier
      baseSprintSpeed: 4.5
      baseWalkSpeed: 2.5
      baseAcceleration: 2 
      baseFriction: 0.25 #Friction is dynamically updated apparently eugh
    - type: Strap
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.2
          density: 50
          restitution: 0.0
          mask:
            - MobMask
    - type: FootstepModifier
      footstepSoundCollection:
        path: /Audio/Effects/Footsteps/borgwalk1.ogg
        params:
          pitch: 0.75
          variation: 0.05
    - type: StaticPrice
      price: 70

- type: entity
  parent: VehicleWheelchair
  id: VehicleWheelchairFolded
  suffix: folded
  components:
    - type: Foldable
      folded: true
    - type: Strap
      enabled: false

- type: entity
  id: VehicleUnicycle
  parent: [BaseVehicleRideable, BaseFoldable, BaseItem]
  name: Unicycle
  description: It only has one wheel!
  components:
    - type: Sprite
      drawdepth: BelowMobs
      sprite: Objects/Vehicles/unicycle.rsi
      layers:
      - state: vehicle
        map: ["enum.VehicleVisualLayers.Base", "unfoldedLayer"]
      - state: vehicle_folded
        map: ["foldedLayer"]
        visible: false
      noRot: true
    - type: Vehicle
      requireIgnition: false 
      baseState: vehicle
      handsNeeded: 0
      riderWhitelist:
        tags:
          - CanPilot
      hornSound: 
        path: /Audio/Effects/Vehicle/bicyclebell.ogg
      soundHit:
        collection: MetalThud
    - type: VehicleBuckle
      unbuckleTime: 1
      dismountOnStun: true
      dismountOnKnockdown: true
      armorAffectsVehicle: true
      northOffset: "0, -0.25"
      southOffset: "0, -0.25"
      eastOffset: "0, -0.25"
      westOffset: "-0, -0.25"
      eastDrawDepth: BelowMobs
      westDrawDepth: BelowMobs
    - type: MovementSpeedModifier
      baseSprintSpeed: 4.5
      baseWalkSpeed: 2.5
      baseAcceleration: 1 
      baseFriction: 0.1
    - type: Strap
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.2
          density: 50
          restitution: 0.0
          mask:
            - MobMask
    - type: FootstepModifier
      footstepSoundCollection:
        path: /Audio/Effects/Footsteps/borgwalk1.ogg
        params:
          pitch: 0.75
          variation: 0.05
    - type: StaticPrice
      price: 70

- type: entity
  parent: VehicleUnicycle
  id: VehicleUnicycleFolded
  suffix: folded
  components:
    - type: Foldable
      folded: true
    - type: Strap
      enabled: false