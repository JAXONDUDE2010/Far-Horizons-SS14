- type: entity
  id: VehicleSpaceshipProto
  parent: BaseVehicleRideableDamageable
  components: 
  - type: IntrinsicUI
    uis:
      enum.RadarConsoleUiKey.Key:
        toggleAction: ActionAGhostShowRadar
  - type: UserInterface
    interfaces:
      enum.RadarConsoleUiKey.Key:
        type: RadarConsoleBoundUserInterface
  - type: RadarConsole
    followEntity: true
  - type: VehicleCabinAir

- type: entity
  id: VehicleTransport
  parent: VehicleSpaceshipProto
  name: Transporter
  description: Basic space faring vehicle dedicated to the transport of good or exploration.
  components:
  - type: Vehicle
    cellPowered: false
    requireIgnition: true
    allowCrashing: true
    baseState: vehicle
    brokenState: vehicle_broken
    startupTime: 2
    startUp: 
      path: /Audio/Effects/Vehicle/vehiclestartup.ogg
      params:
        volume: -3
    hornSound: 
      path: /Audio/Effects/Vehicle/carhorn.ogg
      params:
        volume: -3
    riderWhitelist:
      components:
        - HumanoidAppearance
    soundHit:
      collection: MetalThud
  - type: VehicleContainer
    seats: 1
    passengerWhitelist:
      components:
        - Body
  - type: CanMoveInAir
  - type: MovementAlwaysTouching
  - type: Sprite
    drawdepth: OverMobs
    sprite: _FarHorizons/Objects/Vehicles/transporter.rsi
    layers:
    - state: vehicle
      map: ["enum.VehicleVisualLayers.Base"]
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        density: 360
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: ItemSlots
    slots:
      key_slot:
        name: Keys
        whitelist:
          requireAll: true
          tags:
          - VehicleKey
          - ATVKeys
  - type: ContainerContainer
    containers:
      key_slot: !type:ContainerSlot
      vehicle_mods_container: !type:Container
  - type: SolutionContainerManager
    solutions:
      fueltank:
        maxVol: 150
  - type: RefillableSolution
    solution: fueltank
  - type: ExaminableSolution
    solution: fueltank
    exactVolume: true
  - type: ReagantDraw
    enabled: false
    solutionContainer: fueltank
    whitelistedReagants: 
    - WeldingFuel
    drainRate: 0.25
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/_FarHorizons/Vehicles/atvwalk.ogg
      params:
        volume: -11
        pitch: 1.15
        variation: 0.10
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Breakage"]
      - !type:EmptyContainersBehaviour
        containers:
        - storagebase
  - type: Hitch
  - type: VehicleMods
    vehicleType: Spaceship
    startingEquipment:
      - StandardTires
      - GroundEngine
      - ATVHeadlight
      - VehicleAirTankFilled
      - VehicleAirTank
      - VentFan
      - BasicThrusters
    equipmentSlots: [TIRES, ENGINE, ARMOR, HEADLIGHT, AIRTANK, WASTETANK, VENTFAN, THURSTERS, BOOSTER]

- type: entity
  id: VehicleTransportFueledwithKeys
  parent: VehicleTransport
  suffix: Fueled, Keys
  components: 
    - type: SolutionContainerManager
      solutions:
        fueltank:
          reagents:
          - ReagentId: WeldingFuel
            Quantity: 150
          maxVol: 150
    - type: ContainerFill
      containers:
        key_slot:
        - VehicleKeyATV