- type: entity
  id: ATVHeadlight
  parent: BaseItem
  name: ATV Headlight
  description: Standard headlight for ATVs. Mostly used to distract tiders as you run over them like they're deer in the middle of the road. 
  components:
    - type: UnpoweredFlashlight
    - type: PointLight
      enabled: false
      radius: 10
      softness: 2
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      containerOccluded: true
    - type: Sprite
      sprite: Objects/Power/light_bulb.rsi
      layers:
        - map: [ enum.LightBulbVisualLayers.Base ]
          state: normal
    - type: VehicleEquipment
      actionProto: ActionToggleLight
      slot: headlight
      allowedVehicles: [Electric, Gas, Spaceship]
      
- type: entity
  id: SecwayLight
  parent: BaseItem
  name: Secway Light
  description: Standard light for Secways. Excellent for seeing those maints grilles before you crash into them! 
  components:
    - type: UnpoweredFlashlight
    - type: PointLight
      enabled: false
      radius: 5
      softness: 2
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      containerOccluded: true
    - type: Sprite
      sprite: Objects/Power/light_bulb.rsi
      layers:
        - map: [ enum.LightBulbVisualLayers.Base ]
          state: normal
    - type: VehicleEquipment
      actionProto: ActionToggleLight
      slot: headlight
      allowedVehicles: [Electric, Gas, Spaceship]

- type: entity
  id: SecSiren
  parent: BaseItem
  name: Security Siren
  description: Turn this thing on and those tiders will scatter like roaches, or they will jump you... Who knows?
  components:
    - type: UnpoweredFlashlight
    - type: ItemToggle
      onUse: false
      soundActivate:
        path: /Audio/Items/flashlight_on.ogg
      soundDeactivate:
        path: /Audio/Items/flashlight_off.ogg
    - type: ItemTogglePointLight
    - type: PointLight
      enabled: false
      radius: 5
      color: red
      mask: /Textures/Effects/LightMasks/double_cone.png
    - type: RotatingLight
      speed: 360
    - type: Sprite
      sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/security.rsi
      state: siren
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Effects/Vehicle/policesiren.ogg
        params:
          volume: -4
    - type: VehicleEquipment
      actionProto: ActionVehicleToggleSecuritySiren
      slot: lightbar
      allowedVehicles: [Electric, Gas, Spaceship]

- type: entity
  id: StandardTires
  parent: BaseItem
  name: Standard Tires
  description: Basic tires that have basic acceleration and traction. 
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Vehicles/vehiclemods.rsi
      state: tire
    - type: VehicleEquipment
      slot: tires
      allowedVehicles: [Electric, Gas, Spaceship]
    - type: MovementSpeedModifier
      baseAcceleration: 2 
      baseFriction: 0.5625

- type: entity
  id: BasicEngine
  parent: BaseItem
  name: Basic Engine
  description: A basic engine with basic speed.
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Vehicles/vehiclemods.rsi
      state: engine
    - type: VehicleEquipment
      slot: ENGINE
      allowedVehicles: [Gas, Spaceship]
    - type: MovementSpeedModifier
      baseSprintSpeed: 7.5
      baseWalkSpeed: 10

- type: entity
  id: ElectricEngine
  parent: BaseItem
  name: Electric Motor
  description: A cheap electric motor capable of decent power output.
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Vehicles/vehiclemods.rsi
      state: engine
    - type: VehicleEquipment
      slot: ENGINE
      allowedVehicles: Electric
    - type: MovementSpeedModifier
      baseSprintSpeed: 5
      baseWalkSpeed: 2.5
    - type: PowerCellDraw
      drawRate: 1

- type: entity
  id: ElectricTurboEngine
  parent: BaseItem
  name: Electric Turbo Motor
  description: A higher quality electric egine that nearly doubles the output of the engine at the cost of more power draw.
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Vehicles/vehiclemods.rsi
      state: engine
    - type: VehicleEquipment
      slot: ENGINE
      allowedVehicles: Electric
    - type: MovementSpeedModifier
      baseSprintSpeed: 9
      baseWalkSpeed: 3
    - type: PowerCellDraw
      drawRate: 1.5