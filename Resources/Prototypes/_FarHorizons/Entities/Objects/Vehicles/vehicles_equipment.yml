- type: entity
  id: ATVHeadlight
  parent: BaseItem
  name: ATV Headlight
  description: Standard headlight for ATVs. Mostly used to distract tiders as you run over them like they're deer in the middle of the road. 
  components:
    - type: UnpoweredFlashlight
    - type: PointLight
      enabled: false
      radius: 10
      softness: 2
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      containerOccluded: true
    - type: Sprite
      sprite: Objects/Power/light_bulb.rsi
      layers:
        - map: [ enum.LightBulbVisualLayers.Base ]
          state: normal

- type: entity
  id: SecwayLight
  parent: BaseItem
  name: Secway Light
  description: Standard light for Secways. Excellent for seeing those maints grilles before you crash into them! 
  components:
    - type: UnpoweredFlashlight
    - type: PointLight
      enabled: false
      radius: 5
      softness: 2
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      containerOccluded: true
    - type: Sprite
      sprite: Objects/Power/light_bulb.rsi
      layers:
        - map: [ enum.LightBulbVisualLayers.Base ]
          state: normal

- type: entity
  id: SecwayLightBright
  parent: BaseItem
  name: Bright Secway Light
  description: Upgraded light for Secways and Segways alike. Excellent for seeing those maints grilles before you crash into them! 
  components:
    - type: UnpoweredFlashlight
    - type: PointLight
      enabled: false
      radius: 8
      softness: 2
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      containerOccluded: true
    - type: Sprite
      sprite: Objects/Power/light_bulb.rsi
      layers:
        - map: [ enum.LightBulbVisualLayers.Base ]
          state: normal

- type: entity
  id: SecSiren
  parent: BaseItem
  name: Security Siren
  description: Turn this thing on and those tiders will scatter like roaches, or they will jump you... Who knows?
  components:
    - type: ItemToggle
      onUse: false
      soundActivate:
        path: /Audio/Items/flashlight_on.ogg
      soundDeactivate:
        path: /Audio/Items/flashlight_off.ogg
    - type: ItemTogglePointLight
    - type: PointLight
      enabled: false
      radius: 5
      color: red
      mask: /Textures/Effects/LightMasks/double_cone.png
    - type: RotatingLight
      speed: 360
    - type: Sprite
      sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/security.rsi
      state: siren
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Effects/Vehicle/policesiren.ogg
        params:
          volume: -4