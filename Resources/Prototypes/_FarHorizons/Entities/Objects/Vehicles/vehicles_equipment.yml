- type: entity
  id: ATVHeadlight
  parent: BaseItem
  name: ATV Headlight
  description: Standard headlight for ATVs. Mostly used to distract tiders as you run over them like they're deer in the middle of the road. 
  components:
    - type: UnpoweredFlashlight
    - type: PointLight
      enabled: false
      radius: 10
      softness: 2
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      containerOccluded: true
    - type: Sprite
      sprite: Objects/Power/light_bulb.rsi
      layers:
        - map: [ enum.LightBulbVisualLayers.Base ]
          state: normal
    - type: VehicleEquipment
      actionProto: ActionToggleLight
      slot: headlight
      allowedVehicles: [Electric, Gas, Spaceship]
      
- type: entity
  id: SecwayLight
  parent: BaseItem
  name: Secway Light
  description: Standard light for Secways. Excellent for seeing those maints grilles before you crash into them! 
  components:
    - type: UnpoweredFlashlight
    - type: PointLight
      enabled: false
      radius: 5
      softness: 2
      mask: /Textures/Effects/LightMasks/cone.png
      autoRot: true
      containerOccluded: true
    - type: Sprite
      sprite: Objects/Power/light_bulb.rsi
      layers:
        - map: [ enum.LightBulbVisualLayers.Base ]
          state: normal
    - type: VehicleEquipment
      actionProto: ActionToggleLight
      slot: headlight
      allowedVehicles: [Electric, Gas, Spaceship]

- type: entity
  id: SecSiren
  parent: BaseItem
  name: Security Siren
  description: Turn this thing on and those tiders will scatter like roaches, or they will jump you... Who knows?
  components:
    - type: UnpoweredFlashlight
    - type: ItemToggle
      onUse: false
      soundActivate:
        path: /Audio/Items/flashlight_on.ogg
      soundDeactivate:
        path: /Audio/Items/flashlight_off.ogg
    - type: ItemTogglePointLight
    - type: PointLight
      enabled: false
      radius: 5
      color: red
      mask: /Textures/Effects/LightMasks/double_cone.png
    - type: RotatingLight
      speed: 360
    - type: Sprite
      sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/security.rsi
      state: siren
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Effects/Vehicle/policesiren.ogg
        params:
          volume: -4
    - type: VehicleEquipment
      actionProto: ActionVehicleToggleSecuritySiren
      slot: lightbar
      allowedVehicles: [Electric, Gas, Spaceship]

- type: entity
  id: StandardTires
  parent: BaseItem
  name: Standard Tires
  description: Basic tires that have basic acceleration and traction. 
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Vehicles/vehiclemods.rsi
      state: tire
    - type: VehicleEquipment
      slot: tires
      allowedVehicles: [Electric, Gas, Spaceship]
    - type: MovementSpeedModifier
      baseAcceleration: 2 
      baseFriction: 0.5625

- type: entity
  id: BasicEngine
  parent: BaseItem
  name: Basic Engine
  description: A basic engine with basic speed.
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Vehicles/vehiclemods.rsi
      state: engine
    - type: VehicleEquipment
      slot: ENGINE
      allowedVehicles: [Gas, Spaceship]
    - type: MovementSpeedModifier
      baseSprintSpeed: 7.5
      baseWalkSpeed: 10
    - type: ReagantDraw
      drainRate: 0.25

- type: entity
  id: AdvancedEngine
  parent: BasicEngine
  name: Advanced Engine
  description: An advanced engine with more power output but consumes more fuel.
  components:
    - type: MovementSpeedModifier
      baseSprintSpeed: 10
      baseWalkSpeed: 15
    - type: ReagantDraw
      drainRate: 0.375

- type: entity
  id: GroundEngine
  parent: BasicEngine
  name: Ground Engine
  description: An engine designed to move a space ship from point A to B but thats it.
  components:
    - type: MovementSpeedModifier
      baseSprintSpeed: 5
      baseWalkSpeed: 2.5
    - type: ReagantDraw
      drainRate: 0.25

- type: entity
  id: ElectricEngine
  parent: BaseItem
  name: Electric Motor
  description: A cheap electric motor capable of decent power output.
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Vehicles/vehiclemods.rsi
      state: engine
    - type: VehicleEquipment
      slot: ENGINE
      allowedVehicles: Electric
    - type: MovementSpeedModifier
      baseSprintSpeed: 5
      baseWalkSpeed: 2.5
    - type: PowerCellDraw
      drawRate: 1

- type: entity
  id: ElectricTurboEngine
  parent: ElectricEngine
  name: Electric Turbo Motor
  description: A higher quality electric egine that doubles the output of the engine at the cost of more power draw.
  components:
    - type: MovementSpeedModifier
      baseSprintSpeed: 10
      baseWalkSpeed: 5
    - type: PowerCellDraw
      drawRate: 1.5

- type: entity
  id: BasicThrusters
  parent: BaseItem
  name: Basic Thrusters
  description: A a mass produced thruster with spaceflight capabilities but no FTL.
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Vehicles/vehiclemods.rsi
      state: engine
    - type: VehicleEquipment
      slot: THURSTERS
      allowedVehicles: Spaceship
    - type: MovementSpeedModifier
      baseWeightlessAcceleration: 4
      baseWeightlessFriction: 2
      baseWeightlessModifier: 4

- type: entity
  id: VehicleAirTank
  parent: BaseItem
  name: Vehicle Air Tank
  description: A special air canister capable of holding a large amount of air.
  components:
    - type: Item
      storedRotation: 0
    - type: Sprite
      sprite: Objects/Specific/Mech/mecha_equipment.rsi
      state: mecha_air_tank
    - type: ActivatableUI
      key: enum.SharedGasTankUiKey.Key
    - type: UserInterface
      interfaces:
        enum.SharedGasTankUiKey.Key:
          type: GasTankBoundUserInterface
    - type: GasTank
      outputPressure: 21.3
      air:
        volume: 3000
        temperature: 293.15
      tankLowPressure: 30.0
    - type: VehicleEquipment
      slot: AIRTANK
      allowedVehicles: Spaceship

- type: entity
  id: VehicleAirTankFilled
  parent: VehicleAirTank
  suffix: Filled
  components:
  - type: GasTank
    outputPressure: 21.3
    air:
      volume: 3000
      moles:
        - 50.051379050
      temperature: 293.15

- type: entity
  id: VentFan
  parent: BaseItem
  name: Vent Fan
  description: A special fan that pumps gas in and out of the vehicle cabin.
  components:
    - type: Item
      storedRotation: 0
    - type: Sprite
      sprite: Objects/Specific/Mech/mecha_equipment.rsi
      state: mecha_air_tank
    - type: VehicleEquipment
      slot: VENTFAN
      allowedVehicles: Spaceship

- type: entity
  id: BasicArmorKit
  parent: BaseItem
  name: Basic Armor Upgrade Kit
  description: This kit allows you to upgrade most vehicle's armor to tier I.
  components:
    - type: Item
      storedRotation: 0
    - type: Sprite
      sprite: Objects/Specific/Mech/mecha_equipment.rsi
      state: ripleyupgrade
    - type: VehicleEquipment
      slot: ARMOR
      allowedVehicles: [Electric, Gas, Spaceship]
    - type: Damageable
      damageModifierSet: FlimsyMetallic

- type: entity
  id: AdvancedArmorKit
  parent: BasicArmorKit
  name: Advanced Armor Upgrade Kit
  description: This kit allows you to upgrade most vehicle's armor to tier II.
  components:
    - type: Sprite
      sprite: Objects/Specific/Mech/mecha_equipment.rsi
      state: ripleyupgrade
      allowedVehicles: [Electric, Gas, Spaceship]
    - type: Damageable
      damageModifierSet: Metallic