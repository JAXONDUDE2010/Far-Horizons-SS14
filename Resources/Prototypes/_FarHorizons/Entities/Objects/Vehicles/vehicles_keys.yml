- type: entity
  parent: BaseItem
  id: VehicleKeyBase
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: Objects/Vehicles/atv.rsi
    state: keys

- type: entity
  parent: [VehicleKeyBase, BaseSecurityContraband]
  id: VehicleKeySecway
  name: Secway Electronic Key
  description: The USB to the future.
  suffix: NT
  components:
  - type: Tag
    tags:
    - VehicleKey
    - SecwayKeys
  - type: Sprite
    sprite: _FarHorizons/Objects/Vehicles/secway.rsi
    state: keys

- type: entity
  parent: [VehicleKeyBase, BaseSecurityContraband]
  id: VehicleKeySecwayS
  name: Secway Electronic Key
  description: The EVIL USB to the future.
  suffix: S
  components:
  - type: Tag
    tags:
    - VehicleKey
    - SecwayKeys
  - type: Sprite
    sprite: _FarHorizons/Objects/Vehicles/syndicatesecway.rsi
    state: keys

- type: entity
  parent: [VehicleKeyBase, BaseSecurityContraband]
  id: VehicleKeySecwayTurbo
  name: Secway Turbo Electronic Key
  description: Enforcing justice at the speed of sound. Not compatible with Secways due to software differences.
