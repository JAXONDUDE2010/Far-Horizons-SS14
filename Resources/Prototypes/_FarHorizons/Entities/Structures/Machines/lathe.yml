- type: entity
  abstract: true
  id: BaseSubzerofab
  components:
  - type: Lathe
    materialUseMultiplier: 0.5
    timeMultiplier: 1.5
  - type: LatheHeatProducing #TODO: Find way to make negative using YML
  - type: ReagentSpeed
    modifiers:
      SpaceLube: 0.8
      SpaceGlue: 5

- type: entity
  id: Autofab
  parent: BaseLatheLube
  name: Autofab 
  description: It produces basic items using metal and glass. Has the ability to process blueprints to print new recipes.
  components:
  - type: Sprite
    sprite: _FarHorizons/Structures/Machines/autofab.rsi #TODO: CUSTOM SPRITE
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: AutofabMachineCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
        - Sheet
        - RawMaterial
        - Ingot
  - type: OreSiloClient
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    unlitRunningState: unlit-building
    staticPacks:
    - ToolsStatic
    - PartsStatic
    - AtmosStatic
    - CablesStatic
    - PaperworkStatic
    - CargoStatic
    - MaterialsStatic
    - BasicChemistryStatic
    - RollerBedsStatic
    - LightsStatic
    - ServiceStatic
    - PowerCellsStatic
    - ElectronicsStatic
    dynamicPacks:
    - StarlightAutolatheLootable
#  - type: EmagLatheRecipes
#    emagStaticPacks:
    #NEEDS SYNDICATE EMAG RECIPIES
  - type: BlueprintReceiver
    whitelist:
      tags:
      - BlueprintAutolathe
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      blueprint: !type:Container
  - type: EmptyOnMachineDeconstruct
    containers:
    - blueprint

- type: entity
  id: AutofabSubzero
  parent: [Autofab, BaseSubzerofab]
  name: Subzero Autofab
  description: A highly-experimental Autofab that harnesses the power of extreme Cold to slowly create objects more cost-effectively.
  components:
  - type: Sprite
    sprite: Structures/Machines/autolathe_hypercon.rsi #TODO: CUSTOM SPRITE
  - type: Machine
    board: AutofabSubzeroMachineCircuitboard

- type: entity
  id: Protofab
  parent: BaseLatheLube
  name: Protofab
  description: Converts raw materials into advanced items.
  components:
  - type: Sprite
    sprite: Structures/Machines/protolathe.rsi #TODO: CUSTOM SPRITE
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: ProtofabMachineCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
        - Sheet
        - RawMaterial
        - Ingot
  - type: OreSiloClient
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    unlitRunningState: unlit-building
    staticPacks:
    - ChemistryStatic
    dynamicPacks: #TODO: Syndicate Packs
    - AdvancedTools
    - ScienceEquipment
    - ScienceExplosives
    - ScienceClothing
    - PowerCells
    - ScienceWeapons
    - Mining
    - AtmosTools
    - EngineeringWeapons
    - Chemistry
    - Janitor
    - Instruments
    - Equipment
    - StarlightProtolatheLootable
  - type: EmagLatheRecipes
    emagDynamicPacks: #TODO: EMAG
    - StarlightSurgeryDynamic
    - StarlightCyberlimbDynamic
    - StarlightCyberOrgansDynamic
    - StarlightImplantDynamic
    - StarlightBudgetCyberOrgansDynamic

    - StarlightSecurityAmmoDynamic
    - StarlightSecurityExplosives
    - StarlightSecurityEquipment
    - StarlightSecurityWeapons
    - StarlightDefenseStatic

- type: entity
  id: ProtofabSubzero
  parent: [Protofab, BaseSubzerofab]
  name: Subzero Protofab
  description: A highly-experimental Protofab that harnesses the power of extreme Cold to slowly create objects more cost-effectively.
  components:
  - type: Sprite
    sprite: Structures/Machines/protolathe_hypercon.rsi
  - type: Machine
    board: ProtofabSubzeroMachineCircuitboard