- type: entity
  abstract: true
  id: BaseSubzerofab
  components:
  - type: Lathe
    materialUseMultiplier: 0.5
    timeMultiplier: 1.5
  - type: LatheHeatProducing #TODO: Find balanced Value for Subzero 
    energyPerSecond: -40000
  - type: ReagentSpeed
    modifiers:
      SpaceLube: 0.8
      SpaceGlue: 5

- type: entity
  id: Autofab
  parent: BaseLatheLube
  name: Autofab 
  description: It produces basic items using metal and glass. Has the ability to process blueprints to print new recipes.
  components:
  - type: Sprite
    sprite: _FarHorizons/Structures/Machines/NS/autofab.rsi #TODO: CUSTOM SPRITE
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: AutofabMachineCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
        - Sheet
        - RawMaterial
        - Ingot
  - type: OreSiloClient
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    unlitRunningState: unlit-building
    staticPacks:
    - ToolsStatic 
    - PartsStatic 
    - AtmosStatic
    - CablesStatic
    - PaperworkStatic
    - CargoStatic
    - MaterialsStatic
    - BasicChemistryStatic
    - RollerBedsStatic
    - LightsStatic
    - ServiceStatic
    - PowerCellsStatic
    - ElectronicsStatic
    dynamicPacks:
    - StarlightAutolatheLootable
  - type: EmagLatheRecipes #TODO: NT THEMED EMAG PACKS
    emagStaticPacks:
    - StarlightSecurityEmagWeaponsStatic
    - StarlightSecurityAmmoStatic
    - StarlightSecurityAmmoEmagStatic
  - type: BlueprintReceiver
    whitelist:
      tags:
      - BlueprintAutolathe
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      blueprint: !type:Container
  - type: EmptyOnMachineDeconstruct
    containers:
    - blueprint

- type: entity
  id: AutofabSubzero
  parent: [Autofab, BaseSubzerofab]
  name: Subzero Autofab
  description: A highly-experimental Autofab that harnesses the power of extreme cold to slowly create objects more cost-effectively.
  components:
  - type: Sprite
    sprite: _FarHorizons/Structures/Machines/NS/autofab.rsi #TODO: CUSTOM SPRITE
  - type: Machine
    board: AutofabSubzeroMachineCircuitboard

