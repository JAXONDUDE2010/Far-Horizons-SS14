- type: entity
  parent: BaseComputerAiAccess
  id: VitalsMonitor
  name: Vitals Monitor
  description: A device that monitors the vitals of whoever is laying next to it.
  components:
  - type: ApcPowerReceiver
    powerLoad: 500
  - type: Computer
    board: BodyScannerComputerCircuitboard
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#1f8c28"
  - type: Sprite
    sprite: _FarHorizons/Structures/Machines/Computers/vitalmonitor.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerScreen"]
      state: screen
  - type: Speech
  - type: BodyScanner
  - type: HealthAnalyzer
    talk: true
  - type: ActivatableUI
    key: enum.HealthAnalyzerUiKey.Key
  - type: UserInterface
    interfaces:
      enum.HealthAnalyzerUiKey.Key:
        type: HealthAnalyzerBoundUserInterface
  - type: DeviceList
  - type: DeviceNetwork
    deviceNetId: Wired
  - type: DeviceLinkSource
    range: 2
    ports:
      - VitalsMonitorSender
  - type: Machine
    board: VitalsMonitorMachineCircuitboard