- type: entity
  parent: WallmountTelevision
  id: WallmountTelevisionCWS
  suffix: CWS
  components:
  - type: Sprite
    layers:
      - map: ["computerLayerBody"]
        state: television_wall
      - map: ["computerLayerScreen"]
        state: CWSscreen
  - type: PointLight
    enabled: true
    energy: 2
    radius: 2.5
    offset: 0.0, -.75
    color: "#ebf700"

