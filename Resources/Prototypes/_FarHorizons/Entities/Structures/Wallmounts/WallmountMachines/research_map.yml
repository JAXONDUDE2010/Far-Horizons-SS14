# TODO: a proper sprite

- type: entity
  parent: BaseWallmountMachine
  id: ResearchTreeMap
  name: Research Tree Map
  description: A virtual map of current station research progress.
  suffix: Wall
  components:
    - type: WallMount
      arc: 360
    - type: Appearance
    - type: Sprite
      sprite: Structures/Machines/station_map.rsi
      layers:
      - state: station_map0
      - state: unshaded
        shader: unshaded
    - type: Icon
      sprite: Structures/Machines/station_map.rsi
      state: station_map0
    - type: ApcPowerReceiver
      powerLoad: 200
    - type: ActivatableUIRequiresPower
    - type: ActivatableUI
      key: enum.FHResearchConsoleUiKey.Key
    - type: UserInterface
      interfaces:
        enum.FHResearchConsoleUiKey.Key:
          type: FHResearchConsoleBoundUserInterface
    - type: ResearchClient
    - type: FHResearchConsole
      readonly: true
    - type: EmitSoundOnUIOpen
      sound:
        collection: Keyboard
        params:
          volume: -1
          variation: 0.10
          pitch: 1.10  # low pitch keyboard sounds feel kinda weird
      blacklist:
        tags:
        - NoConsoleSound
    - type: Destructible
      thresholds:
      - trigger: # Excess damage, don't spawn entities
          !type:DamageTrigger
          damage: 200
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: GlassBreak
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: GlassBreak
        - !type:SpawnEntitiesBehavior
          spawn:
            StationMapBroken:
              min: 1
              max: 1
        - !type:DoActsBehavior
          acts: [ "Destruction" ]