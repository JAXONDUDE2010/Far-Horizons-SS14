- type: entity
  abstract: true
  id: FHBaseDoorConstructible
  components:
    - type: Construction
      graph: FHAirlock
      node: airlock
      containers:
        - board
    - type: Sprite
      snapCardinals: false
      layers:
        - state: electrified
          sprite: Effects/electricity.rsi
          shader: unshaded
          visible: false
          map: ["enum.ElectrifiedLayers.Sparks"]
        - state: closed
          map: [ "enum.DoorVisualLayers.Base" ]
        - state: unlit
          map: ["enum.DoorVisualLayers.BaseUnlit"]
        - state: welded
          map: [ "enum.WeldableLayers.BaseWelded" ]
          visible: false
        - state: locked
          shader: unshaded
          map: ["enum.DoorVisualLayers.BaseBolted"]
        - state: spark
          shader: unshaded
          map: ["enum.DoorVisualLayers.BaseEmergencyAccess"]
        - state: panel_open
          map: ["enum.WiresVisualLayers.MaintenancePanel"]
        - state: electrified_ai
          sprite: Interface/Misc/ai_hud.rsi
          shader: unshaded
          visible: false
          map: ["enum.ElectrifiedLayers.HUD"]
    - type: GenericVisualizer
      visuals:
        enum.ElectrifiedVisuals.ShowSparks:
          enum.ElectrifiedLayers.Sparks:
            True: { visible: True }
            False: { visible: False }
    - type: Paintable
      group: FHAirlockStandard


- type: entity
  parent:
    - CMBaseDoor
    - FHBaseDoorConstructible
  id: FHAirlock
  name: airlock
  description: It opens, it closes, and maybe crushes you.
  placement:
    mode: SnapgridCenter
  components:
    - type: FHDoor
    - type: Sprite
      sprite: _FarHorizons/Structures/Doors/Airlocks/Standard/basic.rsi
    - type: Construction
      graph: FHAirlock
      node: airlock
      containers:
        - board
    - type: Occluder
    - type: Door
      crushDamage:
        types:
          Blunt: 15
      openSound:
        path: /Audio/_RMC14/Machines/airlock.ogg
      closeSound:
        path: /Audio/_RMC14/Machines/airlock.ogg
      denySound:
        path: /Audio/Machines/airlock_deny.ogg

- type: entity
  id: FHAirlockGlass
  parent: FHAirlock
  name: glass airlock
  components:
    - type: MeleeSound
      soundGroups:
        Brute:
          collection: GlassSmack
    - type: Door
      occludes: false
    - type: Occluder
      enabled: false
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.49,-0.49,0.49,0.49" # don't want this colliding with walls or they won't close
          density: 100
          mask:
            - FullTileMask
          layer:     #removed opaque from the layer, allowing lasers to pass through glass airlocks
            - GlassAirlockLayer
    - type: Sprite
      sprite: _FarHorizons/Structures/Doors/Airlocks/Glass/basic.rsi
    - type: LayerChangeOnWeld
      unWeldedLayer: GlassAirlockLayer
      weldedLayer: GlassLayer
    - type: Construction
      graph: FHAirlock
      node: glassAirlock
    - type: Paintable
      group: FHAirlockGlass
    - type: RadiationBlocker
      resistance: 2
    - type: Tag
      tags:
        - GlassAirlock
        # This tag is used to nagivate the Airlock construction graph. It's needed because the construction graph is shared between Airlock, AirlockGlass, and HighSecDoor
