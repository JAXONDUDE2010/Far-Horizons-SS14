
#region Command

# Magistrate

- type: entity
  id: LockerMagistrate
  parent: LockerBaseSecure
  name: Magistrate's Locker
  components:
  - type: Appearance
  - type: Sprite
    sprite: _FarHorizons/Structures/Storage/closet.rsi
  - type: EntityStorageVisuals
    stateBaseClosed: magistrate # New sprites by ScorchFollower following this PR: https://github.com/Far-Horizons-SS14/Far-Horizons-SS14/pull/808
    stateDoorOpen: magistrate_open
    stateDoorClosed: magistrate_door
  - type: AccessReader
    access: [["Magistrate"]]
  - type: WiresPanelSecurity
    securityLevel: medSecurity

