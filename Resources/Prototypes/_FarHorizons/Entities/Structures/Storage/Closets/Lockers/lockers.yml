
#region Command

# Magistrate

- type: entity
  id: LockerMagistrate
  parent: LockerBaseSecure
  name: Magistrate's Locker
  components:
  - type: Appearance
  - type: Sprite
    sprite: _FarHorizons/Structures/Storage/closet.rsi
  - type: EntityStorageVisuals
    stateBaseClosed: alien #This is pinkish purple. I'll take it.
    stateDoorOpen: alien_open
    stateDoorClosed: alien_door
  - type: AccessReader
    access: [["Magistrate"]]
  - type: WiresPanelSecurity
    securityLevel: medSecurity

