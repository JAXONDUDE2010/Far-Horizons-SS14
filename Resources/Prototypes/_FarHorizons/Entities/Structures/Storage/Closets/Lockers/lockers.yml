
# Security Officer
- type: entity
  id: LockerSecurityFH
  parent: LockerBaseSecure
  name: security officer's locker
  components:
  - type: Appearance
  - type: Sprite
    sprite: _FarHorizons/Structures/Storage/closet.rsi
  - type: EntityStorageVisuals
    stateBaseClosed: sec
    stateDoorOpen: sec_open
    stateDoorClosed: sec_door
  - type: AccessReader
    access: [["Security"]]

