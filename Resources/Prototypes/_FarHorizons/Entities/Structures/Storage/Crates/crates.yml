# Secured Advanced Syndicate Crate "Hydra"

- type: entity
  parent: [ CrateBaseSecure, BaseSyndicateContraband ]
  id: CrateSyndicateHydra
  name: syndicate hydra crate
  description: A reinforced crate emblazoned with Syndicate markings, this crate is known to contain advanced weaponry and equipment. Access is restricted to authorized Syndicate personnel only, one can only imagine what horrors lies within.
  components:
  - type: Icon
    sprite: /Textures/_FarHorizons/Structures/Storage/Crates/hydra_crate.rsi
  - type: Sprite
    sprite: /Textures/_FarHorizons/Structures/Storage/Crates/hydra_crate.rsi
  - type: AccessReader
    access: [["SyndicateAgent"]]
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Reflect
    reflects:
    - Energy
    reflectProb: 0.8
    spread: 90