- type: entity
  id: PoweredStrobeLightShuttleSiren
  name: Alarm
  suffix: "Shuttle Theft Alarm"
  parent: PoweredStrobeLightEmpty
  description: "Green good, red bad. If it is red, the Security Ship has likely been stolen. You uhhhh, you should do something about that probably."
  components:
  - type: Sprite
    sprite: Structures/Wallmounts/Lighting/strobe_light.rsi
    drawdepth: WallMountedItems
    layers:
    - map: ["enum.PoweredLightLayers.Base"]
      state: base
      color: "#7CFC00"
    - map: ["enum.PoweredLightLayers.Glow"]
      state: glow
      shader: unshaded
  - type: PoweredLight
    on: false
    hasLampOnSpawn: LightBulbAlarmRed
  - type: RotatingLight
    speed: 200
  - type: AmbientSound
    volume: -8
    range: 8
    sound:
      path: "/Audio/Machines/warning_buzzer.ogg"