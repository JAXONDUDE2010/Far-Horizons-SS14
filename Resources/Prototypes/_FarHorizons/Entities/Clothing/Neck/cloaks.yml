# Commandant (Captain)

- type: entity
  parent: [ClothingNeckBase, BaseCommandContraband]
  id: ClothingNeckCloakCapFormalSyndi
  name: Commandant's Formal Cloak
  suffix: S
  description: A lavish and decorated cloak for special occasions.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Neck/Cloaks/syndicapcloakformal.rsi
  - type: StealTarget
    stealGroup: HeadCloak

- type: entity
  parent: [ClothingNeckBase, BaseCommandContraband]
  id: ClothingNeckCloakCapSyndi
  name: Commandant's Cloak
  suffix: S
  description: A pompous and comfy blue cloak with a nice gold trim, while not particularly valuable as your other possessions, it sure is fancy.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Neck/Cloaks/syndicap.rsi
  - type: StealTarget
    stealGroup: HeadCloak

# Marshal (HoS)

- type: entity
  parent: [ ClothingNeckBase, BaseCommandContraband ]
  id: ClothingNeckCloakHosSyndi
  name: Marshal's Cloak
  suffix: S
  description: An exquisite dark and red cloak fitting for those who can assert dominance over wrongdoers. Take a stab at being civil in prosecution!
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Neck/Cloaks/hos-syndi.rsi
  - type: StealTarget
    stealGroup: HeadCloak

- type: entity
  parent:  [ ClothingNeckBase, BaseCommandContraband ]
  id: ClothingNeckCloakHosEliteSyndi
  name: Elite Marshal's Cloak
  description: An elite Marshal's cloak crafted from the latest composite glowing fabric. Only for a true paladin.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Neck/Cloaks/hos_elite-syndi.rsi
  - type: StealTarget
    stealGroup: HeadCloak
  - type: PointLight
    radius: 2
    energy: 4
    color: "#ab0000"
  - type: StaticPrice
    price: 2000

