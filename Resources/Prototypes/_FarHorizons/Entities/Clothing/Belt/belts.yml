#region Command

# Commandant (Captain)

- type: entity
  parent: [ClothingBeltBase, ClothingSlotBase, BaseCommandContraband]
  id: ClothingBeltSheathSyndi
  name: Sabre Sheath
  description: An ornate sheath designed to hold an officer's blade.
  suffix: NS
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Belt/NeoSol/sheath.rsi
    state: sheath
  - type: Clothing
    sprite: _FarHorizons/Clothing/Belt/NeoSol/sheath.rsi
  - type: Item
    size: Ginormous
  - type: ItemSlots
    slots:
      item:
        name: Sabre
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - CaptainSabre
  - type: ItemMapper
    mapLayers:
      sheath-sabre:
        whitelist:
          tags:
          - CaptainSabre
  - type: Appearance

