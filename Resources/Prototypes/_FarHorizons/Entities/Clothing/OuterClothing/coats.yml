#region Civilian

- type: entity
  parent: [ClothingOuterStorageBase, AllowSuitStorageClothing]
  id: ClothingOuterCoatGreytiderTrenchcoat
  name: Grey Assistant Trenchcoat
  description: Ah, your trusty coat. There's a few tears here and there, giving it a more timely look. Or at least, that's what you told yourself when you found out gettin' it repaired would set you back 200 spesos.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/greytidercoat.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/greytidercoat.rsi
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: Cigarette
          amount: 3
        - id: CheapLighter

#region Security

- type: entity
  parent: [BaseSecurityContraband, ClothingOuterWinterCoatToggleable, AllowSuitStorageClothing]
  id: ClothingOuterCoatCorpsmanFH
  name: Corpsman's Armored Jacket
  suffix: NT
  description: Heavily armored yet surprisingly comfortable jacket, a byproduct from the tendency of corpsmen to throw themselves directly into danger.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/corpsman.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/corpsman.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING
  - type: Pierceable
    level: Metal
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.50
  - type: Armor
    modifiers:
      flatReductions: #FH
        Piercing: 5 #FH
        Heat: 4 #FH
      coefficients:
        Blunt: 0.75
        Slash: 0.75
        Piercing: 0.60
        Heat: 0.75
        Caustic: 0.75
  - type: ExplosionResistance
    damageCoefficient: 0.95
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodCorpsman


