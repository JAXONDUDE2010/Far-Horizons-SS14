# Enforcer (Security Officer)

# Brigmedic (Brigmedic)

- type: entity
  parent: [ClothingOuterStorageBase, AllowSuitStorageClothing]
  id: ClothingOuterCoatAMGSyndi
  name: Armored Medical Gown
  suffix: NS
  description: The version of the medical gown, with elements of a bulletproof vest, looks strange, but your heart is protected.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/NeoSol/brigmedic.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/NeoSol/brigmedic.rsi
  - type: Pierceable
    level: Metal
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.60
  - type: Armor
    modifiers:
      flatReductions:
        Piercing: 5
        Heat: 4
      coefficients:
        Blunt: 0.8
        Slash: 0.85
        Piercing: 0.65
        Heat: 0.85
        Caustic: 0.75
  - type: LimbArmor
    limbs:
      ArmRight: {}
      ArmLeft: {}
      LegRight: {}
      LegLeft: {}

