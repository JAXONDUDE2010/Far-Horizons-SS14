  id: ClothingOuterCoatHoP
  name: Head of Personnel's Jacket
  suffix: NT
  description: A sleek coat for the administrative arm of the station.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/hop.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/hop.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING
    
