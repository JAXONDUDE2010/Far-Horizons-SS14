# Inspector (Detective)

- type: entity
  parent: [ClothingOuterStorageBase, AllowSuitStorageClothing, ClothingOuterArmorBase]
  id: ClothingOuterCoatDetectiveSyndi
  name: Inspector Trenchcoat
  suffix: NS
  description: An 18th-century multi-purpose trenchcoat. Someone who wears this means serious business.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/NeoSol/detective.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Coats/NeoSol/detective.rsi
  - type: StorageFill
    contents:
    - id: SmokingPipeFilledTobacco
    - id: FlippoEngravedLighter
  - type: ExplosionResistance
    damageCoefficient: 1 #its a coat. it doesnt do shit

- type: entity
  parent: [ClothingOuterStorageBase, AllowSuitStorageClothing, ClothingOuterArmorBase]
