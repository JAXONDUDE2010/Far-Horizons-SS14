#region Security

# Corpsman Hardsuit

- type: entity
  parent: [ClothingOuterHardsuitBase, BaseSecurityContraband]
  id: ClothingOuterHardsuitCorpsman
  name: Corpsman Hardsuit
  suffix: NT
  description: A reinforced version of the medical security hardsuit, designed to take incoming fire while providing on-field triage.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/corpsman.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/corpsman.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.3
    lowPressureMultiplier: 1000
  - type: ItemToggle
    onUse: false
    soundActivate:
      path: /Audio/Items/flashlight_on.ogg
    soundDeactivate:
      path: /Audio/Items/flashlight_off.ogg
  - type: ItemToggleActiveSound
    activeSound:
      path: /Audio/Effects/Vehicle/policesiren.ogg
      params:
        volume: -4
  - type: UseDelay
    delay: 1.0
  - type: ToggleClothing
    action: ActionToggleSecuritySiren
  - type: ItemTogglePointLight
  - type: PointLight
    enabled: false
    radius: 2
    energy: 4
    color: blue
    mask: /Textures/Effects/LightMasks/double_cone.png
  - type: RotatingLight
    speed: 360
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      flatReductions: #FH
        Piercing: 5 #FH
        Heat: 4 #FH
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.55
        Heat: 0.55
        Caustic: 0.65
    staminaModifier: 0.6
    ignoreKnockdown: true # Taser no worky on combat hardsuits
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.80
    sprintModifier: 0.80
    requireActivated: false
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitCorpsman

# Heavy Security Hardsuit
- type: entity
  parent: [ClothingOuterHardsuitBase, BaseSecurityContraband]
  id: ClothingOuterHardsuitSecurityHeavyUnlocked
  name: DEBUG Heavy Security Hardsuit
  description: Should never be mapped. Unlocked for debug testing purposes and NOTHING ELSE.
  suffix: DO NOT MAP
  components:
  - type: Item
    size: Huge
    shape:
    - 0,0,4,4
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/heavy_security.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/heavy_security.rsi
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    equipDelay: 3
    unequipDelay: 3
  - type: PressureProtection
    highPressureMultiplier: 0.3
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.3
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0 # Immune
  - type: Pierceable
    level: Metal
  - type: Armor # I thought about this a lot, but I decided that since speed is everything, a hefty 70% slowdown should necessitate MUCH stronger stats.
    modifiers:
      flatReductions:
        Piercing: 5
        Heat: 4
      coefficients:
        Blunt: 0.2
        Slash: 0.2
        Piercing: 0.2
        Heat: 0.2
        Radiation: 0.2
        Caustic: 0.2
    staminaModifier: 0.1
    ignoreKnockdown: true
  - type: LimbArmor
    limbs:
      ArmRight: {}
      ArmLeft: {}
      HandRight: {}
      HandLeft: {}
      LegRight: {}
      LegLeft: {}
      FootRight: {}
      FootLeft: {}
  - type: ClothingSpeedModifier # Slower for Syndie jugg stats. If you can't outrun this thing..
    walkModifier: 0.30
    sprintModifier: 0.30
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
      params:
        volume: -6
        pitch: 0.7
        variation: 0.025
  - type: HeldSpeedModifier
  - type: Tag
    tags:
      - RequiredForLmgTag
      - IPCExternalCooling
      - HeavySecSuit
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitSecurityHeavy

- type: entity
  parent: ClothingOuterHardsuitSecurityHeavyUnlocked
  id: ClothingOuterHardsuitSecurityHeavy
  name: Heavy Security Hardsuit
  description: A high-tech powered suit developed by NanoTrasen to boost Security capabilites in handling station-wide threats, saving costs on asking the Emergency Response Team to intervene for them who often arrive far too late to help anyway. It boasts an ID-Lock and Gun-Lock system.
  suffix: NT
  components:
  - type: IdClothingBlocker
    allowedJobs:
      - Security
      - Armory
      - HeadOfSecurity
      - Captain
      - Detective

