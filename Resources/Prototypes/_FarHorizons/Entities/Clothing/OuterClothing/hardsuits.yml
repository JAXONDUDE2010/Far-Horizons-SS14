
#region Command

# Head of Personnel Hardsuit

- type: entity
  parent: [ClothingOuterHardsuitBase, BaseCommandContraband]
  id: ClothingOuterHardsuitHoP
  name: Head of Personnel Hardsuit
  suffix: NT
  description: A hardsuit which somehow just seems to be covered in papercuts. How that even happened on this is astounding.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/hopspace.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Hardsuits/hopspace.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.7
        Piercing: 0.9
        Heat: 0.9
        Radiation: 0.9
        Caustic: 0.9
    staminaModifier: 0.8
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: ClothingSpeedModifier
    walkModifier: 0.80
    sprintModifier: 0.80
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitHoP

