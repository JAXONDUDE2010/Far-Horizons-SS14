#region General Armor

- type: entity
  parent: [ ClothingOuterArmorBaseFHSyndi, BaseSecurityContraband ]
  id: ClothingOuterArmorReflectiveSyndi
  name: Reflective Vest
  suffix: S
  description: An armored vest with advanced shielding to protect against energy weapons.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Armor/armor_reflec-syndi.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Armor/armor_reflec-syndi.rsi
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      flatReductions:
        Heat: 4
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.4 # this technically means it protects against fires pretty well? -heat is just for lasers and stuff, not atmos temperature
  - type: Reflect
    reflectProb: 1
    reflects:
      - Energy
    reflectingInHands: false
  - type: Tag
    tags:
    - ReflectArmor

