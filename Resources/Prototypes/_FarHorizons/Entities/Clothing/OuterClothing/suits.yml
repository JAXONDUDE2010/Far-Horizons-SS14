- type: entity
  parent: [ClothingOuterBaseLarge, AllowSuitStorageClothing]
  id: ClothingOuterCoverallsEngi
  name: Engineering Coveralls 
  description: A soft suit for engineering that allows items to be holstered on the back.
  components:
  - type: RollUpSleeves
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Suits/engi-coveralls.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Suits/engi-coveralls.rsi
    equipSound: /Audio/Items/jumpsuit_equip.ogg
    unequipSound: /Audio/Items/jumpsuit_equip.ogg
    equipDelay: 1
    unequipDelay: 1
  - type: PressureProtection
    highPressureMultiplier: 0.04
  - type: TemperatureProtection
    heatingCoefficient: 0.005
    coolingCoefficient: 0.05
  - type: Pierceable
    level: Wood
  - type: Armor
    modifiers:
      coefficients:
        Slash: 0.9
        Heat: 0.8
        Cold: 0.8
  - type: LimbArmor
    limbs:
      ArmRight: {}
      ArmLeft: {}
      HandRight: {}
      HandLeft: {}
      LegRight: {}
      LegLeft: {}
      FootRight: {}
      FootLeft: {}
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: HeldSpeedModifier
  - type: GroupExamine

