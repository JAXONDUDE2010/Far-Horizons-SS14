# Atmospheric Technician

- type: entity
  parent: [ClothingOuterStorageBase, AllowSuitStorageClothing]
  id: ClothingOuterSuitAtmosFireSyndi
  name: Atmospheric Fire Suit
  suffix: NS
  description: An expensive firesuit that protects against even the most deadly of station fires. Designed to protect even if the wearer is set aflame.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/OuterClothing/Suits/NeoSol/atmos_firesuit.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/OuterClothing/Suits/NeoSol/atmos_firesuit.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.05
  - type: FireProtection
    reduction: 0.8 # atmos firesuit offers best protection, hardsuits are a little vulnerable
  - type: Item
    size: Huge
    shape:
    - 0,0,3,3
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      coefficients:
        Slash: 0.9
        Heat: 0.8
        Cold: 0.8
  - type: LimbArmor
    limbs:
      ArmRight: {}
      ArmLeft: {}
      HandRight: {}
      HandLeft: {}
      LegRight: {}
      LegLeft: {}
      FootRight: {}
      FootLeft: {}
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: HeldSpeedModifier
  - type: GroupExamine
  - type: ProtectedFromStepTriggers
    slots: WITHOUT_POCKET
  - type: Tag
    tags:
    - WhitelistChameleon
    - IPCExternalCooling
  - type: HideLayerClothing
    slots:
    - Tail

