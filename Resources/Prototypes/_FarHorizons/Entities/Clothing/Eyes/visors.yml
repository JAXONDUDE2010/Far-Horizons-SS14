#region NanoTrasen ##

# CentCom

- type: entity
  parent: [ ClothingEyesBase, BaseCommandContraband ]
  id: ClothingEyesVisorBlueShield
  name: Blueshield Officer's Visor
  suffix: NT
  description: An innovative visor that scans the humanoids in view and provides accurate data about their ID status, security records, and medical information.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Eyes/Visors/blueshield.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/Eyes/Visors/blueshield.rsi
  - type: ShowJobIcons
  - type: ShowMindShieldIcons
  - type: ShowCriminalRecordIcons
  - type: ShowHealthBars
    damageContainers:
    - Biological
  - type: ShowHealthIcons
    damageContainers:
    - Biological
  - type: Tag
    tags:
    - HudMedical
  - type: EyeProtection
    protectionTime: 5
  - type: FlashImmunity

