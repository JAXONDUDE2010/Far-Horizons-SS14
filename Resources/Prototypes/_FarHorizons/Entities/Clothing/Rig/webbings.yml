#region Base

- type: entity
  parent: [ClothingBeltStorageBase, ContentsExplosionResistanceBase]
  id: ClothingBeltWebbingBase
  name: Webbing
  description: Can hold bits and bobs, but it's main purpose is to hold spare magazines and grenades.
  components:
  - type: Sprite
    sprite: Clothing/Belt/securitywebbing.rsi
  - type: Clothing
    sprite: Clothing/Belt/securitywebbing.rsi
  - type: ExplosionResistance # Prevents unwanted detonation of contents, i.e grenades.
    damageCoefficient: 0 # Even with fucking 90% it explodes, putting my foot down and preventing explosion at all.
  - type: Storage
    grid:
    - 0,0,3,1
    - 0,3,3,4
    whitelist:
      tags:
        - CigPack
        - MagazinePistol
        - MagazineMagnum
        - CombatKnife
        - HandGrenade
        - Radio
        - Knife
        - Cartridge
      components:
        - DoorRemote
        - Whistle
        - BallisticAmmoProvider
        - CartridgeAmmo
  - type: Appearance
  - type: Tag
    tags: 
    - Webbing

