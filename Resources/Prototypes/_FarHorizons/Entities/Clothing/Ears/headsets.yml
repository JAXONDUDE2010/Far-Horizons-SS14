#region ## NanoTrasen ##

- type: entity
  parent: [ClothingHeadsetAlt, BaseCentcommContraband]
  id: ClothingHeadsetAltNTNC
  name: NTNC Over-Ear Headset
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommand
      - EncryptionKeyCommon
      - EncryptionKeySecurity
      - EncryptionKeyNTNC
  - type: Sprite
    sprite: _Starlight/Admeme/Clothing/Ears/Headsets/ntnc.rsi
  - type: Clothing
    sprite: _Starlight/Admeme/Clothing/Ears/Headsets/ntnc.rsi
  - type: RadioChime
    sound:
      path: /Audio/_Starlight/Effects/Radio/cc.ogg


