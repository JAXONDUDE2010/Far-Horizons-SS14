#region NanoTrasen








#region Command

- type: entity
  parent: [ClothingHeadsetAlt, BaseCommandContraband]
  id: ClothingHeadsetAltCE
  name: Chief Engineer Over-Ear Headset
  suffix: NT
  description: A headset for the chief engineer to ignore all emergency calls on.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyEngineering
      - EncryptionKeyCommand
      - EncryptionKeyCommon
  - type: Sprite
    sprite: _FarHorizons/Clothing/Ears/Headsets/engineering.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/Ears/Headsets/engineering.rsi
  - type: RadioChime
    sound:
      path: /Audio/_Starlight/Effects/Radio/ce.ogg





