

#region Syndicate









#region Command

- type: entity
  parent: [ClothingHeadset, BaseCommandContraband]
  id: ClothingHeadsetCommandSyndi
  name: Command Headset
  suffix: S
  description: A headset with a commanding channel.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyStationMaster
  - type: Sprite
    sprite: _FarHorizons/Clothing/Ears/Headsets/syndicommand.rsi #Far Horizons
  - type: Clothing
    sprite: _FarHorizons/Clothing/Ears/Headsets/syndicommand.rsi #Far Horizons
  - type: RadioChime
    sound:
      path: /Audio/_Starlight/Effects/Radio/captain.ogg

- type: entity
  parent: [ClothingHeadsetAlt, BaseCommandContraband]
  id: ClothingHeadsetAltCommandSyndi
  name: Command Over-Ear Headset
  suffix: S
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyStationMaster
  - type: Sprite
    sprite: _FarHorizons/Clothing/Ears/Headsets/syndicommand.rsi #Far Horizons
  - type: Clothing
    sprite: _FarHorizons/Clothing/Ears/Headsets/syndicommand.rsi #Far Horizons
  - type: RadioChime
    sound:
      path: /Audio/_Starlight/Effects/Radio/captain.ogg

