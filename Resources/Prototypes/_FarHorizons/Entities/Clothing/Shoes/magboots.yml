#region NanoTransen
- type: entity
  parent: [ClothingShoesBootsMagBase, BaseSecurityContraband]
  id: ClothingShoesBootsMagAdvSec
  name: Heavy Security Magboots
  description: They do not slow down the user but unlike Advanced Magboots, they rely on the internal power of the Heavy Security Hardsuit to function. Will lock you in place if you don't have the proper ID to use it.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Shoes/Boots/magboots-heavy-security.rsi
    state: icon
  - type: Clothing
    sprite: _FarHorizons/Clothing/Shoes/Boots/magboots-heavy-security.rsi
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: IdClothingBlocker
    allowedJobs:
      - Security
      - Armory
      - HeadOfSecurity
      - Captain
      - Detective
  - type: RestrictByEquippedTag # Doesn't actually work cuz it's a toggle. Worse that happens is one officer uses this pair, which.. I mean, you can do the same with galoshes. - Obviously fix in the future.
    requiredTag: "RequiredForLmgTag"
    denialMessage: "lmg-restricted-to-hardsuit-message"
    denialSound: /Audio/Machines/custom_deny.ogg
  - type: Tag
    tags:
    - HighRiskItem
    - HeavySecSuitBoots
  - type: StealTarget
    stealGroup: ClothingShoesBootsMagAdv # I mean.. you COULD. CE's definitely an easier target, though.

#region Syndicate

- type: entity
  parent: [ClothingShoesBase, BaseToggleClothing]
  id: ClothingShoesBootsMagBaseSyndi
  name: Magboots
  suffix: NS
  description: Magnetic boots, often used during extravehicular activity to ensure the user remains safely attached to the vehicle.
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Shoes/Boots/magboots.rsi # Needs respriting for Syndicate side
    layers:
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: _FarHorizons/Clothing/Shoes/Boots/magboots.rsi
  - type: ToggleClothing
    action: ActionToggleMagboots
    mustEquip: false
  - type: ComponentToggler
    components:
    - type: NoSlip
  - type: ItemTogglePrefix
    prefixOn: on
  - type: ToggleClothingPrefix
    prefixOn: on
  - type: Magboots
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon-on}
          False: {state: icon}
  - type: StaticPrice
    price: 200
  - type: Tag
    tags:
    - WhitelistChameleon

- type: entity
  parent: [ClothingShoesBootsMagBase]
  id: ClothingShoesBootsMagSyndi

- type: entity
  parent: [ClothingShoesBootsMagBase, BaseGrandTheftContraband]
  id: ClothingShoesBootsMagAdvSyndi
  name: Advanced Magboots
  suffix: NS
  description: State-of-the-art magnetic boots that do not slow down their wearer.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Shoes/Boots/magboots-advanced.rsi # Needs respriting for Syndicate side
    state: icon
  - type: Clothing
    sprite: _FarHorizons/Clothing/Shoes/Boots/magboots-advanced.rsi
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: Tag
    tags:
    - WhitelistChameleon
    - HighRiskItem
  - type: StaticPrice
    price: 750
  #- type: StealTarget - Disabling for now because I can't be bothered to go through the steal target list currently.
  #  stealGroup: ClothingShoesBootsMagAdv

- type: entity
  parent: [ClothingShoesBootsMagBase]
  id: ClothingShoesBootsMagSciSyndi
  suffix: NS
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Boots/magboots-science.rsi # Needs respriting for Syndicate side
  - type: Clothing
    sprite: Clothing/Shoes/Boots/magboots-science.rsi

- type: entity
  parent: [ClothingShoesBootsMagBase, BaseJetpack, BaseSyndicateContraband, ClothingShoesMilitaryBase]
  id: ClothingShoesBootsMagLambda
  name: Blue-Blood Magboots # Preemptively renaming because I can.
  suffix: NT
  description: Reverse-engineered magnetic boots that have a heavy magnetic pull and integrated thrusters. It can hold 0.75 L of gas. Has also been equipped with knife/small arms storage for Operatives on the go. #Far Horizons
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Boots/magboots-syndicate.rsi # Needs respriting for NT Nukies - Lambda Squadron
    state: icon
  - type: Clothing
    sprite: Clothing/Shoes/Boots/magboots-syndicate.rsi
  - type: ClothingSlowOnDamageModifier
    modifier: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: GasTank
    outputPressure: 42.6
    air:
      # 2 minutes of thrust
      volume: 0.75
      temperature: 293.15
      moles:
        Oxygen: 0.153853429 # oxygen
        Nitrogen: 0.153853429 # nitrogen
  - type: Item
    sprite: null
    size: Normal
  - type: StaticPrice
    price: 1500