# Cargo

- type: entity
  parent: [ ClothingBackpackDuffel, BaseCargoContraband ] 
  id: ClothingBackpackDuffelMining
  name: mining duffel bag
  description: It's a well worn duffel bag covered in asteroid dust and scuff marks from rocks hitting it.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Back/Duffels/mining.rsi

# Engi

- type: entity
  parent: ClothingBackpackDuffel
  id: ClothingDuffelBagChiefEngineer
  name: Chief Engineer's Duffel Bag
  description: It's a backpack especially designed for use in a spacious environment.
  components:
    - type: Sprite
      sprite: _FarHorizons/Clothing/Back/Duffels/chief_engineer.rsi


# Medical

- type: entity
  parent: ClothingBackpackDuffel
  id: ClothingBackpackDuffelParamedic
  name: paramedic duffel bag
  description: A large duffel bag for holding extra medical supplies for in the depths of space.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Back/Duffels/paramedic.rsi

# Security

- type: entity
  parent: [ClothingBackpackDuffel, BaseSecurityContraband]
  id: ClothingBackpackDuffelCorpsman
  name: corpsman's duffel bag
  description: An odd duffelbag that uses flaps instead of zippers for quicker access. Handy!
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Back/Duffels/corpsman.rsi

#region Soviet
- type: entity
  parent: [ClothingBackpackDuffel, BaseSovietContraband]
  id: ClothingBackpackDuffelSSF
  name: SSF duffel bag
  description: Bulky olive-drab bag stamped with a faded SSF insignia.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Back/Duffels/soviet_marine_duffel.rsi
  - type: ExplosionResistance
    damageCoefficient: 0.3
  - type: Storage
    grid:
    - 0,0,8,4
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 0.9
  - type: HeldSpeedModifier

- type: entity
  parent: [ClothingBackpackDuffel, BaseSovietContraband]
