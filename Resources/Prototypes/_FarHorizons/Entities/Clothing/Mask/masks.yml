- type: entity
  parent: [ ClothingMaskGas, BaseSecurityContraband ]
  id: ClothingMaskGasCorpsman
  name: Biohazard Gas Mask
  description: VERY Expensive medical PPE.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Mask/corpsmangas.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/Mask/corpsmangas.rsi
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    hideOnToggle: true
  - type: Pierceable
    level: Metal
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.90
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95
  - type: LimbArmor
    limbs:
      Head: {}

- type: entity
  parent: ClothingMaskBase
  id: ClothingMaskClownDoc
  name: Doctor Chuckles
  description: Surely this doctor won't let you rot.. right?
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Mask/docclown.rsi
    state: icon
  - type: Clothing
    sprite: _FarHorizons/Clothing/Mask/docclown.rsi
  - type: BreathMask
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Tag
    tags:
      - PetWearable
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout

- type: entity
  parent: [ClothingMaskGas, BaseSecurityContraband]
  id: ClothingMaskGasSecurityNoHailer
  name: Damaged Security Gas Mask
  description: A standard issue Security gas mask. Seems to have it's hailer violently torn out with a sticky note slapped on it reading "USE THIS!"
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: Clothing/Mask/gassecurity.rsi
  - type: Clothing
    sprite: Clothing/Mask/gassecurity.rsi
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95
  - type: LimbArmor
    limbs:
      Head: {}
  - type: Tag
    tags:
    - HeavySecSuit

