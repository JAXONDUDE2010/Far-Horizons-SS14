#Paramedic Void Helmet
- type: entity
  parent: [ ClothingHeadSuitWithLightBase, ClothingHeadEVAHelmetBase ] 
  id: ClothingHeadHelmetVoidParamedSyndi
  name: Paramedic Void Helmet 
  description: A void helmet made for paramedics.
  categories: [ HideSpawnMenu ]
  suffix: NS
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Head/Hardsuits/NeoSol/paramedhelm.rsi 
  - type: HandheldLight
    addPrefix: false
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: equipped-head-light
      head-vox:
      - state: equipped-head-light-vox
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-head
      head-vox:
      - state: equipped-head-vox
  - type: TemperatureProtection
    heatingCoefficient: 0.1
    coolingCoefficient: 0.1
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.90
        Radiation: 0.75
  - type: LimbArmor # Far Horizons
    limbs:
      Head:
        coefficients:
          Heat: 0.90
          Radiation: 0.75
          Caustic: 0.5
  - type: PointLight
    radius: 5
    energy: 2
    color: "#00ff62"
  - type: Tag
    tags:
    - HelmetEVA
    - WhitelistChameleon