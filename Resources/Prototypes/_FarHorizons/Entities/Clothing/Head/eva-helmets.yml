#region Medical

#Medical Helmet
- type: entity
  parent: ClothingHeadEVAHelmetBase
  id: ClothingHeadHelmetEVAMedicalSyndi
  name: Medical EVA helmet
  description: An old-but-gold helmet designed for extravehicular activites and given to the Medical department. Infamous for making security officers paranoid.
