  - type: Clothing
    sprite: _FarHorizons/Clothing/Head/Helmets/heatabsorbent-syndi.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.93
        Slash: 0.93
        Piercing: 0.93
        Heat: 0.87
  - type: Tag
    tags:
    - SecurityHelmet

