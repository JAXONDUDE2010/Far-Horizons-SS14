- type: entity
  parent: [ ClothingHeadHelmetBase, BaseSalvageContraband ]
  id: ClothingHeadHelmetSalvage
  name: Salvage Helmet
  description: A generic helmet given to all of GSL's salvage teams. Clearly the money that was supposed to armor it went somewhere's else.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Head/Helmets/salvagerhelmet.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/Head/Helmets/salvagerhelmet.rsi
  - type: HideLayerClothing
    layers:
      Hair: HEAD

#region Syndicate







#region Security

- type: entity
  parent: [ClothingHeadHelmetArmoredBase, BaseSecurityContraband, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetSecuritySyndi
  name: Security Helmet
  suffix: S
  description: Standard security gear. Protects the head from impacts.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Head/Helmets/security-syndi.rsi
    layers:
      - state: icon
      - state: icon-light
        shader: unshaded
        map: [ "light" ]
  - type: Appearance
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: equipped-head-light
      head-vox:
      - state: equipped-head-light-vox
      head-vulpkanin:
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-head
      head-vox:
      - state: equipped-head-vox
  - type: Tag
    tags:
    - WhitelistChameleon
    - SecurityHelmet
  - type: PointLight
    color: "#03fc03"
    enabled: false
    falloff: 20
    radius: 2
    mask: null
    energy: 4
  #- type: HideLayerClothing
  #  layers:
  #    Hair: HEAD-

- type: entity
  parent: [ClothingHeadBase, BaseSecurityContraband, BaseToggleClothing]
  id: ClothingHeadHelmetBulletProofSyndi
  name: Bulletproof Helmet
  suffix: S
  description: Protects the face against bullets, can flip up and down.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Head/Helmets/bulletproof-syndi.rsi
    layers:
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: _FarHorizons/Clothing/Head/Helmets/bulletproof-syndi.rsi
  - type: Item
    storedRotation: 0  
  - type: ItemToggle # Welding mask starts in an activated state
    activated: true
  - type: Appearance
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.80
  - type: ToggleClothing
    action: ActionToggleWeldingMask
  - type: WeldingMask  
  - type: HideLayerClothing
    slots:
    - Snout
    hideOnToggle: true
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon}
          False: {state: icon-up}
  - type: ComponentToggler
    components:
    - type: IngestionBlocker
    - type: FlashImmunity
    - type: IdentityBlocker
  - type: Tag
    tags:
    - BulletproofArmor

- type: entity
  parent: [ ClothingHeadHelmetBase, BaseSecurityContraband ]
  id: ClothingHeadHelmetHeatAbsorbentSyndi
  name: Heat Absorbent Helmet
  suffix: S
  description: Advanced helmet best paired with the vest for pure style, has minor reflective properties and can absorb heat fairly well.
  components:
  - type: Sprite
