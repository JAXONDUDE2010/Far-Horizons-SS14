        Piercing: 0.93
        Heat: 0.93
  - type: Tag
    tags:
    - SecurityHelmet

# SWAT Helmet

- type: entity
  parent: [ClothingHeadHelmetBase, BaseSecurityContraband]
  id: ClothingHeadHelmetSwatSyndi
  name: SWAT Helmet
  suffix: S
  description: An extremely robust helmet, commonly used by paramilitary forces. This one has the Syndicate logo emblazoned on the top.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Head/Helmets/swat-syndi.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/Head/Helmets/swat-syndi.rsi
  - type: Pierceable
    level: Metal
  - type: Armor #This is intentionally not spaceproof, when the time comes to port the values from SS13 this should be buffed from what it was.
    modifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.80
        Heat: 0.80
        Radiation: 0.80
        Caustic: 0.95
  - type: ExplosionResistance
    damageCoefficient: 0.75
  - type: HideLayerClothing
    layers:
      Hair: HEAD