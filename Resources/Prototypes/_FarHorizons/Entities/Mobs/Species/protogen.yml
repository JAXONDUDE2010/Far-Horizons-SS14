#region PROTOGEN ####

- type: entity
  parent: [BaseSpeciesMobOrganic, BaseSpeciesPickupableLarge]
  id: BaseMobProtogenNoVision
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Trinary
    understands:
    - GalacticCommon
    - Machine
    - Trinary
  - type: Repairable # So welder is just a special little snowflake in the code. I tried making healing with welder work through ConditionalHealing component, but it would require too many changes in too many places. So we will keep on the trend and have brute healing defined here. /shrug
    doAfterDelay: 1 # Faster than normal so using welding to heal isn't absolute ass for protogens
    allowSelfRepair: true
    fuelCost: 10
    damage:
      groups:
        Brute: -30 # 5 for each type with reduction applied
  - type: Hunger
  - type: Icon
    sprite: _FarHorizons/Mobs/Species/Protogen/parts.rsi
    state: full
  - type: Thirst
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Protogen
  # Music player
  - type: ActionGrant
    actions:
    - ActionSiliconPlayMidi
  - type: Instrument
    allowPercussion: true
    allowProgramChange: true
    handheld: false
  - type: UserInterface
    interfaces:
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
      enum.SurgeryUIKey.Key:
        type: SurgeryBui
      enum.VampireMutationUiKey.Key:
        type: VampireMutationBoundUserInterface
      enum.ThavenMoodsUiKey.Key: # impstation edit
        type: ThavenMoodsBoundUserInterface
        requireInputValidation: false
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
        requireInputValidation: false
  - type: GlitchOnIonStorm
    duration: 25
    ramp: 3
  - type: HumanoidEMPComposite # HumanoidEMPComposite is used to gather EMP effects from HumanoidEMPCompositeElement components on all limbs and organs. These effects added in addition to effects in HumanoidEMP and won't work without it
  - type: HumanoidEMP # HumanoidEMP is needed to receive EMP effects, it may carry its own innate effects, but doesn't have to
    effectCooldown: 2
    effect: # TODO: Move the rest of this to limbs as well.
      knockdownAmount: 1.0
      slowdownAmount: 15.0
      walkSpeedModifier: 0.5
      sprintSpeedModifier: 0.5
      dropItemsFrom:
        - body_part_slot_right hand
        - body_part_slot_left hand
      damageAmount:
        types:
          Shock: 10
          Heat: 10
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2 #AP claws. Funny.
        Slash: 3
  - type: Body
    prototype: Protogen
    requiredLegs: 2
  - type: Tag
    tags:
      - CanPilot
      - FootstepSound
      - DoorBumpOpener
      - AnomalyHost
      - Protogen
      - SiliconEmotesFH 
  - type: TemperatureDamage # Similar to vulp becasue they are ALSO a furred race
    heatDamageThreshold: 325
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold : 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1.5 #per second, scales with temperature & other constants
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureSpeed
    thresholds:
      280: 0.9
      250: 0.8
      230: 0.7
  - type: Inventory
    speciesId: protogen #to be replaced with proto[species] when new sprites are made
    templateId: protogen
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _FarHorizons/Mobs/Species/Protogen/displacement.rsi
            state: jumpsuit-female
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.45 #per second, halved compared to normal.
  - type: TypingIndicator # TODO - Find "protogen" noises. Idk.
    proto: robot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Borg
    allowedEmotes: ['Chirp', 'Hisses', 'Squish', 'Purr', 'Growl', 'Trill', 'Scree', 'Call', 'Squawk', 'Bark', 'Snarl', 'Whine', 'Howl', 'Yip', 'Mew', 'Meow','Thump', 'Liss', 'Lurr', 'Rattle', "Marr", "Wurble", 'Chitter', 'Squeak', 'Click', 'Beep', 'Ping', 'Buzz', 'Buzz-Two', 'Chime', 'Honk']
  - type: Vocal
    sounds:
      Male: MaleProtogen
      Female: FemaleProtogen
      Unsexed: MaleProtogen
  - type: UniversalHealModifier
    modifier: 0.5
  - type: Absorbable

- type: entity
  parent: BaseMobProtogenNoVision
  id: BaseMobProtogen
  name: Urist McToaster
  abstract: true
  components:
  - type: VisionOrganRequiredForVision

