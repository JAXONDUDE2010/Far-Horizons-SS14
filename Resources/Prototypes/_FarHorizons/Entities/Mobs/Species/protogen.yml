#region LASPI ####

- type: entity
  parent: BaseMobProtogen
  id: BaseMobProtoSlimePerson
  name: Urist McSlimester
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Machine
    - Trinary
    - Bubblish
    understands:
    - GalacticCommon
    - Machine
    - Trinary
    - Bubblish
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
      enum.SurgeryUIKey.Key:
        type: SurgeryBui
      enum.VampireMutationUiKey.Key:
        type: VampireMutationBoundUserInterface
  - type: Icon
    sprite: _FarHorizons/Mobs/Species/Proto-Slime/parts.rsi
    state: full
  - type: Body
    prototype: Slime # Replace when I figure out more complex sprites for proto-[species]
    requiredLegs: 2
  - type: Storage
    clickInsert: false
    showVerb: false
    grid:
    - 0,0,1,2
    maxItemSize: Large
    storageInsertSound:
      path: /Audio/Voice/Slime/slime_squish.ogg
  - type: PrivateStorage
    accessDelay: 3.0
    accessPopup: "laspi-storage-accessing"
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UseDelay
    delay: 0.5
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: ProtoSlimePerson
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 65
    damage:
      types:
        Heat: -0.14
      groups:
        Brute: -0.14
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#2cf274"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Bloodstream
    bloodReagent: Slime
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.55
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
    reactions:
    - reagents: [ Water, SpaceCleaner ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPieReaction
    - reagents: [ Water ]
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        scaleByQuantity: true
        damage:
          types:
            Heat: 0.1
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "slime-hurt-by-water-popup" ]
        probability: 0.25
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatSlime
      amount: 5
  - type: Respirator
    damage:
      types:
        Asphyxiation: 0.2
    damageRecovery:
      types:
        Asphyxiation: -1.0
    maxSaturation: 15
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: ShowThirstIcons
  - type: SolutionScanner
  - type: Wagging

- type: entity
  parent: MobHumanDummy
  id: MobProtoSlimePersonDummy
  categories: [ HideSpawnMenu ]
