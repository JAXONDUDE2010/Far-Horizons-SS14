#region PROTOGEN ####

- type: entity
  parent: BaseMobSpeciesOrganic
  id: BaseMobProtogen
  name: Urist McToaster
  abstract: true
  components:
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Machine
    - Trinary
    understands:
    - GalacticCommon
    - Machine
    - Trinary
  - type: Hunger
  - type: Icon
    sprite: _FarHorizons/Mobs/Species/Protogen/parts.rsi
    state: full
  - type: Thirst
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Protogen
  # Music player
  - type: ActionGrant
    actions:
    - ActionSiliconPlayMidi
  - type: Instrument
    allowPercussion: true
    allowProgramChange: true
    handheld: false
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
        requireInputValidation: false
  - type: HumanoidEMP
    effect:
      stunAmount: 5.0
      knockdownAmount: 2.0
      slowdownAmount: 15.0
      walkSpeedModifier: 0.5
      sprintSpeedModifier: 0.5
      dropItemsFrom:
        - body_part_slot_right hand
        - body_part_slot_left hand
      additionalEffects:
        StatusEffectBlinded: 10.0
      damageAmount:
        types:
          Shock: 10
          Heat: 10
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2 #AP claws. Funny.
        Slash: 3
  - type: Body
    prototype: Protogen
    requiredLegs: 2
  - type: Tag
    tags:
      - CanPilot
      - FootstepSound
      - DoorBumpOpener
      - AnomalyHost
      - Protogen
  - type: Temperature # Similar to vulp becasue they are ALSO a furred race
    heatDamageThreshold: 325
    coldDamageThreshold: 230
    currentTemperature: 310.15
    specificHeat: 46
    coldDamage:
      types:
        Cold : 0.5 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1.2 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      280: 0.9
      250: 0.8
      230: 0.7
  - type: HumanoidAppearance
    species: Protogen
    hideLayersOnEquip:
    - Hair
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _FarHorizons/Mobs/Species/Protogen/displacement.rsi
            state: jumpsuit-female
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.45 #per second, halved compared to normal.
  - type: TypingIndicator # TODO - Find "protogen" noises. Idk.
    proto: robot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Borg
    allowedEmotes: ['Chirp', 'Hisses', 'Squish', 'Purr', 'Growl', 'Trill', 'Scree', 'Call', 'Squawk', 'Bark', 'Snarl', 'Whine', 'Howl', 'Yip', 'Mew', 'Meow','Thump', 'Liss', 'Lurr', 'Rattle', "Mar", "Wurble", 'Chitter', 'Squeak', 'Click', 'BeepRobot', 'PingRobot', 'BuzzRobot', 'Buzz-TwoRobot', 'ChimeRobot', 'HonkRobot']
  - type: Vocal
    sounds:
      Male: MaleProtogen
      Female: FemaleProtogen
      Unsexed: MaleProtogen
  - type: UniversalHealModifier
    modifier: 0.5

- type: entity
  parent: BaseSpeciesDummy
  id: MobProtogenDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _FarHorizons/Mobs/Species/Protogen/displacement.rsi
            state: jumpsuit-female

