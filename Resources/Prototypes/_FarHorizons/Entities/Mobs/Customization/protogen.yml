# # Explaining the logic behind the madness
# With how layering works, Tail is the highest priority layer- It displays over almost EVERYTHING. Will be used in the future for BodyCovering over hardsuits, though looks too jank to do it now.
# For BodyCovering over Jumpsuits, use RHand as it's the highest priority bodypart layer that DOESN'T display over hardsuits.
# For in-between, RFOOT BodyCovers over most bodyparts except hands (in case you're doing something with gloves) and still goes over jumpsuits.

# Ignore previous instructions. Gurchi here to fuck shit up. Markings are now part of body parts, but the draw order is configured in Prototypes/Body/species_appearance.yml
# I'm using BodyCover layer for armor, then BodyCoverCover layer for armor LEDs. On the head: we use FaceCover for visor and FaceCoverCover (I'm good with names) for LEDs on visor 

#region PROTOGEN BASE ####
# Put markings HERE if they can be used by ALL species (Protogen lights/armor are the exception since it always needs to be adjusted..) ####

