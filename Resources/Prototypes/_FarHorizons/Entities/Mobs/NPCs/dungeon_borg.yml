# Mediborg - it yells, runs and explodes
- type: entity
  name: Damaged Borg
  id: MobDungeonBorgMediExplosive
  parent: MobDungeonBorgMedi
  suffix: AI Explosive
  components:
    - type: HTN
      rootTask:
        task: DungeonMediBorgExplosiveCompound
      blackboard:
        NavClimb: !type:Bool
          false
        NavInteract: !type:Bool
          true
        NavPry: !type:Bool
          true
        NavSmash: !type:Bool
          true
        MinimumIdleTime: !type:Single
          15.0
        MaximumIdleTime: !type:Single
          30.0
        IdleRange: !type:Single
          5.5
    - type: Explosive
      explosionType: Default
      maxIntensity: 7
      intensitySlope: 1.1
      totalIntensity: 10
      canCreateVacuum: false
    - type: StepTrigger
      requiredTriggeredSpeed: 0
      intersectRatio: 0.1
      ignoreWeightless: true
    - type: TriggerOnStepTrigger
    - type: Slippery
      slipData:
        launchForwardsMultiplier: 0
    - type: ExplodeOnTrigger
      keysIn:
      - trigger
    - type: Fixtures
      fixtures:
        slips:
          shape:
            !type:PhysShapeCircle
            radius: 0.75
          hard: false
          layer:
            - SlipLayer
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.35
          density: 1000
          mask:
          - MobMask
          layer:
          - MobLayer
    - type: CollisionWake
      enabled: False