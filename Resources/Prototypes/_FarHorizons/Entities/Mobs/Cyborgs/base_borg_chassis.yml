- type: entity
  abstract: true
  parent: BaseBorgTransponder
  id: BaseSecBorgTransponder
  components:
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: SecborgControl
    transmitFrequencyId: SecurityRoboticsConsole
    savableAddress: false


- type: entity # TODO implement sirens
  parent: [BaseBorgChassis, BaseSecBorgTransponder]
  id: BorgChassisSecurity
  name: security cyborg
  description: A special chassis produced by Nanotrasen to aid station side security forces in their duties.
  components:
  - type: BorgTransponder
    name: security cyborg
    sprite:
      sprite: _FarHorizons/Mobs/Silicon/chassis.rsi
      state: secborg
  - type: TextToSpeech
  - type: Sprite
    sprite: _FarHorizons/Mobs/Silicon/chassis.rsi
    layers:
      - state: secborg
      - state: secborg_e
        map: ["enum.BorgVisualLayers.Light"]
        shader: unshaded
        visible: false
      - state: secborg_l
        shader: unshaded
        map: ["light"]
        visible: false
      # - state: secborg_siren_on
      #   map: [ "enum.BorgVisualLayers.Siren" ]
      #   shader: unshaded
  - type: RandomMetadata
    nameSegments:
    - NamesBorg
  - type: NpcFactionMember
    factions:
    - NanoTrasenSilicon
  - type: Access
    enabled: false
    groups:
    - Security # Ensure it can go anywhere inside of sec.
  - type: AccessReader
    access: [["Command"], ["Armory"]] # Warden & Command. Todo, sec roboticist
  - type: ShowJobIcons
  - type: ShowMindShieldIcons
  - type: ShowCriminalRecordIcons
  - type: InteractionPopup
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: FlashImmunity
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
    - Common
    - Science
    - Security
  - type: ActiveRadio
    channels:
    - Binary
    - Common
    - Science
    - Security
  # - type: ActionGrant
  #   actions:
  #   - ActionBorgToggleSirens
  - type: EmagSiliconLaw
    stunTime: 5
  - type: SiliconLawProvider
    laws: RobocopLawset
  - type: BorgChassis
    maxModules: 6
    hasMindState: secborg_e
    noMindState: secborg_e_r

- type: entity
  parent: BorgChassisSecurity
  id: BorgChassisSecurityModule
  suffix: Module
  components:
  - type: ContainerFill
    containers:
      borg_module:
      - BorgModuleTool
      - BorgModuleBaton
      - BorgModuleDominator

  

- type: entity
  parent: BaseBorgChassisNotIonStormable
  id: BaseNTNCChassis
  name: NT-NC
  description: A special chassis produced by Nanotrasen to aid Centcom forces in their duties.
  save: false
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Silicon/chassis.rsi
  - type: TextToSpeech
  - type: RandomMetadata
    nameSegments:
    - NamesBorg
  - type: NpcFactionMember
    factions:
    - NanoTrasenSilicon
  - type: Access
    enabled: false
    groups:
    - AllAccess
    tags:
    - CentralCommand
  - type: AccessReader
    access: [["CentralCommand"]]
  - type: ShowJobIcons
  - type: InteractionPopup
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: Speech
    speechVerb: Robotic
    speechSounds: Xenoborg
    allowedEmotes:
    - Laugh
  - type: Vocal
    sounds:
      Unsexed: UnisexSiliconXenoborg
  - type: FlashImmunity
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
    - CentCom
    - Common
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
    - Law
  - type: ActiveRadio
    channels:
    - Binary
    - CentCom
    - Common
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
    - Law
  - type: SiliconLawProvider
    laws: NTNCLawset
  - type: ShowHealthBars
    damageContainers:
    - Biological
    - Inorganic
    - Silicon
  - type: ShowHealthIcons
  - type: ShowMindShieldIcons
  - type: ShowCriminalRecordIcons

- type: entity
  parent: BaseNTNCChassis
  id: NTNCBorgChassisHAW
  name: NT-NC H.A.W
  description: A special chassis produced by Nanotrasen to aid Centcom forces in their duties. The H.A.W (Hazardous Assault Walker) features heavy armaments and a specialised access configurator designed to grant immediate entry.
  components:
  - type: TextToSpeech
  - type: Sprite
    layers:
      - state: ntnc_haw
      - state: ntnc_haw_e
        map: ["enum.BorgVisualLayers.Light"]
        shader: unshaded
        visible: false
      - state: ntnc_haw_l
        shader: unshaded
        map: ["light"]
        visible: false
  - type: BorgChassis
    maxModules: 5
    moduleWhitelist:
      tags:
        - BorgModuleGeneric
        - BaseBorgModuleCentcomm
        - BorgModuleEngineering
    hasMindState: ntnc_haw_e
    noMindState: ntnc_haw_e_r
  - type: MobThresholds # tankier
    thresholds:
      0: Alive
      150: Critical
      300: Dead
    stateAlertDict:
      Alive: BorgHealth
      Critical: BorgCrit
      Dead: BorgDead
    showOverlays: false
    allowRevives: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 125
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/warning_buzzer.ogg
          params:
            volume: 5
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:EmptyContainersBehaviour
        containers:
        - borg_brain
        - cell_slot
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: InteractionPopup
    interactSuccessString: petting-success-syndicate-cyborg
    interactFailureString: petting-failure-syndicate-cyborg
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg

- type: entity
  parent: BaseNTNCChassis
  id: NTNCBorgChassisSOSU
  name: NT-NC S.O.S.U
  description: A special chassis produced by Nanotrasen to aid Centcom forces in their duties. The S.O.S.U (Special Operations Sentry Unit) specializes in covert operations and sabotaged and is equipped with several modules to aid it in this task.
  components:
  - type: TextToSpeech
  - type: Sprite
    layers:
      - state: ntnc_sosu
        map: ["body"]
      - state: ntnc_sosu_e
        map: ["enum.BorgVisualLayers.Light", "activeLight"]
        shader: unshaded
        visible: false
      - state: ntnc_sosu_l
        shader: unshaded
        map: ["light"]
        visible: false
  - type: BorgChassis
    maxModules: 5
    moduleWhitelist:
      tags:
        - BorgModuleGeneric
        - BaseBorgModuleCentcomm
        - BorgModuleEngineering
    hasMindState: ntnc_sosu_e
    noMindState: ntnc_sosu_e_r
  - type: InteractionPopup
    interactSuccessString: petting-success-syndicate-cyborg
    interactFailureString: petting-failure-syndicate-cyborg
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: NightVision
  - type: OptionsVisualizer
    visuals:
      body:
      - options: Default
        data: {state: ntnc_sosu}
      - options: ReducedMotion
        data: {state: ntnc_sosu_static}
      light:
      - options: Default
        data: {state: ntnc_sosu_l}
      - options: ReducedMotion
        data: {state: ntnc_sosu_l_static}
      activeLight:
      - options: Default
        data: {state: ntnc_sosu_e}
      - options: ReducedMotion
        data: {state: ntnc_sosu_e_static}
      noMindState:
      - options: Default
        data: {state: ntnc_sosu_e_r}
      - options: ReducedMotion
        data: {state: ntnc_sosu_e_r_static}
  - type: MovementAlwaysTouching # it flies in space with tiny thrusters
  - type: FootstepModifier # it flies instead of walking
    footstepSoundCollection:
      collection: FootstepHoverXenoborg
