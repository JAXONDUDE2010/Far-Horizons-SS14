- type: entity
  parent: SurgeryBase
  id: SurgeryRemovePlating
  name: Remove Outer Plating
  description: Removes the protective outer plating.
  components:
  - type: Surgery
    priority: -100
    steps:
    - SurgeryStepRemoveScrews
    - SurgeryStepUnweldJoints
    - SurgeryStepPryPlating
  - type: RequireInorganicPart

- type: entity
  parent: SurgeryBase
  id: SurgeryRestorePlating
  name: Restore Outer Plating
  description: Restores the protective outer plating.
  components:
  - type: Surgery
    priority: 100
    requirement:
    - SurgeryRemovePlating
    steps:
    - SurgeryStepPositionPlating
    - SurgeryStepRestoreScrews
    - SurgeryStepWeldJoints

- type: entity
  parent: SurgeryBase
  id: SurgeryExtractCavityItemRobot
  name: Extract Item
  components:
  - type: Surgery
    requirement:
    - SurgeryRemovePlating
    steps:
    - SurgeryStepLocateItemCavity
    - SurgeryStepRemoveItemCavityRobot
  - type: SurgerySpeciesCondition
    speciesBlacklist: []
    speciesWhitelist:
    - IPC
  - type: SurgeryPartCondition
    parts:
    - Torso
  - type: SurgeryOrganExistCondition
    category: Cavity
  - type: Sprite
    sprite: Mobs/Species/Human/parts.rsi
    state: torso_m

- type: entity
  parent: SurgeryBase
  id: SurgeryImplantCavityItemRobot
  name: Implant Item
  components:
  - type: Surgery
    requirement:
    - SurgeryRemovePlating
    steps:
    - SurgeryStepPrepareImplantSiteCavityRobot
    - SurgeryStepInsertItemCavity
  - type: SurgerySpeciesCondition
    speciesBlacklist: []
    speciesWhitelist:
    - IPC
  - type: SurgeryPartCondition
    parts:
    - Torso
  - type: SurgeryOrganDontExistCondition
    category: Cavity
  - type: Sprite
    sprite: Mobs/Species/Human/parts.rsi
    state: torso_m
    
