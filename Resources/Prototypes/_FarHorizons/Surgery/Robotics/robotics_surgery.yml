#region Incision
- type: entity
  parent: SurgeryBase
  id: SurgeryRemovePlating
  name: Remove Outer Plating
  description: Removes the protective outer plating.
  components:
  - type: Surgery
    priority: -100
    steps:
    - SurgeryStepRemoveScrews
    - SurgeryStepUnweldJoints
    - SurgeryStepPryPlating
  - type: RequireInorganicPart

- type: entity
  parent: SurgeryBase
  id: SurgeryRestorePlating
  name: Restore Outer Plating
  description: Restores the protective outer plating.
  components:
  - type: Surgery
    priority: 100
    requirement:
    - SurgeryRemovePlating
    steps:
    - SurgeryStepPositionPlating
    - SurgeryStepRestoreScrews
    - SurgeryStepWeldJoints

#region Organs...?
- type: entity
  parent: SurgeryBase
  id: SurgeryExtractEyesRobot
  name: Extract Eyes
  components:
  - type: Surgery
    requirement:
    - SurgeryRemovePlating
    steps:
    - SurgeryStepLocateEyes
    - SurgeryStepCutOpticWire
    - SurgeryStepRemoveEyesRobot
  - type: SurgeryPartCondition
    parts:
    - Head
  - type: SurgeryOrganExistCondition
    category: Eyes
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
    layers:
      - state: eyeball-l
      - state: eyeball-r
  - type: SurgerySpeciesCondition
    speciesBlacklist: []
    speciesWhitelist:
    - IPC

- type: entity
  parent: SurgeryBase
  id: SurgeryImplantEyesRobot
  name: Implant Eyes
  components:
