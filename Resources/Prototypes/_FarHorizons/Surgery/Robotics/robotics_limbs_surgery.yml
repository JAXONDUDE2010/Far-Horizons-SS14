# Base

- type: entity
  id: SurgeryRobotLimbBase
  abstract: true
  categories:
  - HideSpawnMenu
  components:
  - type: Surgery
    requirement:
    - SurgeryRemovePlating
  - type: RequireInorganicPart

# Head

- type: entity
  parent: [ SurgeryRobotLimbBase, SurgeryLimbAmputate ]
  id: SurgeryAmputateRobotHead
  components:
  - type: Surgery
    steps:
    - SurgeryStepRemoveInnerScrews
    - SurgeryStepRemoveInnerPlating
    - SurgeryStepExposeWiringConnections
    - SurgeryStepExposeCoolantChannels
    - SurgeryStepUnweldSkull
  - type: SurgeryPartCondition
    parts: [ Head ]

- type: entity
  parent: [ SurgeryRobotLimbBase, SurgeryLimbAttach ]
  id: SurgeryAttachRobotHead
  name: Limb Attachment Head
  components:
  - type: Surgery
    steps:
    - SurgeryStepExposeWiringConnections
    - SurgeryStepExposeCoolantChannels
    - SurgeryStepAttachHead
    - SurgeryStepConnectWiringConnections
    - SurgeryStepConnectCoolantChannels
    - SurgeryStepRestoreInnerScrews
  - type: SurgeryPartCondition
    parts: [ Torso ]
  - type: SurgeryOrganDontExistCondition
    category: [ Head ]

