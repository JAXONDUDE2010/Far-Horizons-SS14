- type: entity
  parent: SurgeryBase
  id: SurgeryAlterAppearance
  name: Plastic Surgery
  description: Alters the patient's appearance.
  components:
  - type: Surgery
    requirement:
    - SurgeryOpenIncision
    steps:
    - SurgeryStepRetractSkin
    - SurgeryStepAlterAppearance
    - SurgeryStepCloseIncision
  - type: SurgeryPartCondition
    parts:
    - Head
  - type: SurgerySpeciesCondition
    speciesBlacklist:
    - IPC
  - type: Sprite
    sprite: Mobs/Species/Human/parts.rsi
    state: head_m
  - type: SurgeryTechnology
    requiredTechnology: SurgeryTech 

- type: entity
