- type: entity
  parent: SurgeryBase
  id: SurgeryAlterAppearance
  name: Plastic Surgery
  description: Alters the patient's appearance.
  components:
  - type: Surgery
    requirement:
    - SurgeryOpenIncision
    steps:
    - SurgeryStepRetractSkin
    - SurgeryStepAlterAppearance
    - SurgeryStepCloseIncision
  - type: SurgeryPartCondition
    parts:
    - Head
  - type: Sprite
    sprite: Mobs/Species/Human/parts.rsi
    state: head_m

- type: entity
  parent: SurgeryBase
  id: SurgeryTendBrute
  name: Tend Brute Wound
  description: Heals Brute Injuries.
  components:
  - type: Surgery
    steps:
    - SurgeryStepCarefulIncision
    - SurgeryStepRepairBrute 
    - SurgeryStepSealWound
  - type: SurgeryPartCondition
    parts:
    - Torso

- type: entity
  parent: SurgeryBase
  id: SurgeryTendBurn
  name: Tend Burn Wounds
  description: Heals Burn Injuries.
  components:
  - type: Surgery
    steps:
    - SurgeryStepCarefulIncision
    - SurgeryStepRepairBurn 
    - SurgeryStepSealWound
  - type: SurgeryPartCondition
    parts:
    - Torso
    
- type: entity
  parent: SurgeryBase
  id: SurgeryEndNecrosisBase
  name: Finish Necrosis Surgery
  description: We can try our best. 
  components:
  - type: Surgery
    requirement: 
      - SurgeryReverseNecrosisBase
    steps:
    - SurgeryStepEndNecrosisSurgery
  - type: SurgeryPartCondition
    parts:
    - Torso

- type: entity
  parent: SurgeryBase
  id: SurgeryReverseNecrosisBase
  name: Necrosis Reversal [Base]
  description: We can try our best. 
  components:
  - type: Surgery
    steps:
    - SurgeryStepInspectForNecrosis
  - type: SurgeryPartCondition
    parts:
    - Torso
  - type: NecrosisSurgery
    amountOfSurgeries : 1