# Base

- type: entity
  id: SurgeryLimbAmputate
  abstract: true
  name: Amputate
  components:
    - type: Sprite
      sprite: Objects/Specific/Medical/Surgery/saw.rsi
      state: saw

- type: entity
  id: SurgeryLimbAttach
  abstract: true
  components:
    - type: Sprite
      sprite: Objects/Specific/Medical/medical.rsi
      state: medicated-suture

- type: entity
  id: SurgeryLimbBase
  abstract: true
  categories:
  - HideSpawnMenu
  components:
  - type: Surgery
    requirement:
    - SurgeryOpenIncision
  - type: SurgerySpeciesCondition
    speciesBlacklist:
    - SlimePerson

- type: entity
  id: SurgeryLimbBaseSlime
  abstract: true
  categories:
  - HideSpawnMenu
  components:
  - type: Surgery
    requirement:
    - SurgeryOpenIncisionSlime
  - type: SurgerySpeciesCondition
    speciesWhitelist:
    - SlimePerson

# Head

- type: entity
  parent: [ SurgeryLimbBase, SurgeryLimbAmputate ]
  id: SurgeryAmputateHead
  components:
  - type: Surgery
    steps:
    - SurgeryStepDeepIncision
    - SurgeryStepExposeSkull
    - SurgeryStepExposeNerves
    - SurgeryStepExposeBloodVessels
    - SurgeryStepAmputateHead
  - type: SurgeryPartCondition
    parts: [ Head ]

- type: entity
  parent: [ SurgeryLimbBase, SurgeryLimbAttach ]
  id: SurgeryAttachHead
  name: Limb Attachment Head
  components:
  - type: Surgery
    steps:
    - SurgeryStepExposeNerves
    - SurgeryStepExposeBloodVessels
    - SurgeryStepAttachHead
    - SurgeryStepRejoinNerves
    - SurgeryStepRejoinBloodVessels
    - SurgeryStepRestoreCartilage
  - type: SurgeryPartCondition
    parts: [ Torso ]
  - type: SurgeryOrganDontExistCondition
    category: Head

