# Base

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepBaseAmputation
  abstract: true
  name: Saw Through Bone
  components:
  - type: SurgeryStep
    duration: 16 
    tools:
    - type: BoneSaw
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/saw.rsi
    state: saw
  - type: SurgeryStepEmoteEffect
  - type: SurgeryStepBleedEffect
    damage:
      types:
        Slash: 10
  - type: OnFailDamage
    damage: 
      types:
        Slash: 10

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepBaseAttach
  abstract: true
  name: Attach Part
  components:
  - type: SurgeryStep
    duration: 4 
    tools:
    - type: Organ
  - type: Sprite
    sprite: Objects/Consumable/Food/Baked/pizza.rsi
    state: meat-slice
  - type: SurgeryStepOrganInsert

- type: entity
  parent: SurgeryStepBaseAmputation
  id: SurgeryStepBaseAmputationSlime
  abstract: true
  name: Separate Part
  components:
  - type: SurgeryStep
    duration: 20
    tools:
    - type: Retractor # What are we sawing?
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/scissors.rsi
    state: retractor
# Head

- type: entity
  parent: SurgeryStepBaseAmputation
  id: SurgeryStepAmputateHead
  components:
  - type: SurgeryStepOrganExtract
    slot: Head

- type: entity
  parent: SurgeryStepBaseAmputationSlime
  id: SurgeryStepAmputateHeadSlime
  components:
  - type: SurgeryStepOrganExtract
    slot: Head

- type: entity
  parent: SurgeryStepBaseAttach
  id: SurgeryStepAttachHead
  components:
  - type: SurgeryStep
    organCategory: Head

