#region Syndicate









#region Command

# Commander(Captain)

- type: entity
  id: ClothingBeltSheathFilledSyndi
  parent: ClothingBeltSheathSyndi
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - CaptainSabre

# Technical Lead (Chief Engineer)

- type: entity
  id: ClothingBeltChiefEngineerFilledSyndi
  parent: ClothingBeltChiefEngineerSyndi
  suffix: S, Filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: PowerDrill
        - id: JawsOfLife
        - id: WelderExperimental
        - id: Multitool
        - id: HolofanProjector
        - id: GasAnalyzer
        - id: trayScanner

