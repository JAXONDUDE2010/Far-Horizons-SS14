# Locker & Hardsuit table for Magistrate's Locker
- type: entityTable
  id: FillMagistrateLockerHardsuit
  table: !type:AllSelector
    children:
    - id: ClothingHeadHatMagistrateCap
    - id: ClothingHeadsetMagistrate
    - id: ClothingEyesGlassesMagistrate
    - id: ClothingHeadHatCowboyBlack
    - id: MagistrateUniformSkirt
    - id: MagistrateUniformSuit
    - id: ClothingHeadHatPwig
    - id: WeaponDisabler
    - id: LuxuryPen
    - id: BoxFolderClipboardFilled
    - id: BoxFolderBlack
    - id: BoxFolderRed
    # Start of Magistrate's Suit-Storage table
    - id: ClothingOuterHardsuitMagistrate
    - id: ClothingMaskBreath
    - id: OxygenTankFilled
    - id: NitrogenTankFilled

- type: entity
  id: LockerMagistrateFilledHardsuit
  suffix: Filled, Hardsuit
  parent: LockerMagistrate
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:NestedSelector
          tableId: FillMagistrateLockerHardsuit

# Locker table for Magistrate's Locker

- type: entityTable
  id: FillMagistrateLocker
