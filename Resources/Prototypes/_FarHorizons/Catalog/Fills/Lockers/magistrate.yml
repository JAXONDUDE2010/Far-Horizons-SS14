    children:
    - id: ClothingHeadHatMagistrateCap
    - id: ClothingHeadsetMagistrate
    - id: ClothingEyesGlassesMagistrate
    - id: ClothingHeadHatCowboyBlack
    - id: MagistrateUniformSkirt
    - id: MagistrateUniformSuit
    - id: ClothingShoesBootsLaceup
    - id: ClothingHeadHatPwig
    - id: WeaponDisabler
    - id: LuxuryPen
    - id: BoxFolderClipboardFilled
    - id: BoxFolderBlack
    - id: BoxFolderRed

- type: entity
  id: LockerMagistrateFilled
  parent: LockerMagistrate
  suffix: Filled
