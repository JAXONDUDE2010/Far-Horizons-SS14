#region Syndicate

# Commandant (Captain)

- type: entity
  id: LockerCommandantFilledNoLaser
  suffix: S, Filled
  parent: LockerCommandant
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillCommandantNoLaser

- type: entityTable
  id: LockerFillCommandantNoLaser
  table: !type:AllSelector
    children:
    - id: ClothingNeckCloakCapFormalSyndi
    - id: CaptainIDCard
    - id: CigarGoldCase
      prob: 0.25
    - id: ClothingBeltSheathFilledSyndi
    - id: ClothingHeadsetAltCommandSyndi
    - id: ClothingOuterArmorCaptainCarapaceSyndi
    - id: CommsComputerCircuitboard
    - id: DoorRemoteCustom
    - id: MedalCase
    - id: NukeDisk
    - id: PinpointerNuclear
    - id: PlushieNuke
      prob: 0.1
    - id: RubberStampCaptain
    - id: SpaceCash1000
    - id: ClothingEyesGlassesCommandSyndi
    - id: ClothingEyesHudCommandSyndi
    - id: EncryptionKeyCargo # Far Horizons - replaced with cargo key
    - id: OrganSkeletonPersonHead
      conditions:
      - !type:PlayerCountCondition
        max: 15
    - id: PrintedDocumentGreenshiftAlert
      conditions:
      - !type:GamemodeCondition
        presets:
        - Greenshift
        - Sandbox

- type: entity
  id: LockerCommandantFilled
  suffix: S, Filled, AntiqueLaser
  parent: LockerCommandant
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillCommandantLaser

- type: entityTable
  id: LockerFillCommandantLaser
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: LockerFillCaptainNoLaser
    - id: WeaponAntiqueLaser

- type: entity
  id: LockerCommandantFilledHardsuit
  suffix: S, Filled, Hardsuit
  parent: LockerCommandant
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:NestedSelector
          tableId: LockerFillCommandantLaser
        - !type:NestedSelector
          tableId: FillCommandantHardsuit

