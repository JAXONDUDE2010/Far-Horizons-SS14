# HoP's Suit Storage Unit

- type: entity
  id: SuitStorageHoP
  parent: SuitStorageBaseFH
  name: Personal Suit Storage Unit
  description: A standard-issue suit storage unit. The most basic looking out of the other personal storage units for all command members.
  suffix: Head of Personnel
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillHoPHardsuit
  - type: Sprite
    sprite: _FarHorizons/Structures/Storage/suit_storage.rsi
    layers:
    - state: hop
      map: ["enum.StorageVisualLayers.Base"]
    - state: door
      map: ["enum.StorageVisualLayers.Door"]
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: screen-eva
      map: ["computerLayerScreen"]
  - type: EntityStorageVisuals
    stateDoorOpen: hop
  - type: AccessReader
    access: [["HeadOfPersonnel"]]

- type: entityTable
  id: FillHoPHardsuit
  table: !type:AllSelector
    children:
    - id: ClothingOuterHardsuitHoP
    - id: ClothingMaskBreath
    - id: OxygenTankFilled
    - id: NitrogenTankFilled

