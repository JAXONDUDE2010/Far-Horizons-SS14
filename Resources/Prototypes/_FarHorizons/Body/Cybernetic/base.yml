- type: markingsGroup
  id: Cybernetics
  onlyGroupWhitelisted: true

- type: entity
  parent: OrganBase
  id: OrganCyber
  name: Cyber Organ
  suffix: Cyber
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Iron
        Quantity: 30
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: Oil
          Quantity: 10
  - type: OrganEmpTarget
    baseDamage:
      types:
        Shock: 3
  - type: Tag
    tags:
      - Inorganic

- type: entity
  parent: OrganCyber
  id: OrganCyberExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/Cyberlimbs/parts.rsi #FH
  - type: VisualOrgan
    data:
      sprite: _FarHorizons/Mobs/Species/Cyberlimbs/parts.rsi #FH
    speciesOverrides:
      Resomi: _FarHorizons/Mobs/Species/Cyberlimbs/resomiparts.rsi #FH
      ProtoResomi: _FarHorizons/Mobs/Species/Cyberlimbs/resomiparts.rsi #FH
  - type: VisualOrganMarkings
    markingData:
      group: Cybernetics


- type: entity
  parent: [ OrganBaseArmRight, OrganCyberExternal ]
  id: OrganCyberArmRight
  abstract: true
  name: Right Cyber Arm
  components:
    - type: OrganEmpTarget
      baseDamage:
        types:
          Shock: 6
      thresholds:
        5:
          dropItemsFrom:
          - right
    - type: VisualOrganMarkings
      markingData:
        layers:
        - RArm
    - type: LimbDamageEffect
      effects:
        - effect: !type:LimbEffectDetach # Amputate limb when it takes slash damage
          condition: !type:LimbConditionSpecificDamage
            damageType: Slash
            damageAmount: 100
        - effect: !type:LimbEffectDestroy # Gib limb. If it has organs (head), it will drop them
          condition: !type:LimbConditionOr
            conditions:
              - !type:LimbConditionSpecificDamage
                damageType: Blunt
                damageAmount: 250
              - !type:LimbConditionSpecificDamage
                damageType: Heat
                damageAmount: 500
    - type: Tag
      tags:
        - Inorganic

