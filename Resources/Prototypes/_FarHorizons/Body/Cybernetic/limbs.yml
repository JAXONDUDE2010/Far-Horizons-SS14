#reaper
- type: entity
  parent: [ OrganCyberArmLeft, WithLeftCyberHand ]
  id: LeftArmCyberReaper
  name: Left Reaper Arm
  components:
    - type: VisualOrgan
      data:
        sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
        state: "l_silver_arm"
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_silver_arm"
    - type: LimbItemStorage
      items:
        - ScalpelCyber
        - RetractorCyber
        - CauteryCyber
        - DrillCyber
        - SawCyber
        - HemostatCyber
        - BoneSetterCyber
        - BoneGel
    - type: LimbItemDeployer
      action: ActionToggleCyberHandLeft
      sound: 
        path: /Audio/_Starlight/Medical/Cyber/deploy.ogg
      handWhitelist:
        tags:
          - CyberHandItem
          - BoneGel
      stateOn: l_silver_arm_SURG
      stateOff: l_silver_arm

- type: entity
  parent: [ OrganCyberArmRight, WithRightCyberHand ]
