# Base

- type: entity
  id: ConnectedOrganBase
  abstract: true
  components:
    - type: ContainerContainer
      containers:
        connected_organs: !type:Container
    - type: ConnectedOrgan

- type: entity
  parent: ConnectedOrganBase
  id: WithLeftCyberHand
  abstract: true
  components:
    - type: ConnectedOrgan
      roundstart:
        - LeftHandCyber

- type: entity
  parent: ConnectedOrganBase
  id: WithRightCyberHand
  abstract: true
  components:
    - type: ConnectedOrgan
      roundstart:
        - RightHandCyber

- type: entity
  parent: ConnectedOrganBase
  id: WithLeftCyberFoot
  abstract: true
  components:
    - type: ConnectedOrgan
      roundstart:
        - LeftFootCyber

- type: entity
  parent: ConnectedOrganBase
  id: WithRightCyberFoot
  abstract: true
  components:
    - type: ConnectedOrgan
      roundstart:
        - RightFootCyber

# Limbs

- type: entity
  parent: [ OrganCyberArmLeft, WithLeftCyberHand ]
  id: LeftArmCyber
  components:
    - type: RoundstartImplantable
      cost: 1

- type: entity
  parent: [ OrganCyberArmRight, WithRightCyberHand ]
