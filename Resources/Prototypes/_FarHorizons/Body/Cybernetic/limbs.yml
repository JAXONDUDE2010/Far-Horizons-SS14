# Base

- type: entity
  id: ConnectedOrganBase
  abstract: true
  components:
    - type: ContainerContainer
      containers:
        connected_organs: !type:Container
    - type: ConnectedOrgan

- type: entity
  parent: ConnectedOrganBase
  id: WithLeftCyberHand
  abstract: true
  components:
    - type: ConnectedOrgan
      roundstart:
        - LeftHandCyber

- type: entity
  parent: ConnectedOrganBase
  id: WithRightCyberHand
  abstract: true
  components:
    - type: ConnectedOrgan
      roundstart:
        - RightHandCyber

- type: entity
  parent: ConnectedOrganBase
  id: WithLeftCyberFoot
  abstract: true
  components:
    - type: ConnectedOrgan
      roundstart:
        - LeftFootCyber

- type: entity
  parent: ConnectedOrganBase
  id: WithRightCyberFoot
  abstract: true
  components:
    - type: ConnectedOrgan
      roundstart:
        - RightFootCyber

# Limbs

- type: entity
  parent: [ OrganCyberArmLeft, WithLeftCyberHand ]
  id: LeftArmCyber
  components:
    - type: RoundstartImplantable
      cost: 1

- type: entity
  parent: [ OrganCyberArmRight, WithRightCyberHand ]
  id: RightArmCyber
  components:
    - type: RoundstartImplantable
      cost: 1

- type: entity
  parent: OrganCyberHandLeft
  id: LeftHandCyber
  components:
    - type: RoundstartImplantable
      cost: 1

- type: entity
  parent: OrganCyberHandRight
  id: RightHandCyber
  components:
    - type: RoundstartImplantable
      cost: 1

- type: entity
  parent: [ OrganCyberLegLeft, WithLeftCyberFoot ]
  id: LeftLegCyber
  components:
    - type: MovementOrgan
      sprintSpeedModifier: 1.05 # +5%
    - type: RoundstartImplantable
      cost: 2

- type: entity
  parent: [ OrganCyberLegRight, WithRightCyberFoot ]
  id: RightLegCyber
  components:
    - type: MovementOrgan
      sprintSpeedModifier: 1.05 # +5%
    - type: RoundstartImplantable
      cost: 2

- type: entity
  parent: OrganCyberFootLeft
  id: LeftFootCyber
  components:
    - type: RoundstartImplantable
      cost: 1

- type: entity
  parent: OrganCyberFootRight
  id: RightFootCyber
  components:
    - type: RoundstartImplantable
      cost: 1
      
#reaper
- type: entity
  parent: [ OrganCyberArmLeft, WithLeftCyberHand ]
  id: LeftArmCyberReaper
  name: Left Reaper Arm
  components:
    - type: VisualOrgan
      data:
        sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
        state: "l_silver_arm"
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_silver_arm"
    - type: LimbItemStorage
      items:
        - ScalpelCyber
        - RetractorCyber
        - CauteryCyber
        - DrillCyber
        - SawCyber
        - HemostatCyber
        - BoneSetterCyber
        - BoneGel
    - type: LimbItemDeployer
      action: ActionToggleCyberHandLeft
      sound: 
        path: /Audio/_Starlight/Medical/Cyber/deploy.ogg
      handWhitelist:
        tags:
          - CyberHandItem
          - BoneGel
      stateOn: l_silver_arm_SURG
      stateOff: l_silver_arm

- type: entity
  parent: [ OrganCyberArmRight, WithRightCyberHand ]
  id: RightArmCyberReaper
  name: Right Reaper Arm
  components:
    - type: VisualOrgan
      data:
        sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
        state: "r_silver_arm"
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "r_silver_arm"
    - type: LimbItemStorage
      items:
        - ScalpelCyber
        - RetractorCyber
        - CauteryCyber
        - DrillCyber
        - SawCyber
        - HemostatCyber
        - BoneSetterCyber
        - BoneGel
    - type: LimbItemDeployer
      action: ActionToggleCyberHandRight
      sound: 
        path: /Audio/_Starlight/Medical/Cyber/deploy.ogg
      handWhitelist:
        tags:
          - CyberHandItem
          - BoneGel
      stateOn: r_silver_arm_SURG
      stateOff: r_silver_arm

