# TODO - Sprite protogen organs. Should be a mixture of cybernetic and flesh.

- type: entity
  id: BaseProtogenUnGibbable
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
  - type: Organ
  - type: Food
  - type: Extractable
    grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: FlavorProfile
    flavors:
      - people
  - type: Tag
    tags:
      - Meat

- type: entity
  id: BaseProtogenOrgan
  parent: BaseProtogenUnGibbable
  abstract: true
  components:
  - type: Gibbable

- type: entity
  id: OrganProtogenBrain
  parent: [BaseOrganBrain, BaseProtogenUnGibbable]
  name: brain
  description: "The source of incredible, unending intelligence. 01201020 02102111 01201210 02121012 20121210"
  components:
  - type: Sprite
    state: brain

- type: entity
  id: OrganProtogenEyes
  parent: [BaseProtogenOrgan, BaseOrganEyes]
  name: eyes
  description: "Squishy. Who knew there was eyes underneath that visor?"
  components:
  - type: Sprite
    layers:
      - state: eyeball-l
      - state: eyeball-r
  - type: Item
    size: Small
    heldPrefix: eyeballs
  - type: OrganVisualization
    layer: Eyes
    prototype: MobHumanoidEyes

- type: entity
  id: OrganProtogenTongue
  parent: [BaseProtogenOrgan, BaseOrganTongue]
  name: tongue
  description: "A fleshy muscle located underneath the visor, typically used for lying."
  components:
  - type: Sprite
    state: tongue

- type: entity
  id: OrganProtogenAppendix
  parent: [BaseProtogenOrgan, BaseOrganAppendix]
  name: appendix
  components:
  - type: Sprite
    layers:
    - state: appendix
    - state: appendix-inflamed
      visible: false

- type: entity
  id: OrganProtogenEars
  parent: [BaseProtogenOrgan, BaseOrganEars]
  name: ears
  description: "Process audio at a higher quality than most humanoids, allowing for greater appreciation of techno music"
  components:
  - type: Sprite
    state: ears

- type: entity
  id: OrganProtogenLungs
  parent: [BaseProtogenOrgan, BaseOrganLungs]
  name: lungs
  description: "Filters oxygen from an atmosphere, which is then sent into the bloodstream to be used as an electron carrier. Unusually healthy, due to the constant filtration of air by a protogen's visor."
  components:
  - type: Sprite
    layers:
      - state: lung-l
      - state: lung-r
  - type: Item
    size: Small
    heldPrefix: lungs
  - type: Lung
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Human ]
    groups:
    - id: Gas
      rateModifier: 100.0
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      Lung:
        maxVol: 100.0
        canReact: false
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5

- type: entity
  id: OrganProtogenHeart
  parent: [BaseProtogenOrgan, BaseOrganHeart]
  name: heart
  description: "I feel bad for the heartless bastard who lost this."
  components:
  - type: Sprite
    state: heart-on
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [Human]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
  - type: Item
    size: Small
    heldPrefix: heart

- type: entity
  id: OrganProtogenStomach
  parent: [OrganAnimalStomach, BaseOrganStomach]
  name: stomach
  description: "Gross. This is hard to stomach."
  components:
  - type: Sprite
    state: stomach
  - type: Item
    size: Small
    heldPrefix: stomach
  - type: Stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5


- type: entity
  id: OrganProtogenLiver
  parent: [BaseProtogenOrgan, BaseOrganLiver]
  name: liver
  description: "Pairing suggestion: fermented RAM sticks and CPU drives."
  components:
  - type: Sprite
    state: liver
  - type: Item
    size: Small
    heldPrefix: liver
  - type: Metabolizer
    maxReagents: 1
    metabolizerTypes: [Human]
    groups:
    - id: Alcohol
      rateModifier: 0.1

- type: entity
  id: OrganProtogenKidneys
  parent: [BaseProtogenOrgan, BaseOrganKidneys]
  name: kidneys
  description: "Filters toxins from the bloodstream. Does not filter computer viruses."
  components:
  - type: Sprite
    layers:
      - state: kidney-l
      - state: kidney-r
  - type: Item
    size: Small
    heldPrefix: kidneys
  - type: Metabolizer
    maxReagents: 5
    metabolizerTypes: [Human]
    removeEmpty: true
