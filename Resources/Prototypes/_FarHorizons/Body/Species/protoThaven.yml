- type: markingsGroup
  parent: [ Thaven, BaseProtogen ]
  id: ProtoThaven
  limits:
    enum.HumanoidVisualLayers.FaceCover:
      limit: 1
      required: true
      default: [ ProtoThavenVisor ]
    enum.HumanoidVisualLayers.BodyCover:
      limit: 1
      required: true
      default: [ ProtoThavenMediumArmor ]

- type: entity
  parent: AppearanceThaven
  id: AppearanceProtoThaven
  name: ProtoThaven Appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganProtoThavenTorso
      Head: OrganProtoThavenHead
      ArmLeft: OrganProtoThavenArmLeft
      ArmRight: OrganProtoThavenArmRight
      HandRight: OrganProtoThavenHandRight
      HandLeft: OrganProtoThavenHandLeft
      LegLeft: OrganProtoThavenLegLeft
      LegRight: OrganProtoThavenLegRight
      FootLeft: OrganProtoThavenFootLeft
      FootRight: OrganProtoThavenFootRight
      Brain: OrganProtogenBrain
      Eyes: OrganProtogenEyes
      Tongue: OrganProtogenTongue
      Ears: OrganProtogenEars
      Lungs: OrganProtogenLungs
      Heart: OrganProtogenHeart
      Stomach: OrganProtogenStomach
      Liver: OrganProtogenLiver
      Kidneys: OrganProtogenKidneys
  - type: HumanoidProfile
    species: ProtoThaven

- type: entity
  parent:
  - AppearanceProtoThaven
  - BaseMobProtoThaven
  id: MobProtoThaven
  name: Urist McEarster

# Organs

- type: entity
  parent: OrganThavenExternal
  id: OrganProtoThavenExternal
  abstract: true
  components:
  - type: VisualOrganMarkings
    markingData:
      group: ProtoThaven

