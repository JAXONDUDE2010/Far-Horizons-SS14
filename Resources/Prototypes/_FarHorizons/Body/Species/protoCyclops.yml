- type: markingsGroup
  parent: [ Cyclorite, BaseProtogen ]
  id: ProtoCyclops
  limits:
    enum.HumanoidVisualLayers.FaceCover:
      limit: 1
      required: true
      default: [ ProtoCyclopsVisor ]
    enum.HumanoidVisualLayers.BodyCover:
      limit: 1
      required: true
      default: [ ProtoCyclopsMediumArmor ]

- type: entity
  parent: AppearanceCyclorite
  id: AppearanceProtoCyclops
  name: ProtoCyclops Appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganProtoCyclopsTorso
      Head: OrganProtoCyclopsHead
      ArmLeft: OrganProtoCyclopsArmLeft
      ArmRight: OrganProtoCyclopsArmRight
      HandRight: OrganProtoCyclopsHandRight
      HandLeft: OrganProtoCyclopsHandLeft
      LegLeft: OrganProtoCyclopsLegLeft
      LegRight: OrganProtoCyclopsLegRight
      FootLeft: OrganProtoCyclopsFootLeft
      FootRight: OrganProtoCyclopsFootRight
      Brain: OrganProtogenBrain
      Eyes: OrganProtogenEyes
      Tongue: OrganProtogenTongue
      Ears: OrganProtogenEars
      Lungs: OrganProtogenLungs
      Heart: OrganProtogenHeart
      Stomach: OrganProtogenStomach
      Liver: OrganProtogenLiver
      Kidneys: OrganProtogenKidneys
  - type: HumanoidProfile
    species: ProtoCyclops

- type: entity
  parent:
  - AppearanceProtoCyclops
  - BaseMobProtoCyclops
  id: MobProtoCyclops
  name: Urist McCyclopster

# Organs

- type: entity
  id: OrganProtoCyclopsExternal
  abstract: true
  suffix: Protogen
  components:
  - type: VisualOrganMarkings
    markingData:
      group: ProtoCyclops

