- type: markingsGroup
  id: IPC
  onlyGroupWhitelisted: true
  limits:
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: false
      default: [ ScreenBsod ]
    enum.HumanoidVisualLayers.Head:
      limit: 1
      required: false
      default: [ MarkingBishopHead ]
    enum.HumanoidVisualLayers.Chest:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceIPC
  name: IPC Appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganIPCTorso
      Head: OrganIPCHead
      ArmLeft: OrganIPCArmLeft
      ArmRight: OrganIPCArmRight
      HandRight: OrganIPCHandRight
      HandLeft: OrganIPCHandLeft
      LegLeft: OrganIPCLegLeft
      LegRight: OrganIPCLegRight
      FootLeft: OrganIPCFootLeft
      FootRight: OrganIPCFootRight
      Eyes: OrganIPCEyes
      Tongue: OrganIPCTongue
      Ears: OrganIPCEars
      Heart: OrganIPCHeart
  - type: HumanoidProfile
    species: IPC

- type: entity
  parent:
  - AppearanceIPC
  - BaseMobIPC
  id: MobIPC
  name: Urist McRobot

# Organs

- type: entity
  parent: OrganBase
  id: OrganIPC
  abstract: true
  suffix: IPC
  components:
  - type: Tag
    tags:
      - Inorganic
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Oil
        Quantity: 10
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: Oil
          Quantity: 10

- type: entity
  parent: OrganIPC
  id: OrganIPCInternal
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/IPC/organs.rsi

- type: entity
  parent: OrganIPC
  id: OrganIPCExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/IPC/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _FarHorizons/Mobs/Species/IPC/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: IPC

