# Organs

- type: entity
  parent: [ OrganBaseEyes, OrganIPCInternal, OrganIPCExternal ]
  id: OrganIPCEyes
  name: Robotic Eyes
  description: "Decidedly not squishy. Kinda sharp, actually."
  components:
  - type: VisualOrgan
    data:
      sprite: Mobs/Customization/eyes.rsi
      state: no_eyes
  - type: HumanoidEMPCompositeElement
    effect:
      stunAmount: 0.5
      additionalEffects:
        StatusEffectBlinded: 10.0
      damageAmount:
        types:
          Shock: 1

- type: entity
  parent: [ OrganBaseTongue, OrganIPCInternal ]
  id: OrganIPCTongue
  name: Vocal Modulator
  description: "A vocal modulator, typically used for lying."

- type: entity
  parent: [ OrganBaseEars, OrganIPCInternal ]
  id: OrganIPCEars
  name: Robotic Ears
  description: "Process audio at the same quality of station-side cyborgs"

- type: entity
  parent: [ OrganBaseHeart, OrganIPCInternal ]
  id: OrganIPCHeart
  name: Micro Pump
  description: "Circulates coolant in a sickingly familiar way."
  components:
  - type: Metabolizer
    maxReagents: 0