- type: entity
  parent: [ DamageableLimbVisualsIPC, OrganBaseArmLeftNonEdible, OrganIPCExternal ]
  id: OrganIPCArmLeft
  components:
  - type: OrganEmpTarget
    baseDamage:
      types:
        Shock: 3
        Heat: 2
    thresholds:
      5:
        dropItemsFrom:
        - left
  - type: LimbDamageEffect
    effects:
      - effect: !type:LimbEffectDetach # Amputate limb when it takes slash damage
        condition: !type:LimbConditionSpecificDamage
          damageType: Slash
          damageAmount: 100
      - effect: !type:LimbEffectDestroy # Gib limb. If it has organs (head), it will drop them
        condition: !type:LimbConditionOr
          conditions:
            - !type:LimbConditionSpecificDamage
              damageType: Blunt
              damageAmount: 250
            - !type:LimbConditionSpecificDamage
              damageType: Heat
              damageAmount: 500
  - type: Tag
    tags:
      - Inorganic

