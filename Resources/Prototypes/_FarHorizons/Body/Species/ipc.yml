# Organs

- type: entity
  parent: [ OrganBaseEyes, OrganIPCInternal, OrganIPCExternal ]
  id: OrganIPCEyes
  name: Robotic Eyes
  description: "Decidedly not squishy. Kinda sharp, actually."
  components:
  - type: VisualOrgan
    data:
      sprite: Mobs/Customization/eyes.rsi
      state: no_eyes
  - type: OrganEmpTarget
    baseDamage:
      types:
        Shock: 1
    thresholds:
      1:
        glitchDuration: 10.0
      6:
        additionalEffects:
          StatusEffectBlinded: 2.0
  - type: Tag
    tags:
      - Inorganic

- type: entity
  parent: [ OrganBaseTongue, OrganIPCInternal ]
  id: OrganIPCTongue
  name: Vocal Modulator
  description: "A vocal modulator, typically used for lying."
  components:
  - type: Tag
    tags:
      - Inorganic

- type: entity
  parent: [ OrganBaseEars, OrganIPCInternal ]
  id: OrganIPCEars
  name: Robotic Ears
  description: "Process audio at the same quality of station-side cyborgs"
  components:
  - type: Tag
    tags:
      - Inorganic

- type: entity
