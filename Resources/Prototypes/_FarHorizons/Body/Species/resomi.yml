- type: entity
  parent:
  - ActiveCritBase
  - AppearanceResomi
  - BaseMobResomi
  id: MobResomi
  name: Urist McRaptor
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      85: ActiveCritical
      170: Dead
  - type: TemperatureDamage
    heatDamageThreshold: 310
    coldDamageThreshold: 223
  - type: Temperature
    currentTemperature: 261
    specificHeat: 48
  - type: ThermalRegulator
    metabolismHeat: 400 # icebirb go brrr
    radiatedHeat: 100
    implicitHeatRegulation: 1500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 261
    thermalRegulationTemperatureThreshold: 1
  - type: TemperatureSpeed
    thresholds:
      250: 0.9
      230: 0.8
      223: 0.6

# Organs

- type: entity
  parent: OrganBase
  id: OrganResomi
  abstract: true
  suffix: Resomi
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: AmmoniaBlood
        Quantity: 20
  - type: Tag
    tags:
      - Organic

- type: entity
  id: OrganResomiMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [ Resomi ]

- type: entity
  parent: OrganResomi
  id: OrganResomiExternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Resomi/parts.rsi
  - type: VisualOrgan
    data:
      sprite: Mobs/Species/Resomi/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Resomi

- type: entity
  id: DamageableLimbVisualsResomi
  abstract: true
  components:
    - type: LimbDamageVisuals
      damageOverlayGroups:
        Brute:
          rsi: /Textures/Mobs/Effects/Resomi/brute_damage.rsi
          color: "#6C3BAA"
        Burn:
          rsi: /Textures/Mobs/Effects/Resomi/burn_damage.rsi

