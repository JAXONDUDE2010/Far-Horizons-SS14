      limit: 1
      required: true
      default: [ ResomiTail ]
    enum.HumanoidVisualLayers.TailCover:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Eyes:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.UndergarmentTop:
