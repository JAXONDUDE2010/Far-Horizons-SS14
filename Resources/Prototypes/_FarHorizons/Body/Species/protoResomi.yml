- type: markingsGroup
  parent: [ Resomi, BaseProtogen ]
  id: ProtoResomi
  limits:
    enum.HumanoidVisualLayers.FaceCover:
      limit: 1
      required: true
      default: [ ProtoResomiVisor ]
    enum.HumanoidVisualLayers.BodyCover:
      limit: 1
      required: true
      default: [ ProtoResomiMediumArmor ]

- type: entity
  parent: AppearanceResomi
  id: AppearanceProtoResomi
  name: ProtoResomi Appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganProtoResomiTorso
      Head: OrganProtoResomiHead
      ArmLeft: OrganProtoResomiArmLeft
      ArmRight: OrganProtoResomiArmRight
      HandRight: OrganProtoResomiHandRight
      HandLeft: OrganProtoResomiHandLeft
      LegLeft: OrganProtoResomiLegLeft
      LegRight: OrganProtoResomiLegRight
      FootLeft: OrganProtoResomiFootLeft
      FootRight: OrganProtoResomiFootRight
      Brain: OrganProtogenBrain
      Eyes: OrganProtogenEyes
      Tongue: OrganProtogenTongue
      Ears: OrganProtogenEars
      Lungs: OrganProtogenLungs
      Heart: OrganProtoAvaliHeart
      Stomach: OrganProtogenStomach
      Liver: OrganProtogenLiver
      Kidneys: OrganProtogenKidneys
  - type: HumanoidProfile
    species: ProtoResomi

- type: entity
  parent:
  - ActiveCritBase
  - AppearanceProtoResomi
  - BaseMobProtoResomi
  id: MobProtoResomi
  name: Urist McRapster
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      85: ActiveCritical
      170: Dead
  - type: TemperatureDamage
    heatDamageThreshold: 310
    coldDamageThreshold: 223
  - type: Temperature
    currentTemperature: 261
    specificHeat: 48
  - type: ThermalRegulator
    metabolismHeat: 400 # icebirb go brrr
    radiatedHeat: 100
    implicitHeatRegulation: 1500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 261
    thermalRegulationTemperatureThreshold: 1
  - type: TemperatureSpeed
    thresholds:
      250: 0.9
      230: 0.8
      223: 0.6
    
# Organs

- type: entity
  id: OrganProtoResomiExternal
  abstract: true
  suffix: Protogen
  components:
  - type: VisualOrganMarkings
    markingData:
      group: ProtoResomi

