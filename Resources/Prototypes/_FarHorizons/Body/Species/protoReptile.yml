      Head: OrganProtoReptileHead
      ArmLeft: OrganProtoReptileArmLeft
      ArmRight: OrganProtoReptileArmRight
      HandRight: OrganProtoReptileHandRight
      HandLeft: OrganProtoReptileHandLeft
      LegLeft: OrganProtoReptileLegLeft
      LegRight: OrganProtoReptileLegRight
      FootLeft: OrganProtoReptileFootLeft
      FootRight: OrganProtoReptileFootRight
      Brain: OrganProtogenBrain
      Eyes: OrganProtogenEyes
      Tongue: OrganProtogenTongue
      Ears: OrganProtogenEars
      Lungs: OrganProtogenLungs
      Heart: OrganProtogenHeart
      Stomach: OrganProtogenStomach
      Liver: OrganProtogenLiver
      Kidneys: OrganProtogenKidneys
  - type: HumanoidProfile
    species: ProtoReptile

- type: entity
  parent:
  - AppearanceProtoReptile
  - BaseMobProtoReptile
