      LegRight: OrganProtoSlimePersonLegRight
      FootLeft: OrganProtoSlimePersonFootLeft
      FootRight: OrganProtoSlimePersonFootRight
      Brain: OrganSlimePersonCore
      Lungs: OrganSlimePersonLungs
