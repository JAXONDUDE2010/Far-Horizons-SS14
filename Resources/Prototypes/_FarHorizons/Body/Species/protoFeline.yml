- type: markingsGroup
  parent: [ Felionoid, BaseProtogen ]
  id: ProtoFeline
  limits:
    enum.HumanoidVisualLayers.FaceCover:
      limit: 1
      required: true
      default: [ ProtoFelineVisor ]
    enum.HumanoidVisualLayers.BodyCover:
      limit: 1
      required: true
      default: [ ProtoFelineMediumArmor ]

- type: entity
  parent: AppearanceFelionoid
  id: AppearanceProtoFeline
  name: ProtoFeline Appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganProtoFelineTorso
      Head: OrganProtoFelineHead
      ArmLeft: OrganProtoFelineArmLeft
      ArmRight: OrganProtoFelineArmRight
      HandRight: OrganProtoFelineHandRight
      HandLeft: OrganProtoFelineHandLeft
      LegLeft: OrganProtoFelineLegLeft
      LegRight: OrganProtoFelineLegRight
      FootLeft: OrganProtoFelineFootLeft
      FootRight: OrganProtoFelineFootRight
      Brain: OrganProtogenBrain
      Eyes: OrganProtogenEyes
      Tongue: OrganProtogenTongue
      Ears: OrganProtogenEars
      Lungs: OrganProtogenLungs
      Heart: OrganProtogenHeart
      Stomach: OrganProtogenStomach
      Liver: OrganProtogenLiver
      Kidneys: OrganProtogenKidneys
  - type: HumanoidProfile
    species: ProtoFeline

- type: entity
  parent:
  - ActiveCritBase
  - AppearanceProtoFeline
  - BaseMobProtoFeline
  id: MobProtoFeline
  name: Urist McFelinster
  components:
    - type: MobThresholds
      thresholds:
        0: Alive
        75: ActiveCritical
        150: Dead

# Organs

- type: entity
  id: OrganProtoFelineExternal
  abstract: true
  suffix: Protogen
  components:
  - type: VisualOrganMarkings
    markingData:
      group: ProtoFeline

# Limbs

- type: entity
  parent: [ OrganProtoFelineExternal, OrganFelionoidTorso ]
  id: OrganProtoFelineTorso

- type: entity
  parent: [ OrganProtoFelineExternal, OrganFelionoidHead ]
  id: OrganProtoFelineHead

- type: entity
  parent: [ BaseProtogenArmLeft, OrganProtoFelineExternal, OrganFelionoidArmLeft ]
  id: OrganProtoFelineArmLeft

- type: entity
  parent: [ BaseProtogenArmRight, OrganProtoFelineExternal, OrganFelionoidArmRight ]
  id: OrganProtoFelineArmRight

- type: entity
  parent: [ BaseProtogenHandLeft, OrganProtoFelineExternal, OrganFelionoidHandLeft ]
  id: OrganProtoFelineHandLeft

- type: entity
  parent: [ BaseProtogenHandRight, OrganProtoFelineExternal, OrganFelionoidHandRight ]
  id: OrganProtoFelineHandRight

- type: entity
  parent: [ BaseProtogenLegLeft, OrganProtoFelineExternal, OrganFelionoidLegLeft ]
  id: OrganProtoFelineLegLeft

- type: entity
  parent: [ BaseProtogenLegRight, OrganProtoFelineExternal, OrganFelionoidLegRight ]
  id: OrganProtoFelineLegRight

- type: entity
  parent: [ BaseProtogenFootLeft, OrganProtoFelineExternal, OrganFelionoidFootLeft ]
  id: OrganProtoFelineFootLeft

- type: entity
  parent: [ BaseProtogenFootRight, OrganProtoFelineExternal, OrganFelionoidFootRight ]
  id: OrganProtoFelineFootRight