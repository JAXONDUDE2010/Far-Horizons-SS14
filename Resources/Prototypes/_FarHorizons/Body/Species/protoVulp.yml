- type: markingsGroup
  parent: [ Vulpkanin, BaseProtogen ]
  id: ProtoVulp
  limits:
    enum.HumanoidVisualLayers.FaceCover:
      limit: 1
      required: true
      default: [ ProtoVulpVisor ]
    enum.HumanoidVisualLayers.BodyCover:
      limit: 1
      required: true
      default: [ ProtoVulpMediumArmor ]

- type: entity
  parent: AppearanceVulpkanin
  id: AppearanceProtoVulp
  name: ProtoVulp Appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganProtoVulpTorso
      Head: OrganProtoVulpHead
      ArmLeft: OrganProtoVulpArmLeft
      ArmRight: OrganProtoVulpArmRight
      HandRight: OrganProtoVulpHandRight
      HandLeft: OrganProtoVulpHandLeft
      LegLeft: OrganProtoVulpLegLeft
      LegRight: OrganProtoVulpLegRight
      FootLeft: OrganProtoVulpFootLeft
      FootRight: OrganProtoVulpFootRight
      Brain: OrganProtogenBrain
      Eyes: OrganProtogenEyes
      Tongue: OrganProtogenTongue
      Ears: OrganProtogenEars
      Lungs: OrganProtogenLungs
      Heart: OrganProtoVulpHeart
      Stomach: OrganProtoVulpStomach
      Liver: OrganProtogenLiver
      Kidneys: OrganProtogenKidneys
  - type: HumanoidProfile
    species: ProtoVulp

- type: entity
  parent:
  - AppearanceProtoVulp
  - BaseMobProtoVulp
  id: MobProtoVulp
  name: Urist McVulpster

# Organs

- type: entity
  parent: OrganProtogen
  id: OrganProtoVulpExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/Proto-Vulp/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _FarHorizons/Mobs/Species/Proto-Vulp/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: ProtoVulp

# Limbs

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganProtoVulpExternal ]
  id: OrganProtoVulpTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganProtoVulpExternal ]
  id: OrganProtoVulpHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Snout
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.FacialHair
    dependentHidingLayers:
      enum.HumanoidVisualLayers.Snout:
      - enum.HumanoidVisualLayers.SnoutCover

- type: entity
  parent: [ BaseProtogenArmLeft, OrganBaseArmLeft, OrganProtoVulpExternal ]
  id: OrganProtoVulpArmLeft

- type: entity
  parent: [ BaseProtogenArmRight, OrganBaseArmRight, OrganProtoVulpExternal ]
  id: OrganProtoVulpArmRight

- type: entity
  parent: [ BaseProtogenHandLeft, OrganBaseHandLeft, OrganProtoVulpExternal ]
  id: OrganProtoVulpHandLeft

- type: entity
  parent: [ BaseProtogenHandRight, OrganBaseHandRight, OrganProtoVulpExternal ]
  id: OrganProtoVulpHandRight

- type: entity
  parent: [ BaseProtogenLegLeft, OrganBaseLegLeft, OrganProtoVulpExternal ]
  id: OrganProtoVulpLegLeft

- type: entity
  parent: [ BaseProtogenLegRight, OrganBaseLegRight, OrganProtoVulpExternal ]
  id: OrganProtoVulpLegRight

- type: entity
  parent: [ BaseProtogenFootLeft, OrganBaseFootLeft, OrganProtoVulpExternal ]
  id: OrganProtoVulpFootLeft

- type: entity
  parent: [ BaseProtogenFootRight, OrganBaseFootRight, OrganProtoVulpExternal ]
  id: OrganProtoVulpFootRight

#Internal Organs

- type: entity
  parent: [ OrganBaseHeart, OrganProtogenInternal, OrganProtogenMetabolizer ]
  id: OrganProtoVulpHeart
  name: Cybernetic Heart
  description: "Doesn't actually need to beat, simply mimics the movement to provide comfort for the user."
  suffix: Protogen-Vulpkanin
  components:
  - type: Metabolizer
    updateInterval: 0.75

- type: entity
  parent: [ OrganBaseStomach, OrganProtogenInternal, OrganProtogenMetabolizer ]
  id: OrganProtoVulpStomach
  name: Biological Reactor
  description: "Some call it over-engineered, but it's vital to the function of a protogen. Turns organic matter into organic and electrical energy to power the protogen's cybernetics and flesh."
  suffix: Protogen-Vulpkanin
  components:
  - type: Metabolizer
    updateInterval: 0.75
  - type: SolutionContainerManager
    solutions:
      food: {}
      stomach:
        maxVol: 100 #he hungers
  - type: Stomach
    specialDigestible:
      tags:
      - RamChip
    isSpecialDigestibleExclusive: false
