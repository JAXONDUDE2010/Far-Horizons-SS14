- type: markingsGroup
  parent: [ Moth, BaseProtogen ]
  id: ProtoMoth
  limits:
    enum.HumanoidVisualLayers.FaceCover:
      limit: 1
      required: true
      default: [ ProtoMothVisor ]
    enum.HumanoidVisualLayers.BodyCover:
      limit: 1
      required: true
      default: [ ProtoMothMediumArmor ]

- type: entity
  parent: AppearanceMoth
  id: AppearanceProtoMoth
  name: ProtoMoth Appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganProtoMothTorso
      Head: OrganProtoMothHead
      ArmLeft: OrganProtoMothArmLeft
      ArmRight: OrganProtoMothArmRight
      HandRight: OrganProtoMothHandRight
      HandLeft: OrganProtoMothHandLeft
      LegLeft: OrganProtoMothLegLeft
      LegRight: OrganProtoMothLegRight
      FootLeft: OrganProtoMothFootLeft
      FootRight: OrganProtoMothFootRight
      Brain: OrganProtogenBrain
      Eyes: OrganProtogenEyes
      Tongue: OrganProtogenTongue
      Ears: OrganProtogenEars
      Lungs: OrganProtogenLungs
      Heart: OrganProtogenHeart
      Stomach: OrganProtoMothStomach
      Liver: OrganProtogenLiver
      Kidneys: OrganProtogenKidneys
  - type: HumanoidProfile
    species: ProtoMoth

- type: entity
  parent:
  - AppearanceProtoMoth
  - BaseMobProtoMoth
  id: MobProtoMoth
  name: Urist McFluffster

# Organs

- type: entity
  id: OrganProtoMothExternal
  abstract: true
  suffix: Protogen
  components:
  - type: VisualOrganMarkings
    markingData:
      group: ProtoMoth

