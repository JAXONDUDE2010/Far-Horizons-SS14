- type: markingsGroup
  parent: [ Arachnid, BaseProtogen ]
  id: ProtoArachnid
  limits:
    enum.HumanoidVisualLayers.FaceCover:
      limit: 1
      required: true
      default: [ ProtoArachnidVisor ]

- type: entity
  parent: AppearanceArachnid
  id: AppearanceProtoArachnid
  name: ProtoArachnid Appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganProtoArachnidTorso
      Head: OrganProtoArachnidHead
      ArmLeft: OrganProtoArachnidArmLeft
      ArmRight: OrganProtoArachnidArmRight
      HandRight: OrganProtoArachnidHandRight
      HandLeft: OrganProtoArachnidHandLeft
      LegLeft: OrganProtoArachnidLegLeft
      LegRight: OrganProtoArachnidLegRight
      FootLeft: OrganProtoArachnidFootLeft
      FootRight: OrganProtoArachnidFootRight
      Brain: OrganProtogenBrain
      Eyes: OrganProtogenEyes
      Tongue: OrganProtogenTongue
      Ears: OrganProtogenEars
      Lungs: OrganProtogenLungs
      Heart: OrganProtoArachnidHeart
      Stomach: OrganProtogenStomach
      Liver: OrganProtogenLiver
      Kidneys: OrganProtogenKidneys
  - type: HumanoidProfile
    species: ProtoArachnid

- type: entity
  parent:
  - ActiveCritBase
  - AppearanceProtoArachnid
  - BaseMobProtoArachnid
  id: MobProtoArachnid
  name: Urist McWebster

# Organs

- type: entity
  id: OrganProtoArachnidExternal
  abstract: true
  suffix: Protogen
  components:
  - type: VisualOrganMarkings
    markingData:
      group: ProtoArachnid

# Limbs

- type: entity
  parent: [ OrganProtoArachnidExternal, OrganArachnidTorso ]
  id: OrganProtoArachnidTorso

- type: entity
  parent: [ OrganProtoArachnidExternal, OrganArachnidHead ]
  id: OrganProtoArachnidHead

- type: entity
  parent: [ BaseProtogenArmLeft, OrganProtoArachnidExternal, OrganArachnidArmLeft ]
  id: OrganProtoArachnidArmLeft

- type: entity
  parent: [ BaseProtogenArmRight, OrganProtoArachnidExternal, OrganArachnidArmRight ]
  id: OrganProtoArachnidArmRight

- type: entity
  parent: [ BaseProtogenHandLeft, OrganProtoArachnidExternal, OrganArachnidHandLeft ]
  id: OrganProtoArachnidHandLeft

- type: entity
  parent: [ BaseProtogenHandRight, OrganProtoArachnidExternal, OrganArachnidHandRight ]
  id: OrganProtoArachnidHandRight

- type: entity
  parent: [ BaseProtogenLegLeft, OrganProtoArachnidExternal, OrganArachnidLegLeft ]
  id: OrganProtoArachnidLegLeft

- type: entity
  parent: [ BaseProtogenLegRight, OrganProtoArachnidExternal, OrganArachnidLegRight ]
  id: OrganProtoArachnidLegRight

- type: entity
  parent: [ BaseProtogenFootLeft, OrganProtoArachnidExternal, OrganArachnidFootLeft ]
  id: OrganProtoArachnidFootLeft

- type: entity
  parent: [ BaseProtogenFootRight, OrganProtoArachnidExternal, OrganArachnidFootRight ]
  id: OrganProtoArachnidFootRight

# Internal

- type: entity
  parent: OrganProtogenHeart
  id: OrganProtoArachnidHeart
  components:
  - type: Metabolizer
    updateInterval: 1.5
    metabolizerTypes: [Arachnid]