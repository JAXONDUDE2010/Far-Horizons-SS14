- type: markingsGroup
  id: BaseProtogen
  limits:
    enum.HumanoidVisualLayers.FaceCover:
      limit: 1
      required: true
      default: [ ProtogenVisor ]
    enum.HumanoidVisualLayers.FaceCoverCover:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.BodyCover:
      limit: 1
      required: true
      default: [ ProtogenMediumArmor ]
    enum.HumanoidVisualLayers.BodyCoverCover:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: false

- type: markingsGroup
  parent: [ Undergarments, BaseProtogen ]
  id: Protogen
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ ProtogenTail ]
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ ProtogenEars ]
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceProtogen
  name: Protogen Appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _FarHorizons/Mobs/Species/Protogen/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganProtogenTorso
      Head: OrganProtogenHead
      ArmLeft: OrganProtogenArmLeft
      ArmRight: OrganProtogenArmRight
      HandRight: OrganProtogenHandRight
      HandLeft: OrganProtogenHandLeft
      LegLeft: OrganProtogenLegLeft
      LegRight: OrganProtogenLegRight
      FootLeft: OrganProtogenFootLeft
      FootRight: OrganProtogenFootRight
      Brain: OrganProtogenBrain
      Eyes: OrganProtogenEyes
      Tongue: OrganProtogenTongue
      Ears: OrganProtogenEars
      Lungs: OrganProtogenLungs
      Heart: OrganProtogenHeart
      Stomach: OrganProtogenStomach
      Liver: OrganProtogenLiver
      Kidneys: OrganProtogenKidneys
  - type: HumanoidProfile
    species: Protogen

- type: entity
  parent:
  - AppearanceProtogen
  - BaseMobProtogen
  id: MobProtogen
  name: Urist McToaster
  components:  # had to put it there because BaseMobProtogen is actually used by all other protogens
    - type: Tag
      tags:
        - CanPilot
        - FootstepSound
        - DoorBumpOpener
        - AnomalyHost
        - Protogen
        - SiliconEmotesFH
        - TrueProtogen  # because of that

# Organs

- type: entity
  parent: OrganBase
  id: OrganProtogen
  abstract: true
  suffix: Protogen
  components:
  - type: Tag
    tags:
      - Organic

- type: entity
  id: OrganProtogenMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Protogen ]

- type: entity
  parent: OrganProtogen
  id: OrganProtogenInternal
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/Protogen/organs.rsi
  - type: Tag
    tags:
      - Meat
      - Organic

- type: entity
  parent: OrganProtogen
  id: OrganProtogenExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _FarHorizons/Mobs/Species/Protogen/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _FarHorizons/Mobs/Species/Protogen/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Protogen

# Limbs

