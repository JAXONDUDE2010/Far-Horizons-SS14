- type: dungeonConfig
  id: Reactor
  layers:
  - !type:PrefabDunGen
    roomWhitelist:
      tags:
      - SalvageReactor
    presets:
    - ReactorBox
    - ReactorLong
    - ReactorStar
    - ReactorDouble

  - !type:CorridorDunGen
    width: 3
    tile: FloorDarkMono

  - !type:DungeonEntranceDunGen
    count: 3
    tile: FloorDarkMono
    contents: FHBaseAirlock
  
  - !type:RoomEntranceDunGen
    tile: FloorDarkMono
    contents: FHBaseAirlock
  
  - !type:ExternalWindowDunGen
    tile: FloorDarkMono
    contents: FHBaseWindow

  - !type:WallMountDunGen
    contents: ReactorWalls
    tile: FloorDarkMono

  - !type:BoundaryWallDunGen
    wall: WallSolidSyndicate
    tile: FloorDarkMono

  - !type:JunctionDunGen
    width: 3
    tile: FloorDarkMono
    contents: FHBaseAirlock

  - !type:AutoCablingDunGen
    entity: CableApcExtension
  
  - !type:CornerClutterDunGen
    contents: BaseClutter

  - !type:CorridorDecalSkirtingDunGen
    cardinalDecals:
      South: WarnLineN
      East: WarnLineE
      North: WarnLineW
      West: WarnLineS
    cornerDecals:
      SouthEast: WarnCornerSE
      SouthWest: WarnCornerSW
      NorthEast: WarnCornerNE
      NorthWest: WarnCornerNW
    pocketDecals:
      SouthWest: WarnCornerSmallSW
      SouthEast: WarnCornerSmallSE
      NorthWest: WarnCornerSmallNW
      NorthEast: WarnCornerSmallNE


- type: entityTable
  id: FHBaseAirlock
  table: !type:AllSelector
    children:
    - id: CableApcExtension
    - id: FHAirlockGlass

- type: entityTable
  id: FHBaseWindow
  table: !type:AllSelector
    children:
    - id: Grille
    - id: ReinforcedWindowSyndie

- type: entityTable
  id: ReactorWalls
  table: !type:GroupSelector
    children:
    - id: SignRadiationMed
    - id: ExtinguisherCabinetFilled
      prob: 0.2
    - id: FireAxeCabinetFilled
      prob: 0.1
    - id: IntercomEngineering
      prob: 0.1