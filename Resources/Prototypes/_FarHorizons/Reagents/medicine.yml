- type: reagent
  id: Salbutamol
  name: reagent-name-salbutamol
  group: Medicine
  desc: reagent-desc-salbutamol
  physicalDesc: reagent-physical-desc-odorless
  flavor: medicine
  color: "#7EC8E3"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Asphyxiation: -0.5
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Salbutamol
          min: 15
        damage:
          types:
            Asphyxiation: 5

- type: reagent
  id: Spaceacillin
  name: reagent-name-spaceacillin
  group: Medicine
  desc: reagent-desc-spaceacillin
  physicalDesc: reagent-physical-desc-cloudy
  flavor: bitter
  color: "#A6D1FF"
  metabolisms:
    Bloodstream:
      metabolismRate: 0.05
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: -0.5
      - !type:CleanBloodstream
        cleanseRate: 1
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Spaceacillin
          min: 10
        damage:
          types:
            Poison: 5

- type: reagent
  id: Perfluorodecalin
  name: reagent-name-perfluorodecalin
  group: Medicine
  desc: reagent-desc-perfluorodecalin
  physicalDesc: reagent-physical-desc-clear
  flavor: medicine
  color: "#AEE6FF"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Asphyxiation: -1
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Perfluorodecalin
          min: 15
        damage:
          types:
            Asphyxiation: 10

- type: reagent
  id: Vaccine
  name: reagent-name-vaccine
  group: Medicine
  desc: reagent-desc-vaccine
  physicalDesc: reagent-physical-desc-clear
  flavor: medicine
  color: "#e0f2fa"
  metabolisms:
    Bloodstream:
      metabolismRate: 5.0
      effects:
        - !type:VaccinatePerson

- type: reagent
  id: UniversalBlood
  name: reagent-name-universal-blood
  group: Medicine
  desc: reagent-desc-universal-blood
  physicalDesc: reagent-physical-desc-metallic
  flavor: metallic
  color: "#ff0303"
  metabolisms:
    Bloodstream:
      effects:
        - !type:HealthChange
          conditions:
          - !type:MetabolizerTypeCondition
            type: [ Avali, Resomi ]
            inverted: true
          damage:
            types:
              Bloodloss: -5
        - !type:ModifyBloodLevel
          conditions:
          - !type:MetabolizerTypeCondition
            type: [ Avali, Resomi ]
            inverted: true
          amount: 10 # ~ 30% per 0.5
        - !type:HealthChange
          conditions:
          - !type:MetabolizerTypeCondition
           type: [ Avali, Resomi ]
          damage:
            types: # It's artifical blood with the lethal things diluted. Doesn't make it any less deadly- just that the damage types are different and easier to heal. Crit: 5u / Lethal: 10u (Blood-bags hold 10u)
              Poison: 3
              Caustic: 2
              Slash: 2
              Asphyxiation: 6 # Heart Attack-inducing.