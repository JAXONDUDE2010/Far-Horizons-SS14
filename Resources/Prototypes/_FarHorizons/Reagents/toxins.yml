- type: reagent
  id: BatteryAcid
  name: reagent-name-batteryacid
  group: Toxins
  desc: reagent-desc-batteryacid
  physicalDesc: reagent-physical-desc-metallic
  contrabandSeverity: Minor
  flavor: shocking
  color: "#ffe270"
  metabolisms:
    Metabolites: #Acts like vitamin but for protogens. Keep in mind the -50% healing debuff they get, hence buffed numbers.
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Protogen, ProtoBird ]
        damage:
          types:
            Blunt: -0.33
            Slash: -0.33
            Piercing: -0.33
            Heat: -0.33
            Shock: -0.33
            Cold: -0.33
        affectAllLimbs: true
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Protogen, ProtoBird ] # Harmless to protogens
          inverted: true
        damage:
          types: # Drinking battery acid is bad for you? Woh.
            Shock: 0.5 
            Caustic: 0.5
      - !type:SatiateThirst
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Protogen, ProtoBird ]
        factor: 1 #yummy
      - !type:ModifyBleed #smth smth burns you from the inside so it stops internal bleeding, clearly.
        amount: -0.5
      - !type:SatiateHunger
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Protogen, ProtoBird ]

- type: reagent
  id: HydrogenSulfide
  name: reagent-name-hydrogen-sulfide
  group: Toxins
  desc: reagent-desc-hydrogen-sulfide
  flavor: bitter
  color: "#7D7C30"
  physicalDesc: reagent-physical-desc-nondescript
  contrabandSeverity: Major
  metabolisms:
    Bloodstream:
      effects:
      - !type:MovementSpeedModifier
        walkSpeedModifier: 0.65
        sprintSpeedModifier: 0.65
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: HydrogenSulfide
          min: 40
        damage:
          types:
            Poison: 1.30