# BSO's hardsuit
- type: entity
  id: SuitStorageBlueShield
  # FH Suit Storage Unit Name & Description - START -
  parent: SuitStorageBaseFH 
  name: High-Tech Suit Storage Unit
  description: A high-tech suit storage unit designed for storing the Officer Blueshield's hardsuit and other related equipment. It's plated with heavily reinforced steel along with iron trimmings on the side to truly brand the unit. 
  # FH Suit Storage Unit Name & Description - END -
  suffix: BlueShield
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: OxygenTankFilled
        - id: NitrogenTankFilled
        - id: ClothingOuterHardsuitBlueshield
        - id: ClothingMaskBreath
        - id: ClothingShoesBootsMagBSO
  # FH Suit Storage Unit Resprite - START -
  - type: Sprite    
    sprite: _FarHorizons/Structures/Storage/suit_storage.rsi
    layers:
    - state: bso
      map: ["enum.StorageVisualLayers.Base"]
    - state: door
      map: ["enum.StorageVisualLayers.Door"]
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: screen-bso
      map: ["computerLayerScreen"]
  - type: EntityStorageVisuals
    stateDoorOpen: bso
  # FH Suit Storage Unit Resprite - END -
  - type: AccessReader
    access: [["BlueShield"]]
  
- type: entity
  id: SuitStorageBlueShieldBluespaced
  suffix: BlueShield, Bluespaced
  parent: SuitStorageBlueShield
  categories: [ Spawner ]
  components:
  - type: TriggerOnSpawn
  - type: SpawnOnTrigger
    proto: EffectFlashBluespace
