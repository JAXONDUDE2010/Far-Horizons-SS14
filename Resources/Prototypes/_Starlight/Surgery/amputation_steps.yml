- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepExposeSkull
  name: Expose Skull
  components:
  - type: SurgeryStep
    duration: 2
    tools:
    - type: BoneSaw
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/saw.rsi
    state: saw
  - type: SurgeryStepBleedEffect
    damage:
      types:
        Slash: 5
  - type: SurgeryStepEmoteEffect
  #FarHorizons Start
  - type: OnFailDamage
    damage: 
      types:
        Slash: 10
  #FarHorizons End

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepLigateVessels
  name: Ligate Vessels
  components:
    - type: SurgeryStep
      duration: 3
      tools:
        - type: Hemostat
    - type: Sprite
      sprite: _Starlight/Objects/Specific/Medical/scissors.rsi
      state: hemostat
    #FarHorizons Start
    - type: OnFailDamage
      damage: 
        types:
          Piercing: 10
    #FarHorizons End

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepInciseCartilage
  name: Incise Cartilage
  components:
  - type: SurgeryStep
    tools:
      - type: Scalpel
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scalpel.rsi
    state: scalpel
  #FarHorizons Start
  - type: OnFailDamage
    damage: 
      types:
        Slash: 10
  #FarHorizons End