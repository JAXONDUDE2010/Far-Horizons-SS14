- type: entity
  parent: [ ClothingHeadset, BaseLawContraband ]
  id: ClothingHeadsetIAA
  name: Affairs Official Headset # Far Horizons
  description: A headset for Affairs Official to hear the captain's last words. # Far Horizons
  components:
    - type: ContainerFill
      containers:
        key_slots:
        - EncryptionKeyLaw
        - EncryptionKeySecurity
        - EncryptionKeyCommon
    - type: Sprite
      sprite: _FarHorizons/Clothing/Ears/Headsets/law.rsi #Far Horizons

- type: entity
  parent: [ ClothingHeadset, BaseLawContraband ]
  id: ClothingHeadsetMagistrate
  name: Magistrate headset
  description: A headset for the magistrate to hear the far whispers of space law. #Far Horizons
  components:
    - type: ContainerFill
      containers:
        key_slots:
        - EncryptionKeyLaw
        - EncryptionKeySecurity
        - EncryptionKeyCommon
        - EncryptionKeyCommand
    - type: Sprite
      sprite: _FarHorizons/Clothing/Ears/Headsets/law.rsi #Far Horizons

- type: entity
  parent: [ ClothingHeadset, BaseMajorContraband ]
  id: ClothingHeadsetAssistantNinja
  name: stolen headset
  components:
  - type: Sprite
    sprite: Clothing/Ears/Headsets/service.rsi
  - type: RadioChime
    sound:
      path: /Audio/_Starlight/Effects/Radio/ninja.ogg

