- type: entity
  parent: [ClothingHeadBase, BaseSecurityContraband, BaseToggleClothing]
  id: ClothingHeadHelmetBulletProof
  name: Bulletproof Helmet #Far Horizons - The Great Capitalization Crusade
  description: Protects the face against bullets, can flip up and down.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Head/Helmets/bulletproof.rsi #Far Horizons
    layers:
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: _FarHorizons/Clothing/Head/Helmets/bulletproof.rsi #Far Horizons
  - type: Item
    storedRotation: 0  
  - type: ItemToggle # Welding mask starts in an activated state
    activated: true
  - type: Appearance
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.80
  - type: LimbArmor # Far Horizons
    limbs:
      Head:
        flatReductions:
          Piercing: 5
        coefficients:
          Blunt: 0.9
          Slash: 0.9
          Piercing: 0.4
          Heat: 0.9
  - type: ToggleClothing
    action: ActionToggleWeldingMask
  - type: WeldingMask  
  - type: HideLayerClothing
    slots:
    - Snout
    hideOnToggle: true
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon}
          False: {state: icon-up}
  - type: ComponentToggler
    components:
    - type: IngestionBlocker
    - type: FlashImmunity
    - type: IdentityBlocker
  - type: Tag #FH
    tags: #FH
    - BulletproofArmor #FH
  
