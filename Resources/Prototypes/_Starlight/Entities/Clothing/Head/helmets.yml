#Basic Helmet (Abductor Helmet)
- type: entity
  parent: [ ClothingHeadHelmetBase, BaseMajorContraband ]
  id: ClothingHeadHelmetAbductor
  name: Helmet #Far Horizons - The Great Capitalization Crusade
  components:
  - type: Pierceable
    level: Metal
  - type: FlashImmunity
  - type: EyeProtection
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.80
        Heat: 0.80
        Radiation: 0.80
        Caustic: 0.95
  - type: LimbArmor # Far Horizons
    limbs:
      Head:
        coefficients:
          Blunt: 0.85
          Slash: 0.85
          Heat: 0.85
          Piercing: 0.85
          Radiation: 0.85
          Caustic: 0.25
  - type: ExplosionResistance
    damageCoefficient: 0.75
  - type: Sprite
    sprite: _Starlight/Clothing/Head/Helmets/abductor.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/Head/Helmets/abductor.rsi
  - type: Tag
    tags:
    - WhitelistChameleon
    - SecurityHelmet
    
