# Fashion-O-Mat-Start
- type: entity
  parent: ClothingHeadBase # Hat, not an actual helmet
  id: ClothingHeadHelmetSilverMusician
  name: Legendary Silver Helm #Far Horizons - The Great Capitalization Crusade
  description: The old silver helm of the famous musician duo. One more time?
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Head/Hats/daft_punk_silver.rsi
  - type: Clothing
    quickEquip: false
    clothingVisuals:
      head:
      - state: equipped-head
      - state: equipped-head-unshaded
        shader: unshaded
  - type: Instrument
    program: 27
  - type: SwappableInstrument
    instrumentList:
      "Clean": {27: 0}
      "Jazz": {25: 0}
      "Muted": {28: 0}
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide
  - type: ActivatableUI
    inHandsOnly: false
    singleUser: true
    verbText: verb-instrument-openui
    key: enum.InstrumentUiKey.Key
  - type: UserInterface
    interfaces:
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface

