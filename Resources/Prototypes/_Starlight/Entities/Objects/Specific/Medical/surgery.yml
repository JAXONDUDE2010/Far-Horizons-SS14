# BoneGel

- type: entity
  id: BoneGelBase
  parent: BaseToolSurgery
  abstract: true
  components:
  #FarHorizons Start
  - type: BoneGel
    speed: 1.0 
    startSound:
      path: /Audio/Items/Medical/ointment_begin.ogg
    endSound:
      path: /Audio/Items/Medical/ointment_end.ogg
  - type: SurgeryTool
  #FarHorizons End
  - type: Tag
    tags:
    - BoneGel
  - type: SolutionContainerManager
    solutions:
      container:
        maxVol: 30
  - type: MixableSolution
    solution: container
  - type: SolutionTransfer
    canChangeTransferAmount: true
  - type: DrawableSolution
    solution: container
  - type: RefillableSolution
    solution: container
  - type: DrainableSolution
    solution: container
  - type: ExaminableSolution
    solution: container
  - type: UserInterface
    interfaces:
      enum.TransferAmountUiKey.Key:
        type: TransferAmountBoundUserInterface
  - type: DnaSubstanceTrace

- type: entity
  name: abductor's bottle of bone gel
  id: BoneGelAbductor
  parent: BoneGel
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/bone_gel.rsi
    state: abductor
  - type: SolutionRegeneration
    solution: container
    generated: 
      reagents:
      - ReagentId: BoneGel
        Quantity: 1

- type: entity
  name: bottle of bone gel
  id: BoneGelRipper
  parent: BoneGel
  description: A container for bone gel that often needs to be refilled from a specialized machine.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/bone_gel.rsi
    state: bone-gel
    #FarHorizons Start
  - type: SurgeryTool
  - type: BoneGel
    speed: 1
    startSound:
      path: /Audio/_Starlight/Medical/Surgery/bone_setter.ogg
    #FarHorizons End
  - type: HeldSpeedModifier
    walkModifier: 1
    sprintModifier: 0.9
  - type: Tag
    tags:
      - CyberHandItem

# Debug

- type: entity
  name: Super Amazing All In One Surgery Stick
  id: DebugStickSurgery
  parent: BoneGelBase
  description: A stick.
  suffix: DEBUG, DO NOT MAP
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scalpel.rsi
    state: laser
  - type: SurgeryTool
  - type: BoneGel
    speed: 0.1
  - type: Scalpel
    speed: 0.1
  - type: Cautery
    speed: 0.1
  - type: SurgicalDrill
    speed: 0.1
  - type: Hemostat
    speed: 0.1
  - type: Retractor
    speed: 0.1
  - type: BoneSaw
    speed: 0.1
  - type: BoneSetter
    speed: 0.1
  - type: SolutionRegeneration
    solution: container
    generated: 
      reagents:
      - ReagentId: BoneGel
        Quantity: 10
