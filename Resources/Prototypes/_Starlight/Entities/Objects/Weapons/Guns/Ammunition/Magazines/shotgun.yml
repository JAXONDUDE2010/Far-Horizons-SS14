# TOZ magazines are also garbage

- type: entity
  id: BaseMagazineShotgunToz
  name: Magazine (.42 Shells) #Far Horizons - The Great Capitalization Crusade
  parent: [ BaseItem, BaseSecurityContraband ]
  abstract: true
  components:
  - type: Tag
    tags:
    - MagazineShotgunToz
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - ShellShotgunToz
    capacity: 2
    soundRack:
      path: /Audio/Weapons/Guns/Cock/smg_cock.ogg
  - type: Item
    size: Small
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Ammunition/Magazine/Shotgun/toz.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  id: MagazineShotgunTozEmpty
  name: Magazine (.42 Shells) #Far Horizons - The Great Capitalization Crusade
  suffix: Empty #Far Horizons - The Great Capitalization Crusade
  parent: BaseMagazineShotgunToz
  components:
  - type: BallisticAmmoProvider
    proto: null

- type: entity
  id: MagazineShotgunToz
  name: Magazine (.42 Pellet) #Far Horizons - The Great Capitalization Crusade
  parent: BaseMagazineShotgunToz
  components:
  - type: BallisticAmmoProvider
    proto: ShellShotgunToz
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  id: MagazineShotgunTozExtendedEmpty
  name: Magazine (.42 Shells) #Far Horizons - The Great Capitalization Crusade
  suffix: Extended, Empty #Far Horizons - The Great Capitalization Crusade
  parent: BaseMagazineShotgunToz
  components:
  - type: BallisticAmmoProvider
    proto: null
    capacity: 5
  - type: Sprite
    layers:
    - state: extended
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  id: MagazineShotgunTozExtended
  name: Magazine (.42 Pellet) #Far Horizons - The Great Capitalization Crusade
  suffix: Extended #Far Horizons
  parent: BaseMagazineShotgunToz
  components:
  - type: BallisticAmmoProvider
    proto: ShellShotgunToz
    capacity: 5
  - type: Sprite
    layers:
    - state: extended
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
