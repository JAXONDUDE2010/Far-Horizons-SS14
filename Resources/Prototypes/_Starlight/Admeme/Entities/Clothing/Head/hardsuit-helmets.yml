- type: entity
  parent: [ BaseCentcommContraband, ClothingHeadHelmetHardsuitSyndie ]
  id: ClothingHeadHelmetHardsuitNTNCConsortium
  name: NanoTrasen marine hardsuit helmet #FH
  description: A protective hardsuit helmet worn by NanoTrasen marines. #FH
  components:
  - type: Sprite
    sprite: _Starlight/Admeme/Clothing/Head/Hardsuits/ntnc_hardsuit_helmet.rsi
  - type: Clothing
    sprite: _Starlight/Admeme/Clothing/Head/Hardsuits/ntnc_hardsuit_helmet.rsi
    clothingVisuals: # Far Horizons
      head:
        - state: off-equipped-HELMET
      head-vox:
        - state: off-equipped-HELMET-vox
      head-vulpkanin:
        - state: off-equipped-HELMET-vulpkanin
      head-cyclorite:
        - state: off-equipped-HELMET-cyclorite
      head-resomi:
        - state: off-equipped-HELMET-resomi
      # head-felionoid:
      #   - state: off-equipped-HELMET-felionoid
      head-avali:
        - state: off-equipped-HELMET-avali
  - type: ToggleableVisuals  # FH: hardsuit fixes
    clothingVisuals:  # TODO: Requires actual sprites
      head:
        - state: on-equipped-HELMET
      head-vox:
        - state: on-equipped-HELMET-vox
      head-vulpkanin:
        - state: on-equipped-HELMET-vulpkanin
      head-cyclorite:
        - state: on-equipped-HELMET-cyclorite
      head-resomi:
        - state: on-equipped-HELMET-resomi
      # head-felionoid:
      #   - state: on-equipped-HELMET-felionoid
      head-avali:
        - state: on-equipped-HELMET-avali
  - type: Item
    size: Small
  - type: PointLight
    color: "#addbff"
  - type: Pierceable
    level: HardenedMetal
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9
  - type: LimbArmor # Far Horizons
    limbs:
      Head:
        flatReductions:
          Piercing: 5
          Heat: 4
        coefficients:
          Blunt: 0.6
          Slash: 0.5
          Piercing: 0.5
          Heat: 0.7
          Radiation: 0.25
          Caustic: 0.6
  - type: Hailer # FH
    hailMessage: "Stop."
    hailSound:
      path: /Audio/_FarHorizons/Effects/stop.ogg
      params:
        variation: 0.125
    cooldownDuration: 5

