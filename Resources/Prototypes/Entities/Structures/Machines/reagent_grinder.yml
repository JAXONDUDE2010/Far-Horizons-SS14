- type: entity
  id: KitchenReagentGrinder
  parent: [ BaseMachinePowered, SmallConstructibleMachine ]
  name: Reagent Grinder #FH
  description: From BlenderTech. Will It Blend? Let's find out!
  suffix: grinder/juicer
  components:
  - type: ReagentGrinder
  - type: ActivatableUI
    key: enum.ReagentGrinderUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ReagentGrinderUiKey.Key:
        type: ReagentGrinderBoundUserInterface
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered: #FH
        enum.PowerDeviceVisualLayers.Powered: #FH
          True: { visible: true } #FH
          False: { visible: false } #FH
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.17,0,0.20,0.4"
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: Sprite
    sprite: _FarHorizons/Structures/Machines/grinder.rsi #FH
    drawdepth: LargeObjects
    snapCardinals: true
    offset: "0.0,0.4"
    layers:
      - state: grinder_offline #FH
      - state: grinder_online #FH
        visible: false
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: ApcPowerReceiver
    powerLoad: 25 #FH
#  - type: PowerState FH
#    idlePowerDraw: 0
#    workingPowerDraw: 750 # medium power blender
  - type: ItemSlots
    slots:
      beakerSlot:
        whitelist:
          components:
          - FitsInDispenser
  - type: ItemMapper #FH
    containerWhitelist: [beakerSlot]
    mapLayers:
      grinder_beaker_attached:
        whitelist:
          components:
          - FitsInDispenser
  - type: Machine
    board: ReagentGrinderMachineCircuitboard
  - type: ContainerContainer
    containers:
      beakerSlot: !type:ContainerSlot
      inputContainer: !type:Container
      machine_board: !type:Container
      machine_parts: !type:Container

- type: entity
  parent: Recycler #too different so different parent
  id: ReagentGrinderIndustrial
  name: Industrial Reagent Grinder #FH
  description: An industrial reagent grinder.
  components:
  - type: SolutionContainerManager
    solutions:
      output:
        maxVol: 400 #*slaps roof of machine* This baby can fit so much omnizine in it
  - type: MaterialReclaimer
    whitelist:
      components:
      - Extractable #same as reagent grinder
    blacklist:
      tags:
      - HighRiskItem #ian meat
    efficiency: 0.9
    reclaimMaterials: false # Materials have ExtractableComponent, which is whitelisted, so we have to avoid infinite recycling loops
    onlyReclaimDrainable: false
    solutionContainerId: output
  - type: Sprite
    sprite: Structures/Machines/recycling.rsi
    layers:
      - state: grinder-b0
  - type: Machine
    board: ReagentGrinderIndustrialMachineCircuitboard
  - type: GenericVisualizer
    visuals:
      enum.ConveyorVisuals.State:
        enum.ConveyorState.Off:
          Forward: { state: grinder-b1 }
          Reverse: { state: grinder-b1 }
          Off: { state: grinder-b0 }
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: Construction
    graph: Machine
    node: machine
    containers:
    - machine_parts
    - machine_board
  - type: DrainableSolution
    solution: output
  - type: ExaminableSolution
    solution: output
