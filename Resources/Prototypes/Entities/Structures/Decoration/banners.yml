- type: entity
  id: BannerNanotrasen
  parent: BannerBase
  name: Nanotrasen Banner #Far Horizons - The Great Capitalization Crusade
  description: A banner displaying the Nanotrasen logo. It looks rather cheap.
  components:
  - type: GenericVisualizer #FH
    visuals:
      enum.FoldedVisuals.State:
        foldedLayer:
          True: { state: banner_NT }
          False: { state: banner_NT_rolled }
  - type: Sprite
    sprite: _FarHorizons/Structures/Decoration/banner.rsi #FH
    noRot: true #FH
    layers: #FH
        - state: banner_NT
          map: [ "foldedLayer" ]

