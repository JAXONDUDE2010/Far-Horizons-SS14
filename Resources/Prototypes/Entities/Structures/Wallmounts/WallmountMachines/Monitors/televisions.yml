- type: entity
  parent: BaseWallmountMachine
  id: WallmountTelevision
  suffix: entertainment
  name: television
  description: Finally, some decent reception around here...
  abstract: true
  components:
  - type: Construction
    graph: WallmountTelevision
    node: Television
  - type: Sprite
    sprite: _FarHorizons/Structures/Wallmounts/flatscreentv.rsi #Far Horizons
    layers:
      - map: ["computerLayerBody"]
        state: television_wall
      - map: ["computerLayerScreen"]
        state: television_wallscreen
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: SurveillanceCamera
    transmitFrequencyId: SurveillanceCamera
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceNetworkRequiresPower
  - type: Speech
  - type: SurveillanceCameraSpeaker
  - type: SurveillanceCameraMonitor
  - type: ActivatableUI
    key: enum.SurveillanceCameraMonitorUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: ActivatableUIRequiresVision
  - type: UserInterface
    interfaces:
        enum.SurveillanceCameraMonitorUiKey.Key:
          type: SurveillanceCameraMonitorBoundUserInterface
  #Far Horizons-Start
  - type: ApcPowerReceiver
    powerLoad: 50
  - type: LitOnPowered
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        computerLayerScreen:
          True: { visible: true }
          False: { visible: false }
  - type: PointLight
    enabled: true
    energy: 2
    radius: 2.5
    offset: 0.0, -.75
    color: "#ffffff"
  #Far Horizons-End
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 200
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalGlassBreak
              params:
                volume: -4
  - type: StationAiWhitelist

- type: entity
  parent: BaseWallmountGlass
  id: WallmountTelevisionFrame
  name: television frame
  description: Finally, some decent reception around here...
  components:
  - type: Construction
    graph: WallmountTelevision
    node: TelevisionFrame
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: Structures/Wallmounts/flatscreentv.rsi
    layers:
      - map: ["computerLayerBody"]
        state: television_wall
      - map: ["computerLayerScreen"]
        state: television_wallscreen
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 20
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 15
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalGlassBreak
              params:
                volume: -4
