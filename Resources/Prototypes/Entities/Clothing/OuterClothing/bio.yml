- type: entity
  parent: [ClothingOuterBaseLarge, AllowSuitStorageClothingGasTanks]
  id: ClothingOuterBioGeneral
  name: Bio Suit #Far Horizons - The Great Capitalization Crusade
  suffix: Generic
  description: A suit that protects against biological contamination.
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Bio/general.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Bio/general.rsi
  - type: HideLayerClothing
    slots:
    - Tail
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      coefficients:
        Caustic: 0.75
  - type: LimbArmor # Far Horizons
    limbs:
      ArmRight: {}
      ArmLeft: {}
      HandRight: {}
      HandLeft: {}
      LegRight: {}
      LegLeft: {}
      FootRight: {}
      FootLeft: {}
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.1 # Starlight Edit, also removed the specific coefficients from the security and virology biosuits
  - type: GroupExamine
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95

