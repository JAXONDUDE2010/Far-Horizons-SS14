# Belts that need/have visualizers
- type: entity
  parent: ClothingBeltStorageBase
  id: ClothingBeltAssault
  name: Assault Belt #Far Horizons - The Great Capitalization Crusade
  description: A tactical assault belt.
  components:
  - type: Sprite
    sprite: Clothing/Belt/assault.rsi
  - type: Clothing
    sprite: Clothing/Belt/assault.rsi
  - type: Storage
    whitelist:
      tags:
        - CigPack
        - Taser
        - ShellShotgun
        - ShellShotgunImprovised
      components:
        - Stunbaton
        - FlashOnTrigger
        - SmokeOnTrigger
        - Flash
        - Handcuff
        - BallisticAmmoProvider
        - Ammo
  - type: ItemMapper
    mapLayers:
      flashbang:
        whitelist:
          components:
          - FlashOnTrigger
      stunbaton:
        whitelist:
          components:
          - Stunbaton
      tear_gas_grenade:
        whitelist:
          components:
          - SmokeOnTrigger
    sprite: Clothing/Belt/belt_overlay.rsi
  - type: Appearance

- type: entity
  parent: [ClothingBeltBase, ClothingSlotBase, BaseCommandContraband]
  id: ClothingBeltSheath
  name: Sabre Sheath #Far Horizons - The Great Capitalization Crusade
  description: An ornate sheath designed to hold an officer's blade.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Belt/sheath.rsi #Far Horizons
    state: sheath
  - type: Clothing
    sprite: _FarHorizons/Clothing/Belt/sheath.rsi #Far Horizons
  - type: Item
    size: Ginormous
  - type: ItemSlots
    slots:
      item:
        name: Sabre
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - CaptainSabre
  - type: ItemMapper
    mapLayers:
      sheath-sabre:
        whitelist:
          tags:
          - CaptainSabre
  - type: Appearance

- type: entity
  parent: ClothingBeltStorageBase
  id: ClothingBeltQuiver
  name: Quiver #Far Horizons - The Great Capitalization Crusade
  description: Can hold up to 15 arrows, and fits snug around your waist.
  components:
  - type: Sprite
    sprite: Clothing/Belt/quiver.rsi
    layers:
    - state: icon
    - map: [ "enum.StorageContainerVisualLayers.Fill" ]
      visible: false
  - type: Clothing
  - type: Storage
    grid:
    - 0,0,7,3
    maxItemSize: Small
    whitelist:
      tags:
      - Arrow
      - Plunger
  - type: Appearance
  - type: StorageContainerVisuals
    maxFillLevels: 3
    fillBaseName: fill-
  - type: Construction
    graph: Quiver
    node: Quiver

## Belts without visualizers

- type: entity
  parent: [ClothingBeltAmmoProviderBase, BaseSecurityBartenderContraband]
  id: ClothingBeltBandolier
  name: Bandolier #Far Horizons - The Great Capitalization Crusade
  description: A bandolier for holding shotgun ammunition.
  components:
  - type: Sprite
    sprite: Clothing/Belt/bandolier.rsi
  - type: Clothing
    sprite: Clothing/Belt/bandolier.rsi
  - type: Item
    size: Huge
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - ShellShotgun
    capacity: 14
  - type: Tag #FH
    tags: 
    - Webbing

- type: entity
  parent: [ ClothingBeltStorageBase, BaseMagicalContraband ]
  id: ClothingBeltWand
  name: Wand Belt #Far Horizons - The Great Capitalization Crusade
  description: A belt designed to hold various rods of power. A veritable fanny pack of exotic magic.
  components:
  - type: Sprite
    sprite: Clothing/Belt/wand.rsi
  - type: Clothing
    sprite: Clothing/Belt/wand.rsi
  - type: Storage
    grid:
    - 0,0,15,1
    whitelist:
      tags:
      - WizardWand
      - WhitelistChameleon

## Holsters

- type: entity
  parent: ClothingBeltStorageBase
  id: ClothingBeltHolster
  name: Shoulder Holster #Far Horizons - The Great Capitalization Crusade
  description: 'A holster to carry a handgun and ammo. WARNING: Badasses only.'
  components:
  - type: Sprite
    sprite: Clothing/Belt/holster.rsi
  - type: Clothing
    sprite: Clothing/Belt/holster.rsi
  - type: Storage
    grid:
    - 0,0,3,1
  - type: Tag #FH
    tags: 
    - Webbing

- type: entity
  parent: [ClothingBeltStorageBase, BaseSyndicateContraband]
  id: ClothingBeltSyndieHolster
  name: Syndicate Shoulder Holster #Far Horizons - The Great Capitalization Crusade
  description: A deep shoulder holster capable of holding many types of ballistics.
  components:
  - type: Sprite
    sprite: Clothing/Belt/syndieholster.rsi
  - type: Clothing
    sprite: Clothing/Belt/syndieholster.rsi
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,3,3
    whitelist:
      components:
      - Gun
      - BallisticAmmoProvider
      - CartridgeAmmo
  - type: StaticPrice
    price: 500
  - type: Tag #FH
    tags: 
    - Webbing

## Webbing

# Weirdly the only webbing with a storage whitelist and item mapper.
# Might be worth making less common (armory only?) and removing the whitelist to eliminate the inconsistency.
- type: entity
  parent: ClothingBeltWebbingBase #FarHorizons
  id: ClothingBeltSecurityWebbing
  name: Security Carrier #Far Horizons - The Great Capitalization Crusade
  description: Unique and versatile chest rig, can hold spare magazines. #FH
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Belt/securitywebbing.rsi #Far Horizons
  - type: Clothing
    sprite: _FarHorizons/Clothing/Belt/securitywebbing.rsi #Far Horizons

- type: entity
  parent: [ ClothingBeltWebbingBase, BaseSalvageContraband ] #FarHorizons
  id: ClothingBeltMercWebbing
  name: Mercenary Webbing #Far Horizons - The Great Capitalization Crusade
  description: Ideal for storing spare ammo, grenades and other bits and bobs. #FH - Edit
  components:
# FH - Removal
  - type: Sprite
    sprite: Clothing/Belt/mercwebbing.rsi
  - type: Clothing
    sprite: Clothing/Belt/mercwebbing.rsi

