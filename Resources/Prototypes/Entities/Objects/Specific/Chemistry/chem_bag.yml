- type: entity
  name: Chemistry Bag #FH
  id: ChemBag
  parent: [BaseStorageItem, ContentsExplosionResistanceBase] #FH
  description: A bag for storing chemistry products, such as jugs, beakers, pills, pill canisters, bottles, and syringes. #FH
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Chemistry/chem_bag.rsi
    state: icon
  - type: Clothing
    sprite: _Starlight/Objects/Specific/Chemistry/chem_bag.rsi
    quickEquip: false
    slots:
    - rig #FH
  - type: ExplosionResistance #FH
    damageCoefficient: 0
  - type: Item
    size: Ginormous
  - type: Storage
    maxItemSize: Normal # allow up to 5 large beakers / 10 beakers / 10 pill canisters
    grid:
    - 0,0,5,3 #FH
    quickInsert: true
    areaInsert: true
    whitelist:
      components:
        - FitsInDispenser
        - Pill
        - Patch
      tags:
        - Document
        - PillCanister
        - Bottle
        - Syringe
        - Dropper
        - ChemBag #FH
  - type: Dumpable
