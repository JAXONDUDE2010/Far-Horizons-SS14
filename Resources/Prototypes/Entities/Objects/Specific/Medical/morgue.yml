- type: entity
  id: BodyBag
  parent: [ BaseDeployFoldable, BasePaperLabelableVisualized ]
  name: Self-Sealing Body Bag #Far Horizons - The Great Capitalization Crusade
  description: A body bag that hermetically seals itself when closed by expelling air and any excess liquid through one-way ports underneath the bag, it does an excellent job of keeping cadavers from rotting. #FH
  components:
  - type: Item
    size: Small
    heldPrefix: bag
    storedOffset: -8, 0 #FH
  - type: Sprite
    drawdepth: BelowMobs # I guess body bags need appear above a coroner's table?
    offset: "0,0.23"
    sprite: _FarHorizons/Objects/Specific/Medical/Morgue/bodybags.rsi #FH
    layers:
    - state: bag
      map: ["unfoldedLayer", "enum.StorageVisualLayers.Base"]
    - state: bag_folded
      map: ["foldedLayer"]
      visible: false
    - state: open_overlay
      map: ["enum.StorageVisualLayers.Door"]
    - state: paper
      map: ["enum.PaperLabelVisuals.Layer"]
 #FH - Start
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
 #FH - End
  - type: Icon
    sprite: _FarHorizons/Objects/Specific/Medical/Morgue/bodybags.rsi #FH
    state: bag
  - type: Tag
    tags:
    - BodyBag
  - type: Clickable
  - type: InteractionOutline
  - type: MovedByPressure
  - type: Physics
    bodyType: Dynamic
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.4,0.25,0.1"
        density: 80
        mask:
        - ItemMask
  - type: EntityStorage
    capacity: 1
    isCollidableWhenOpen: true
    whitelist: # Use a tag whitelist rather than filtering for PerishableComponent to avoid chefs using body bags for food preservation
      tags:
        - VimPilot # Pets
        - CanPilot # People
    closeSound:
      path: /Audio/Machines/windoor_open.ogg #FH
    openSound:
      path: /Audio/Misc/zip.ogg
  - type: EntityStorageLayingDownOverride
  - type: Appearance
  - type: EntityStorageVisuals
    stateDoorOpen: open_overlay
  - type: GenericVisualizer
    visuals:
      enum.PaperLabelVisuals.HasLabel:
        enum.PaperLabelVisuals.Layer:
          True: {visible: true}
          False: {visible: false}
      enum.PaperLabelVisuals.LabelType:
        enum.PaperLabelVisuals.Layer:
          Paper: { state: paper }
          Bounty: { state: bounty }
          CaptainsPaper: { state: captains_paper }
          Invoice: { state: invoice }
      enum.FoldedVisuals.State:
        foldedLayer:
          True: {visible: true}
          False: {visible: false}
        unfoldedLayer:
          True: {visible: false}
          False: {visible: true}
  - type: Pullable
  - type: AntiRottingContainer
  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
      paper_label: !type:ContainerSlot
  - type: StaticPrice
    price: 50
  - type: Buckle
#FH - Start
  - type: Lock
    lockOnClick: false
    autoUnlock: false
    autoLock: false
    locked: false
  - type: LockVisuals
  - type: AccessReader
    access: [["Medical"]]
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Inflatable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 45
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:EmptyAllContainersBehaviour
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
#FH - End

- type: entity
  id: BodyBagFolded
  name: Body Bag #Far Horizons - The Great Capitalization Crusade
  description: A plastic bag designed for the storage and transportation of cadavers to stop body decomposition.
  parent: BodyBag
  suffix: folded
  components:
  - type: Foldable
    folded: true
#  - type: BodyBagItem #TODO: we need some kind of generic placable, like thus:
# - type: Placeable
#   prototype: someId
#   snap: Center

- type: entity
  parent: BaseItem
  id: Ash
  name: Ash #Far Horizons - The Great Capitalization Crusade
  description: This used to be something, but now it's not.
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: Objects/Materials/materials.rsi
    state: ash
  - type: Tag
    tags:
    - Burnt
    - Trash
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 50
        reagents:
        - ReagentId: Ash
          Quantity: 10
  - type: SolutionSpiker
    sourceSolution: food
    ignoreEmpty: true
  - type: ScoopableSolution
    solution: food
  - type: Extractable
    grindableSolutionName: food

- type: entity
  parent: Ash
  id: Ectoplasm
  name: Ectoplasm #Far Horizons - The Great Capitalization Crusade
  description: Much less deadly in this form.
  components:
    - type: Sprite
      sprite: Mobs/Ghosts/revenant.rsi
      state: ectoplasm
    - type: Tag
      tags:
        - Trash
        - Ectoplasm
    - type: SolutionContainerManager
      solutions:
        food:
          maxVol: 50
          reagents:
            - ReagentId: Ash
              Quantity: 25
            - ReagentId: Arcryox
              Quantity: 25
    - type: GuideHelp
      guides:
      - MinorAntagonists
