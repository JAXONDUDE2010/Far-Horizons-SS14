- type: entity
  name: first aid kit
  description: It's an emergency medical kit for those serious boo-boos.
  parent: BaseStorageItem
  id: Medkit
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/firstaidkits.rsi #FH
    state: firstaid
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,1
  - type: Item
    size: Large
    sprite: _Starlight/Objects/Specific/Medical/firstaidkits.rsi #FH
    heldPrefix: firstaid
  - type: PhysicalComposition
    materialComposition:
      Plastic: 150
  - type: Tag
    tags:
    - Medkit

- type: entity
