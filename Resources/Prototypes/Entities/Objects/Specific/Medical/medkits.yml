       tags:
        - GlassBeaker
        - Patch
        - Bottle
        - Spray
        - Brutepack
        - Bloodpack
        - Gauze
        - Ointment
        - CigPack
        - PillCanister
        - Radio
        - DiscreteHealthAnalyzer
        - SurgeryTool
        - Dropper
        - AmmoniaPack #  Far Horizons
        - BodyBag
        - Vial
        - AutoMender
        - Hypospray
        - ExternalContainerInjectorVial #FH
        - OilPack #FH
       components:
        - Injector
        - Pill
        - HandLabeler
    #Starlight end
