- type: entity
  name: advanced first aid kit
  description: "An advanced kit to help deal with advanced wounds."
  parent: Medkit
  id: MedkitAdvanced
  components:
  #FarHorizons start
  - type: Storage
    whitelist:
       tags:
        - GlassBeaker
        - Patch
        - Bottle
        - Spray
        - Brutepack
        - Bloodpack
        - Gauze
        - Ointment
        - CigPack
        - PillCanister
        - Radio
        - DiscreteHealthAnalyzer
        - SurgeryTool
        - Dropper
        - AmmoniaPack
        - AutoMender
        - Hypospray
       components:
        - Injector
        - Pill
        - HandLabeler
    #FarHorizons end
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/firstaidkits.rsi #FH
    state: advkit
  - type: Item
    size: Normal #FH
    sprite: _FarHorizons/Objects/Specific/Medical/firstaidkits.rsi #FH
    heldPrefix: advkit

