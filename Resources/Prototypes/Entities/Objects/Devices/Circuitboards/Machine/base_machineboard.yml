- type: entity
  id: BaseMachineCircuitboard
  parent: BaseItem
  name: machine board
  abstract: true
  suffix: Machine Board
  components:
    - type: MachineBoard
    - type: Sprite
      sprite: Objects/Misc/module.rsi
      state: generic
    - type: Item
      storedRotation: -90
    - type: StaticPrice
      price: 100
    - type: PhysicalComposition
      materialComposition:
        Glass: 230
      chemicalComposition:
        Silicon: 20
    - type: Circuitboard
    - type: Food #FH - Start
      requiresSpecialDigestion: true
      solution: food
      delay: 4
      forceFeedDelay: 10
    - type: SolutionContainerManager
      solutions:
        food:
          maxVol: 15
          reagents:
          - ReagentId: Tazinide
            Quantity: 5
          - ReagentId: Vitamin
            Quantity: 5
          - ReagentId: Nutriment
            Quantity: 5
    - type: Tag
      tags:
      - RamChip #Protogen joke, makes them able to eat them. - FH End
