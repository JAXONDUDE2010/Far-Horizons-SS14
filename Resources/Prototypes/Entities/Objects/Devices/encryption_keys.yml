- type: entity
  abstract: true
  parent: BaseItem
  id: EncryptionKey
  name: Encryption Key # Far Horizons Capitilization
  description: A small cypher chip for headsets.
  components:
  - type: EncryptionKey
  - type: Item
    sprite: /Textures/_FarHorizons/Objects/Devices/encryption_keys.rsi # Far Horizons
  - type: Sprite
    sprite: /Textures/_FarHorizons/Objects/Devices/encryption_keys.rsi # Far Horizons

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyCommon
  name: Common Encryption Key # Far Horizons Capitilization
  description: An encryption key used by anyone.
  components:
  - type: EncryptionKey
    channels:
    - Common
    defaultChannel: Common
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: common_label
  - type: Tag
    tags:
    - EncryptionCommon

