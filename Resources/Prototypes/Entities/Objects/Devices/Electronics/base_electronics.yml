- type: entity
  id: BaseElectronics
  parent: BaseItem
  name: base electronics
  abstract: true
  suffix: Electronics
  components:
  - type: Item
    storedRotation: -90
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    state: generic
  - type: PhysicalComposition
    materialComposition:
      Glass: 150 # FH reduced so price isn't too high with added solutionss
    chemicalComposition:
      Silicon: 20
  - type: Circuitboard
#FH - Start
  - type: Edible
    requiresSpecialDigestion: true
    delay: 3
    forceFeedDelay: 10
  - type: FlavorProfile
    flavors:
    - shocking
  - type: Extractable
    grindableSolutionName: ramchip
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: BatteryAcid
          Quantity: 15
      ramchip:
        reagents:
        - ReagentId: BatteryAcid
          Quantity: 15
        - ReagentId: Gold
          Quantity: 10
        - ReagentId: Iron
          Quantity: 10
        - ReagentId: Silicon
          Quantity: 50
  - type: Tag
    tags:
    - RamChip #Protogen joke, makes them able to eat them.
#FH - End