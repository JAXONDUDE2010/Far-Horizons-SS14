- type: entity
  id: BaseElectronics
  parent: BaseItem
  name: base electronics
  abstract: true
  suffix: Electronics
  components:
  - type: Item
    storedRotation: -90
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    state: generic
  - type: PhysicalComposition
    materialComposition:
      Glass: 150 # FH reduced so price isn't too high with added solutionss
    chemicalComposition:
      Silicon: 20
  - type: Circuitboard
  - type: Edible
    requiresSpecialDigestion: true
    delay: 4
    forceFeedDelay: 10
  - type: FlavorProfile
    flavors:
      - shocking
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Tazinide
          Quantity: 5
        - ReagentId: Vitamin
          Quantity: 5
        - ReagentId: Nutriment
          Quantity: 5
  - type: Tag
    tags:
    - RamChip #Protogen joke, makes them able to eat them. - FH End