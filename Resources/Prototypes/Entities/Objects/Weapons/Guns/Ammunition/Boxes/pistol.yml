- type: entity
  abstract: true
  parent: BaseItem
  id: BaseMagazineBoxPistol
  name: 9mm Ammunition Box #FH
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgePistol
    proto: CartridgePistolSP
    capacity: 120 #FH - 4x mag size.
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Boxes/Pistol/9mm.rsi # FH - Holy fuck this shit has been annoying me forever you have NO IDEA
  - type: MagazineVisuals
    magState: mag
    steps: 5 #FH
    zeroVisible: false
  - type: Appearance
#FH - Start
  - type: Tag
    tags:
      - AmmoBoxPistol9mm
#FH - End

# Boxes
- type: entity
  parent: BaseMagazineBoxPistol
  id: MagazineBoxPistolPractice
  name: 9mm Ammunition Box (Practice) #FH
  description: A cardboard box of Chalk-Loaded 9mm rounds. Used for target practice. #FH
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistolPractice
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: practice

- type: entity
  parent: BaseMagazineBoxPistol
  id: MagazineBoxPistolIncendiary
  name: 9mm Ammunition Box (Incendiary) #FH
  description: A cardboard box of Self-Igniting 9mm rounds. Burns people alive. #FH
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistolIncendiary
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: incendiary

- type: entity
  parent: BaseMagazineBoxPistol
  id: MagazineBoxPistolUranium
  name: 9mm Ammunition Box (Uranium) #FH
  description: A cardboard box of Uranium-Core 9mm rounds. Delivers radiation poisoning on contact. #FH
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistolUranium
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: uranium
