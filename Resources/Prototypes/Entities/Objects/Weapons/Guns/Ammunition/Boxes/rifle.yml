- type: entity
  abstract: true
  parent: BaseItem
  id: BaseMagazineBoxRifle556 #FH
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeRifle556 #FH
    proto: CartridgeRifle556SP #FH
    capacity: 100 #FH - 4x mag size
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _FarHorizons/Objects/Weapons/Guns/Ammunition/Boxes/Rifle/5.56.rsi #FH
  - type: MagazineVisuals
    magState: mag
    steps: 7 #FH
    zeroVisible: false
  - type: Appearance
#FH - Start
  - type: Tag
    tags:
      - AmmoBoxRifle556
#FH - End

