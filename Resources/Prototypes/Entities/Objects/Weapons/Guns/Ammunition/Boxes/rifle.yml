- type: entity
  parent: BaseMagazineBoxRifle556 #FH
  id: MagazineBoxRifle556AP #FH
  name: 5.56 Ammunition Box (Rifle AP) #FH
  description: A cardboard box of Armor-Piercing 5.56 rounds. Effective against heavily armored targets. #FH
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeRifle556AP #FH
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: ap

- type: entity
  parent: BaseMagazineBoxRifle556 #FH
  id: MagazineBoxRifle556Practice #FH
  name: 5.56 Ammunition Box (Rifle Practice) #FH
