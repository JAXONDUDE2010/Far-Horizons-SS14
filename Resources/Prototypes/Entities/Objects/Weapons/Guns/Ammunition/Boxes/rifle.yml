  components:
  - type: BallisticAmmoProvider
    proto: CartridgeRifle556Practice #FH
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: practice

