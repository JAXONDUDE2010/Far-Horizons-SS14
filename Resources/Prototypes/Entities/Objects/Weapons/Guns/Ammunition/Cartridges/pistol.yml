- type: entity
  abstract: true
  parent: [ BaseCartridge, BaseSecurityContraband ]
  id: BaseCartridgePistol
  name: 9mm Cartridge #FH
  components:
  - type: Tag
    tags:
      - CartridgePistol
  - type: CartridgeAmmo
    proto: BulletPistolTraceSP
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
        
- type: entity
  id: CartridgePistolAP
  name: 9mm Cartridge (AP) #FH
  parent: BaseCartridgePistol
  components:
  - type: CartridgeAmmo
    proto: BulletPistolTraceAP
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#1A8C1A"

- type: entity
  parent: BaseCartridgePistol
  id: CartridgePistolPractice
  name: 9mm Cartridge (Practice) #FH
  description: Arguably the most popular caliber on the market, used by all manner of pistols and submachine guns. Practice ammunition fires a chalk projectile that stings a little, but otherwise causes no lasting damage.
  components:
  - type: CartridgeAmmo
    proto: BulletPistolTracePractice
  -  type: Sprite
     layers:
       - state: base
         map: [ "enum.AmmoVisualLayers.Base" ]
       - state: tip
         map: [ "enum.AmmoVisualLayers.Tip" ]
         color: "#D86E2C"

- type: entity
  parent: BaseCartridgePistol
  id: CartridgePistolIncendiary
  name: 9mm Cartridge (Incendiary) #FH
  description: Arguably the most popular caliber on the market, used by all manner of pistols and submachine guns. Incendiary ammunition contains a self-igniting compound that sets targets ablaze.
  components:
  - type: CartridgeAmmo
    proto: BulletPistolTraceIncendiary
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#BFC8CA"

- type: entity
  id: CartridgePistolUranium
  name: 9mm Cartridge (Uranium) #FH
  description: Arguably the most popular caliber on the market, used by all manner of pistols and submachine guns. Uranium ammunition replaces the lead core of the bullet with fissile material, irradiating targets from the inside.
  parent: BaseCartridgePistol
  components:
  - type: CartridgeAmmo
    proto: BulletPistolTraceUranium
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#65fe08"

- type: entity
  parent: BaseCartridgePistol
  id: CartridgePistolSpent
  name: 9mm Cartridge (Spent) #FH
  suffix: spent
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base-spent
      map: [ "enum.AmmoVisualLayers.Base" ]
  - type: SpentAmmoVisuals
  - type: CartridgeAmmo
    proto: BulletPistol
    spent: true
  - type: Tag
    tags:
    - CartridgePistol
    - Trash # surely theres a way to automatically add this...
