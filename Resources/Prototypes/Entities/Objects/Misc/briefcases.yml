- type: entity
  parent: BaseStorageItem
  id: BriefcaseBase
  description: Useful for carrying items in your hands.
  abstract: true
  components:
  - type: Item
    size: Ginormous
  - type: Storage
    grid:
    - 0,0,5,3
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
  # Starlight-start: Vending Machines Prices
  - type: ItemPrice
    priceCategory: clothing
  # Starlight-end

- type: entity
  parent: BriefcaseBase
  id: BriefcaseBrown
  name: brown briefcase
  components:
  - type: Sprite
    sprite: Objects/Storage/Briefcases/briefcase_brown.rsi
    state: icon
  - type: Item
    sprite: Objects/Storage/Briefcases/briefcase_brown.rsi

- type: entity
  parent: BriefcaseBrown
  id: BriefcaseSyndie
  suffix: Syndicate, Empty
  components:
  - type: Item
    size: Huge

- type: entity
  parent: [BaseStorageItem, BaseSyndicateContraband] #FH
  id: BriefcaseWeapon
  name: Secure Weapon Case #FH
  suffix: Gun, Empty
  description: Useful for aspiring mercenaries, whether you're fighting for a company, a nation or anyone else. Or just making a really big omelette.
  components:
  - type: Appearance
  - type: Sprite
    sprite: _FarHorizons/Objects/Storage/Briefcases/weapon_case_large.rsi #FH
    layers:
    - state: icon
      map: [ base ]
    - state: locked
      map: [ "enum.LockVisualLayers.Lock" ]
      shader: unshaded
    - state: unlocked
      map: [ light ]
      shader: unshaded
  - type: Lock
  - type: LockVisuals
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: icon-open }
          False: { state: icon }
        light:
          True: { visible: true }
          False: { visible: false }
#FH - Start
  - type: Item
    size: Huge
    shape:
    - 0,0,3,1
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,3,1
    - 0,3,3,5
#FH - End

- type: entity
  parent: BriefcaseWeapon
  id: BriefcaseWeaponSmall
  suffix: Gun, Small, Empty
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Storage/Briefcases/weapon_case_small.rsi #FH
  - type: Item
#FH - Start
    size: Large
    shape:
    - 0,0,1,1
#FH - End
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,5,1 #FH
