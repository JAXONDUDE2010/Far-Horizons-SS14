# Accessory Time
- type: loadoutEffectGroup
  id: NoviceOfficer
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobSecurityOfficer
      time: 18000 # 5 hrs

# Non-Lethal Weapons
- type: loadout
  id: SecurityDominator
  equipment:
    pocket2: WeaponDominator

- type: loadout
  id: SecurityTaser
  equipment:
    pocket2: WeaponDisabler # FH

# Sidearm Options
- type: loadout
  id: SecurityMk78 #FH
  dummyEntity: WeaponPistolMk78
  storage:
    back:
      - WeaponPistolMk78 #Far Horizons
      - MagazinePistolSP #Far Horizons
      - MagazinePistolRubber #Far Horizons
      - MagazinePistolRubber #Far Horizons

- type: loadout
  id: SecurityPistolDP
  effects:
    - !type:GroupLoadoutEffect
      proto: SeniorOfficer
  dummyEntity: WeaponPistolDP
  storage:
    back:
      - WeaponPistolDP
      - MagazinePistol38SP #Far Horizons

- type: loadout
  id: SecurityPistolEnforcer
  dummyEntity: WeaponPistolEnforcerTypeT
  storage:
    back:
    - WeaponPistolEnforcerTypeT
    - MagazinePistolSP

# Jumpsuit
