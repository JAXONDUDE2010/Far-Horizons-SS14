- type: entity
  id: BaseEntityHandImplant
  abstract: true
  parent: [ BaseItem, BaseImplant ]
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/implants.rsi
  - type: HandImplant
  - type: FlavorProfile
    flavors:
      - people

- type: entity
  id: LeftHandImplantInsulated
  name: Left Hand Insulation Implant
  description: Protects your hands from electric currents!
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: l_hand_implant_insulated
  - type: Organ
    category: HandLeftImplant
  - type: FunctionalOrgan
    comps:
    - type: Insulated

- type: entity
  id: RightHandImplantInsulated
  name: Right Hand Insulation Implant
  description: Protects your hands from electric currents!
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: r_hand_implant_insulated
  - type: Organ
    category: HandRightImplant
  - type: FunctionalOrgan
    comps:
    - type: Insulated

- type: entity
  id: LeftHandImplantForensics
  name: Left Hand Forensics Implant
  description: Removes your fingerprints! Great for forensics, at the cost of your mail.
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: l_hand_implant_forensics
  - type: Organ
    category: HandLeftImplant
  - type: FunctionalOrgan
    comps:
    - type: FingerprintMask

- type: entity
  id: RightHandImplantForensics
  name: Right Hand Forensics Implant
  description: Removes your fingerprints! Great for forensics, at the cost of your mail.
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: r_hand_implant_forensics
  - type: Organ
    category: HandRightImplant
  - type: FunctionalOrgan
    comps:
    - type: FingerprintMask

- type: entity
  id: LeftHandImplantClaws
  name: Left Hand Claws Implant
  description: Gives you retractable claws!
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: l_hand_implant_claws
  - type: Organ
    category: HandLeftImplant
  - type: FunctionalOrgan
    comps:
    - type: InherentAction
      action: ActionRetractableItemAdvancedClaws

- type: entity
  id: RightHandImplantClaws
  name: Right Hand Claws Implant
  description: Gives you retractable claws!
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: r_hand_implant_claws
  - type: Organ
    category: HandRightImplant
  - type: FunctionalOrgan
    comps:
    - type: InherentAction
      action: ActionRetractableItemAdvancedClaws

- type: entity
  id: LeftHandImplantThrusters
  name: Left Hand Thruster Implant
  description: Wrist-mounted micro-thrusters to help you maneuver in space.
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: l_hand_implant_thrusters
  - type: Organ
    category: HandLeftImplant
  - type: FunctionalOrgan
    comps:
    - type: MovementAlwaysTouching

- type: entity
  id: RightHandImplantThrusters
  name: Right Hand Thruster Implant
  description: Wrist-mounted micro-thrusters to help you maneuver in space.
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: r_hand_implant_thrusters
  - type: Organ
    category: HandRightImplant
  - type: FunctionalOrgan
    comps:
    - type: MovementAlwaysTouching