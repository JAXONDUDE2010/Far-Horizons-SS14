- type: entity
  id: BaseEntityHandImplant
  abstract: true
  parent: [ BaseItem, BaseImplant ]
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/implants.rsi
  - type: HandImplant
  - type: FlavorProfile
    flavors:
      - people

- type: entity
  id: LeftHandImplantInsulated #FH
  name: Left Hand Insulation Implant #FH
  description: Protects your hands from electric currents!
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: l_hand_implant_insulated #FH
  - type: Organ #FH
    category: HandLeftImplant #FH
  - type: FunctionalOrgan
    comps:
    - type: Insulated

- type: entity
  id: RightHandImplantInsulated #FH
  name: Right Hand Insulation Implant
  description: Protects your hands from electric currents!
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: r_hand_implant_insulated #FH
  - type: Organ #FH
    category: HandRightImplant #FH
  - type: FunctionalOrgan
    comps:
    - type: Insulated

- type: entity
  id: LeftHandImplantForensics #FH
  name: Left Hand Forensics Implant #FH
  description: Removes your fingerprints! Great for forensics, at the cost of your mail.
  parent: BaseEntityHandImplant
  components:
  - type: Sprite
    state: l_hand_implant_forensics #FH
  - type: Organ #FH
    category: HandLeftImplant #FH
  - type: FunctionalOrgan
    comps:
    - type: FingerprintMask

