- type: reagent
  id: Vodkizine
  name: reagent-name-vodkizine
  parent: BaseAlcohol
  desc: reagent-desc-vodkizine
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: vodka
  color: "#fcf7f955"
  recognizable: true
  metamorphicSprite:
    sprite: Objects/Consumable/Drinks/ginvodkaglass.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 4
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Digestion:
      effects:
      - !type:SatiateThirst
        factor: 2
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.2
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types: # Far Horizons changed to types
            Blunt: -1.3
            Slash: -1.3
            Piercing: -1.3
            Heat: -1.3
            Shock: -1.3
            Cold: -1.3
        affectAllLimbs: true # Far Horizons

- type: reagent
  id: Amoxla
  name: reagent-name-amoxla
  group: Medicine
  desc: reagent-desc-amoxla
  physicalDesc: reagent-physical-desc-opaque
  flavor: medicine
  color: "#51c38c"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Avali, Resomi, ProtoBird ] #FH
        damage:
          types:
            Asphyxiation: -3.5
            Bloodloss: -3
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: HeartbreakerToxin
          min: 1
        reagent: HeartbreakerToxin
        amount: -3
      - !type:HealthChange
        conditions:
          - !type:ReagentCondition
            reagent: HeartbreakerToxin
            min: 25
        damage:
          types:
            Asphyxiation: 5
            Cold: 3
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Avali, Resomi, ProtoBird ] #FH
          inverted: true
        damage:
          types:
            Poison: 1.5 #Ammonia is toxic injected directly into bloodstream
            Asphyxiation: 1 
            Bloodloss: 0.5
      - !type:ModifyBloodLevel
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Avali, Resomi, ProtoBird ] #FH
        amount: 3

- type: reagent
  id: BoneGel
  group: Medicine
  name: reagent-name-bonegel
  desc: reagent-desc-bonegel
  physicalDesc: reagent-physical-desc-opaque
  flavor: medicine
  color: "#dadada"
  metabolisms:
    Bloodstream:
      effects:
      - !type:GenericStatusEffect
        key: Drunk
        time: 1.0
        type: Remove
      - !type:HealthChange
        damage:
          types:
            Poison: 1.5 # You don't want to drink bonegel, because it's for bones and joints

- type: reagent
  id: Chronexaline
  name: reagent-name-chronexaline
  group: Medicine
  desc: reagent-desc-chronexaline
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: medicine
  color: "#850063"
  worksOnTheDead: true
  metabolisms:
    Bloodstream:
      effects:
        - !type:HealthChange
          conditions:
          - !type:TemperatureCondition
            max: 213.0
          - !type:MobStateCondition
            mobstate: Dead
          damage:
            types:
              Radiation: -5

- type: reagent
  id: BarozinePlus
  name: reagent-name-barozine-plus
  group: Medicine
  desc: reagent-desc-barozine-plus
  physicalDesc: reagent-physical-desc-viscous
  flavor: medicine
  color: "#ff867d"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        probability: 0.3
        damage:
          types:
            Heat: 0.4
      - !type:HealthChange
        conditions:
          - !type:ReagentCondition
            reagent: BarozinePlus
            min: 50
        damage:
          types:
            Poison: 1
      - !type:Vomit
        probability: 0.1
        conditions:
          - !type:ReagentCondition
            reagent: BarozinePlus
            min: 30
      - !type:GenericStatusEffect
        key: PressureImmunity
        component: PressureImmunity
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
      - !type:Jitter
      - !type:Emote
        emote: Scream
        probability: 0.1
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "barozine-effect-skin-burning", "barozine-effect-muscle-contract" ]
        probability: 0.1
