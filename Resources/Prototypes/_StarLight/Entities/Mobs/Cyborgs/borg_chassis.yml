# region Far Horizons: Implementing the syndicate stealth chassis as bespoke borg.
- type: entity
  id: BorgChassisSyndicateStealth
  parent: BaseBorgChassisSyndicate
  name: syndicate stealth cyborg
  components:
  - type: TextToSpeech
  - type: Sprite
    sprite: _Starlight/Mobs/Silicon/Chassis/synd_stealth.rsi
    layers:
    - state: borg
    - state: borg_e
      map: [ "enum.BorgVisualLayers.Light" ]
      shader: unshaded
      visible: false
    - state: borg_l
      shader: unshaded
      map: [ "light" ]
      visible: false
  - type: BorgChassis
    maxModules: 2
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - BorgModuleSyndicate
    hasMindState: borg_e
    noMindState: borg_e_r
  - type: InteractionPopup
    interactSuccessString: petting-success-generic-cyborg
    interactFailureString: petting-failure-generic-cyborg
# end region

- type: entity
  id: BorgChassisPurrfus
  parent: BorgChassisSelectable
  name: purrfus cyborg
  components:
  - type: TextToSpeech
  - type: BorgSwitchableType
    selectedBorgType: purrfus
