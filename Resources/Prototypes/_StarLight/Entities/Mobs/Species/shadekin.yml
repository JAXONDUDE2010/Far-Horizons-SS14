- type: entity
  save: false
  name: Urist McShadow
  parent: [MobBloodstream, MobAtmosStandard, MobFlammable, BaseSpeciesMob, BaseSpeciesPickupableLarge] #FH
  id: BaseMobShadekin
  abstract: true
  components:
    - type: LanguageKnowledge
      speaks:
      - GalacticCommon
      - Marish
      understands:
      - GalacticCommon
      - Marish
    - type: CollectiveMind
      blockWhenUnconscious: true
    - type: Shadekin
      thresholds:
        0.8: Low
        5: Annoying
        10: High
        15: Extreme
    - type: Absorbable
    - type: Hunger
    - type: Thirst
    - type: Icon
      sprite: _Starlight/Mobs/Species/Shadekin/parts.rsi
      state: full
    - type: Body
      prototype: Shadekin
      requiredLegs: 2
    - type: Speech
      allowedEmotes: ["Marr", "Wurble", "Hisses", "Growl", "Purr"]
    - type: Vocal
      sounds:
        Male: MaleShadekin
        Female: FemaleShadekin
        Unsexed: MaleShadekin
    - type: MeleeWeapon
      soundHit:
        collection: AlienClaw
      angle: 30
      animation: WeaponArcClaw
      damage:
        types:
          Slash: 5
    - type: FlashModifier
      modifier: 2
    - type: Damageable
      damageContainer: Biological
      damageModifierSet: Shadekin
    - type: Reactive
      groups:
        Flammable: [Touch]
        Extinguish: [Touch]
      reactions:
        - reagents: [Water, SpaceCleaner]
          methods: [Touch]
          effects:
            - !type:WashCreamPie
            - !type:Emote
              emote: Hisses
              showInChat: false
    - type: Bloodstream
      bloodlossDamage:
        types:
          Bloodloss: 1
      bloodlossHealDamage:
        types:
          Bloodloss: -0.25
    - type: Flammable
      damage:
        types:
          Heat: 1.5
    - type: TypingIndicator
      proto: alien
    - type: PassiveDamage
      allowedStates:
        - Alive
      damageCap: 20
      damage:
        groups:
          Brute: -0.07
          Burn: -0.07
    - type: Destructible
      thresholds:
        - trigger: !type:DamageTypeTrigger
            damageType: Blunt
            damage: 400
          behaviors:
            - !type:GibBehavior {}
            - !type:SpawnEntitiesBehavior
              spawn:
                ShadekinShadow:
                  min: 1
                  max: 1
        - trigger: !type:DamageTypeTrigger
            damageType: Heat
            damage: 1500
          behaviors:
            - !type:SpawnEntitiesBehavior
              spawnInContainer: true
              spawn:
                Ash:
                  min: 1
                  max: 1
                ShadekinShadow:
                  min: 1
                  max: 1
            - !type:BurnBodyBehavior {}
    - type: Barotrauma
      damage:
        types:
          Blunt: 0.9 #per second, scales with pressure and other constants. #FH
#FH - Removal
    - type: Fingerprint
    - type: Blindable
    - type: DarkenedVision
    # Other
    - type: TemperatureDamage
      heatDamageThreshold: 325
      coldDamageThreshold: 260
      coldDamage:
        types:
          Cold: 0.1 #per second, scales with temperature & other constants
      heatDamage:
        types:
          Heat: 1.5 #per second, scales with temperature & other constants
    - type: Temperature
      currentTemperature: 310.15
      specificHeat: 42
    - type: TemperatureSpeed
      thresholds:
        293: 0.8
        280: 0.6
        260: 0.4
    - type: ThermalRegulator
      metabolismHeat: 800
      radiatedHeat: 100
      implicitHeatRegulation: 500
      sweatHeatRegulation: 2000
      shiveringHeatRegulation: 2000
      normalBodyTemperature: 310.15
      thermalRegulationTemperatureThreshold: 2
    - type: Perishable
    - type: Butcherable
      butcheringType: Spike # TODO human.
      spawned:
        - id: FoodMeat
          amount: 5
    - type: FireVisuals
      alternateState: Standing
    - type: StunVisuals
    - type: HumanoidEMP # Far Horizons - HumanoidEMP is needed to receive EMP effects, it may carry its own innate effects, but doesn't have to
      effectCooldown: 2
    - type: HumanoidEMPComposite # Far Horizons - HumanoidEMPComposite is used to gather EMP effects from HumanoidEMPCompositeElement components on all limbs and organs. These effects added in addition to effects in HumanoidEMP and won't work without it
    - type: Tag  # Far Horizons
      tags:
        - CanPilot
        - FootstepSound
        - DoorBumpOpener
        - AnomalyHost
        - Shadekin
    - type: VisionOrganRequiredForVision # Far Horizons
