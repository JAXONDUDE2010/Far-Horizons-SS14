# Basic
- type: entity
  id: LockerSteelLarge
  parent: LockerLargeBaseSecure
  name: Large Secure Closet #Far Horizons - The Great Capitalization Crusade
  components:
  - type: Appearance
  - type: EntityStorageVisuals
    stateBaseClosed: secure
    stateDoorOpen: secure_open
    stateDoorClosed: secure_door

# Security Officer
- type: entity
  id: LockerSecurityLarge
  parent: LockerLargeBaseSecure
  name: Large Security Officer's Locker #Far Horizons - The Great Capitalization Crusade
  components:
  - type: Appearance
  - type: EntityStorageVisuals
    stateBaseClosed: sec
    stateDoorOpen: sec_open
    stateDoorClosed: sec_door
  - type: AccessReader
    access: [["Security"]]

# Warden
- type: entity
  id: LockerWardenLarge
  parent: LockerLargeBaseSecure
  name: Large Warden's Locker #Far Horizons - The Great Capitalization Crusade
