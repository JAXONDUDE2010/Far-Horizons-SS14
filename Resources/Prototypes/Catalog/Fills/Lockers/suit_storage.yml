#SOFTSUITS
#Basic EVA
- type: entity
  id: SuitStorageEVA
  parent: SuitStorageBaseFH # FH 
  suffix: EVA
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillSuitStorageEVA
  # FH Suit Storage Unit Resprite - START - 
  - type: Sprite 
    sprite: _FarHorizons/Structures/Storage/suit_storage.rsi
    layers:
    - state: eva
      map: ["enum.StorageVisualLayers.Base"]
    - state: door
      map: ["enum.StorageVisualLayers.Door"]
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: screen-eva
      map: ["computerLayerScreen"]
  - type: EntityStorageVisuals
    stateDoorOpen: eva 
  # FH Suit Storage Unit Resprite - END - 

- type: entityTable
  id: FillSuitStorageEVA
  table: !type:AllSelector
    children:
    - id: OxygenTankFilled
    - id: NitrogenTankFilled # Starlight - vox gang
    - id: ClothingOuterHardsuitEVA
    - id: ClothingHeadHelmetEVA
    - id: ClothingMaskBreath

