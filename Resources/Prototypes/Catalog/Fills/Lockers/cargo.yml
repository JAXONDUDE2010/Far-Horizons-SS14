- type: entityTable
  id: FillSalvageSpecialistHardsuitSpatio
  table: !type:AllSelector
    children:
    - id: OxygenTankFilled
    - id: NitrogenTankFilled # Starlight - vox gang
    - id: ClothingShoesBootsMag
    - id: ClothingOuterHardsuitSalvage #Far Horizons - Fixing this
    - id: ClothingMaskGasExplorer

- type: entityTable
  id: LockerFillSalvageSpecialist
  table: !type:AllSelector
    children:
    - id: ClothingBeltSalvage #Far Horizons
    - id: ClothingBeltSalvageWebbing #Far Horizons
    - id: SurvivalKnife
    - id: HandheldGPSBasic
#    - id: RadioHandheld # Starlight - radio replaced with expedition radio
    - id: RadioHandheldExpedition # Starlight
    - id: AppraisalTool
    - id: FireExtinguisherMini #Far Horizons - They can throw this in their rig.
    - id: FireExtinguisher #Far Horizons - Just in case they want the larger one instead.
    - id: Flare
      prob: 0.3
      rolls: !type:ConstantNumberSelector
        value: 3

- type: entity
  id: LockerSalvageSpecialistFilledHardsuit
  suffix: Filled, Hardsuit
  parent: LockerSalvageSpecialist
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
          - !type:NestedSelector
            tableId: FillSalvageSpecialistHardsuitSpatio
          - !type:NestedSelector
            tableId: LockerFillSalvageSpecialist

- type: entity
  id: LockerSalvageSpecialistFilled
  suffix: Filled
  parent: LockerSalvageSpecialist
  components:
    - type: EntityTableContainerFill
      containers:
        entity_storage: !type:NestedSelector
          tableId: LockerFillSalvageSpecialist
