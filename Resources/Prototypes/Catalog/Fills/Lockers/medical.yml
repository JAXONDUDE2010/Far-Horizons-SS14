- type: entityTable
  id: LockerFillChemistry
  table: !type:AllSelector
    children:
    - id: BoxSyringe
    - id: BoxBeaker
    - id: BoxBeaker
      prob: 0.3
    - id: BoxPillCanister
    - id: PatchPack # Starlight
    - id: PatchPack # Starlight
    - id: BoxBottle
    - id: BoxVial
    - id: PlasmaChemistryVial
    - id: ClothingEyesGlassesChemical
    - id: ChemBag
    - id: Dropper
    - id: HandLabeler
    - id: BarSpoon # Should be replaced by a stirring tool with medical theming, like a glass rod
    - id: PlasmaChemistryVial
    - !type:AllSelector # The wonderful world of chemical storage
      children:
      - id: BoxSyringe
      - id: BoxBottle
      - id: BoxVial
      - id: BoxBeaker
      - id: BoxPillCanister
      - !type:GroupSelector # Remind chemists once in a while of alternate storage options
        prob: 0.2
        children:
        - id: SprayBottle
        - id: Bucket
        - id: DrinkCartonMilk
    - id: PlushieLizardJobChemist
      prob: 0.02

- type: entity
  parent: LockerChemistry
  id: LockerChemistryFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillChemistry

- type: entityTable
  id: LockerFillParamedic
  table: !type:AllSelector
    children:
    - id: ClothingOuterHardsuitVoidParamed # Far Horizons - upstream removed
    - id: ClothingOuterCoatParamedicWB # Far Horizons - upstream removed
    - id: ClothingHeadHatParamedicsoft # Far Horizons - upstream removed
    - id: ClothingOuterWinterPara # Far Horizons - upstream removed
    - id: ClothingUniformJumpsuitParamedic # Far Horizons - upstream removed
    - id: ClothingUniformJumpskirtParamedic # Far Horizons - upstream removed
    - id: ClothingEyesHudMedical
    - id: ClothingHandsGlovesLatex
    - id: ClothingHeadsetMedical
    - id: ClothingMaskSterile
    - id: HandheldGPSBasic
    - id: MedkitFilled
      prob: 0.3
    - id: PlushieKiosha #starlight
    - id: EmergencyHandheldCrewMonitor #starlight
    - id: JetInjector
    - id: HandheldHealthAnalyzer
    - id: BoxBodyBag
    - !type:GroupSelector
      children:
      - id: RollerBedSpawnFolded
      - id: CheapRollerBedSpawnFolded
      - id: EmergencyRollerBedSpawnFolded
    - id: PlushieLizardJobParamedic
