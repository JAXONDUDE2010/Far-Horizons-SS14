# Medical supply lockers

- type: entityTable
  id: LockerFillMedicine
  table: !type:AllSelector
    children:
    - id: BoxSyringe
    - id: ChemistryBottleEpinephrine
    - id: Brutepack
      amount: !type:ConstantNumberSelector
        value: 2
    - id: Ointment
      amount: !type:ConstantNumberSelector
        value: 2
    - id: Bloodpack
      amount: !type:ConstantNumberSelector
        value: 2
    - id: AmmoniaPack #Far Horizons
      amount: !type:ConstantNumberSelector
        value: 2
    - id: Gauze

- type: entity
  parent: LockerMedicine
  id: LockerMedicineFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillMedicine

- type: entity
  parent: LockerWallMedical
  id: LockerWallMedicalFilled
  name: medicine wall locker
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillMedicine

# Medical role lockers

- type: entityTable
  id: LockerFillMedicalDoctor
  table: !type:AllSelector
    children:
    - id: ClothingEyesHudMedical
    - id: ClothingBeltMedicalFilled
    - id: JetInjector
    - id: HandheldHealthAnalyzer
    - id: ChemistryBottleLaughter # Widely recognized as the best medicine :o)
      prob: 0.01
    - id: PlushieLizardJobMedicaldoctor
      prob: 0.02
    - id: PlushieLizardJobMedicalintern
      prob: 0.02
    - id: PlushieLizardJobPsychologist
      prob: 0.02

- type: entity
  parent: LockerMedical
  id: LockerMedicalFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
