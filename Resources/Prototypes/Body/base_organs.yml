- type: entity
  parent: [ DamageableLimbBase, OrganBase]
  id: OrganBaseHeadNonVitalNonEdible #Far Horizons
  name: Head 
  abstract: true
  components:
  - type: Organ
    category: Head
  - type: Sprite
    state: head
  - type: VisualOrgan
    layer: enum.HumanoidVisualLayers.Head
    data:
      state: head
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    markingData:
      layers:
      - Head
      - Hair
      - FacialHair
      - Snout
      - SnoutCover
      - HeadSide
      - HeadTop
      - FaceCover 
      - FaceCoverCover 
  - type: HeadOrgan
  - type: OrganWithInventorySlots
    slots:
      - head
      - mask
      - ears
  - type: DamageableLimb
    bodyDamageFactor: 0.4 # Non vital variant is used for diona and slime, same 40% as legs/arms
    missChance: 0 # Still 0
    redirectChance: 0.4 # 40% chance to hit torso
    scatterHitChance: 0 # Disable chance to miss head without aiming
    aimedTowardsScatterHitChance: 0
  - type: LimbDamageEffect
    effects:
      - effect: !type:LimbEffectDetach
        condition: !type:LimbConditionSpecificDamage
          damageType: Slash
          damageAmount: 150 # Since taking someone's head off = killing, it shouldn't be faster to do that
      - effect: !type:LimbEffectDestroy
        condition: !type:LimbConditionOr
          conditions:
            - !type:LimbConditionSpecificDamage
              damageType: Blunt
              damageAmount: 250 # Gib lite
            - !type:LimbConditionSpecificDamage
              damageType: Heat
              damageAmount: 1500 # Just in case there's laser gatling I don't know of in maints locker
  - type: LimbDamageVisuals
    layer: "enum.HumanoidVisualLayers.Head"

