- type: markingsGroup
  id: None
  onlyGroupWhitelisted: true

- type: markingsGroup
  id: Undergarments
  limits:
    enum.HumanoidVisualLayers.UndergarmentTop:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentTopTanktop ]
    enum.HumanoidVisualLayers.UndergarmentBottom:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentBottomBoxers ]

- type: entity
  id: OrganBase
  name: organ
  abstract: true
  parent: BaseItem
  components:
  - type: Organ
  # Far Horizons start
  - type: Edible
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20
    grindableSolutionName: food
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: FlavorProfile
    flavors:
      - people
  # Far Horizons end

- type: entity
  parent: OrganBase
  id: OrganBaseTorso
  name: Torso #FarHorizons Capitalization
  abstract: true
  components:
  - type: Organ
    category: Torso
  - type: Sprite
    state: torso
  - type: VisualOrgan
    layer: enum.HumanoidVisualLayers.Chest
    data:
      state: torso
    scaleSource: true # Far Horizons - This is body part that scales the entire sprite
  - type: VisualOrganMarkings
    markingData:
      layers:
      - Chest
      - Tail
      - Overlay
      - UndergarmentTop
      - UndergarmentBottom
      - Special
      - BodyCover # Far Horizons
      - BodyCoverCover # Far Horizons
      - TailCover # Far Horizons

#FarHorizons Start
