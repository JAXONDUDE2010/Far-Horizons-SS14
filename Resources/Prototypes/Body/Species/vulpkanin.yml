- type: markingsGroup
  parent: Undergarments
  id: Vulpkanin
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      onlyGroupWhitelisted: true
      required: false
    enum.HumanoidVisualLayers.Head:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ VulpEar ]
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: true
      default: [ VulpSnout ]
    enum.HumanoidVisualLayers.SnoutCover:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ VulpTailVulp ]
    enum.HumanoidVisualLayers.LArm:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.UndergarmentTop:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentTopTanktopVulpkanin ]
    enum.HumanoidVisualLayers.UndergarmentBottom:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentBottomBoxersVulpkanin ]

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceVulpkanin
  name: vulpkanin appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganVulpkaninTorso
      Head: OrganVulpkaninHead
      ArmLeft: OrganVulpkaninArmLeft
      ArmRight: OrganVulpkaninArmRight
      HandRight: OrganVulpkaninHandRight
      HandLeft: OrganVulpkaninHandLeft
      LegLeft: OrganVulpkaninLegLeft
      LegRight: OrganVulpkaninLegRight
      FootLeft: OrganVulpkaninFootLeft
      FootRight: OrganVulpkaninFootRight
      Brain: OrganVulpkaninBrain
      Eyes: OrganVulpkaninEyes
      Tongue: OrganVulpkaninTongue
      Appendix: OrganVulpkaninAppendix
      Ears: OrganVulpkaninEars
      Lungs: OrganVulpkaninLungs
      Heart: OrganVulpkaninHeart
      Stomach: OrganVulpkaninStomach
      Liver: OrganVulpkaninLiver
      Kidneys: OrganVulpkaninKidneys
  - type: HumanoidProfile
    species: Vulpkanin
  - type: Inventory
    speciesId: vulpkanin
    displacements:
      head:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Vulpkanin/displacement.rsi
            state: head
      outerClothing:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Vulpkanin/displacement.rsi
            state: outerClothing
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Vulpkanin/displacement.rsi
            state: jumpsuit
      shoes: # DM only for colored shoes!
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Vulpkanin/displacement.rsi
            state: shoes

- type: entity
  parent:
  - AppearanceVulpkanin
  - BaseSpeciesMobOrganic
  id: MobVulpkanin
  name: Urist McArfArf
  components:
  #Starlight
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Canilunzt
    understands:
    - GalacticCommon
    - Canilunzt
    - Fox # "vaguely canidae"
    - Dog # "vaguely canidae"
  - type: Absorbable
  #Starlight
#  - type: MessyDrinker #Far Horizons
#    spillChance: 0.33 #Far Horizons
  - type: Speech
    speechSounds: Vulpkanin
    speechVerb: Vulpkanin
    allowedEmotes: [ 'Bark', 'Snarl', 'Whine', 'Howl', 'Growl', 'Yip' ] # Far Horizons
  - type: Vocal
    sounds:
      Male: MaleVulpkanin
      Female: FemaleVulpkanin
      Unsexed: MaleVulpkanin
  - type: Damageable
    damageModifierSet: Vulpkanin
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2
        Slash: 3
  # - type: Temperature # Same as moth temperatures until below is solved.
  #   specificHeat: 44
  # - type: TemperatureDamage
  #   heatDamageThreshold: 320 # TODO: 315 when there is a way to make the temperature alert not blink to the side of the screen and disappear when you "sweat" at 39C.
  #   coldDamageThreshold: 230 # TODO: 220 when the above is solved.
  #   coldDamage:
  #     types:
  #       Cold: 0.05 # Per second, scales with temperature & other constants
  #   heatDamage:
  #     types:
  #       Heat: 2.5 # Per second, scales with temperature & other constants
  # - type: Wagging TODO: Add back once we have animated tails again. Were removed due to the sprite rework, causing all of them to not fit anymore.
  #   action: ActionToggleWaggingVulpkanin
  - type: Wagging # Far Horizons
  - type: TemperatureProtection
    heatingCoefficient: 1.2
    coolingCoefficient: 0.3
  # - type: JumpAbility
  #   action: ActionVulpkaninGravityJump
  #   canCollide: true
  #   jumpDistance: 3
  #   jumpSound:
  #     path: /Audio/Weapons/punchmiss.ogg
  #     params:
  #       pitch: 1.33
  #       volume: -5
  #       variation: 0.05
  # starlight start - temp vulpkanin revert
  - type: Hunger # on 1.5x more
    thresholds:
      Overfed: 250
      Okay: 200
      Peckish: 150
      Starving: 100
      Dead: 0
    baseDecayRate: 0.018 #Far Horizons
  - type: Thirst # on 1.5x more
    thresholds:
      OverHydrated: 650
      Okay: 500
      Thirsty: 350
      Parched: 200
      Dead: 0
    baseDecayRate: 0.125
  - type: TemperatureDamage
    heatDamageThreshold: 325
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold : 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1.75 #per second, scales with temperature & other constants
  - type: Temperature # Ported over from CD. Afterall, it does make sense that something with fur can handle more cold/less heat. Basegame Moths, apparently, have similar resistances.
    currentTemperature: 310.15
    specificHeat: 46
  - type: ContentEye
    targetZoom: "1.125, 1.125"
    maxZoom: "1.125, 1.125"
  # starlight end
  - type: Tag  # Far Horizons
    tags:
      - CanPilot
      - FootstepSound
      - DoorBumpOpener
      - AnomalyHost
      - Vulpkanin
  - type: VisionOrganRequiredForVision # Far Horizons

