- type: markingsGroup
  parent: Undergarments
  id: Slime
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false
  appearances:
    enum.HumanoidVisualLayers.Hair:
      layerAlpha: 0.72
      matchSkin: true
    enum.HumanoidVisualLayers.FacialHair:
      layerAlpha: 0.72
      matchSkin: true

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceSlimePerson
  name: SlimePerson appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganSlimePersonTorso
      Head: OrganSlimePersonHead
      ArmLeft: OrganSlimePersonArmLeft
      ArmRight: OrganSlimePersonArmRight
      HandRight: OrganSlimePersonHandRight
      HandLeft: OrganSlimePersonHandLeft
      LegLeft: OrganSlimePersonLegLeft
      LegRight: OrganSlimePersonLegRight
      FootLeft: OrganSlimePersonFootLeft
      FootRight: OrganSlimePersonFootRight
      SentientCore: OrganSlimePersonCore #FH
      Lungs: OrganSlimePersonLungs
  - type: HumanoidProfile
    species: SlimePerson

- type: entity
  parent:
  - AppearanceSlimePerson
  - BaseSpeciesMobOrganic
  - BaseSpeciesPickupableLarge #FH
  - OrganSlimePersonMetabolizer #FH
  - SlimeMetabolizer #FH
  id: MobSlimePerson
  name: Urist McWobble
  components:
  # Starlight-start: Languages
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Bubblish
    understands:
    - GalacticCommon
    - Bubblish
  - type: Absorbable
  # Starlight-end
  - type: Storage
    clickInsert: false
     # Starlight-start
    showVerb: false
    openOnActivate: false
    # Starlight-end
    grid:
    - 0,0,1,2
    maxItemSize: Large
    storageInsertSound:
      path: /Audio/Voice/Slime/slime_squish.ogg
  # Starlight Edit - Start
  - type: PrivateStorage
    accessDelay: 3.0
    accessPopup: "laspi-storage-accessing"
    # Starlight Edit - End
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
      enum.SurgeryUIKey.Key:
        type: SurgeryBui
      enum.VampireMutationUiKey.Key:
        type: VampireMutationBoundUserInterface
  - type: UseDelay
    delay: 0.5
  - type: Speech
    speechVerb: Slime
    speechSounds: Slime
    allowedEmotes: ['Squish', 'Bubble', 'Pop'] # Starlight
  - type: TypingIndicator
    proto: slime
  - type: Vocal
    sounds:
      Male: MaleSlime
      Female: FemaleSlime
      Unsexed: MaleSlime
  - type: Damageable
    damageModifierSet: Slime
  - type: PassiveDamage # Around 8 damage a minute healed
    allowedStates:
    - Alive
    damageCap: 65
    damage:
      types:
        Heat: -0.14
        Blunt: -0.05
        Piercing: -0.05
        Slash: -0.05
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#2cf274"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Bloodstream
    bloodReferenceSolution: # TODO Color slime blood based on their slime color or smth
      reagents:
      - ReagentId: Slime
        Quantity: 300
  - type: Barotrauma
    damage:
      types:
        Blunt: 1 #per second, scales with pressure and other constants.
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
      Acidic: [Touch, Ingestion] #Far Horizons
    reactions:
    - reagents: [ Water, SpaceCleaner ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPie
    - reagents: [ Water ]
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        damage:
          types:
            Heat: 0.05
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "slime-hurt-by-water-popup" ]
        probability: 0.25
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatSlime
      amount: 5
  - type: Respirator
    damage:
      types:
        Asphyxiation: 0.2
    damageRecovery:
      types:
        Asphyxiation: -1.0
    maxSaturation: 15
  - type: ShowThirstIcons # starlight
  - type: SolutionScanner # starlight
  - type: Wagging # starlight
  # FarHorizons Start
  - type: Tag  
    tags:
      - CanPilot
      - FootstepSound
      - DoorBumpOpener
      - AnomalyHost
      - SlimePerson
  - type: ReattacheableLimbs #FarHorizons

- type: entity
  id: SlimeMetabolizer
  abstract: true
  save: false
  components:
  - type: Stomach
  - type: Metabolizer
    maxReagents: 6
    metabolizerTypes: [ Slime ]
    stages: [ Digestion, Bloodstream, Metabolites ]
    solutions:
      Respiration:
        solutionName: Lung
        transferSolutionName: bloodstream
        metabolizeAll: true
      Digestion:
        solutionName: stomach
        solutionOnBody: false
        transferSolutionName: bloodstream
        transferSolutionOnBody: false
        transferEfficacy: 0.5
      Bloodstream:
        solutionName: bloodstream
        solutionOnBody: false
        transferSolutionName: metabolites
        transferSolutionOnBody: false
      Metabolites:
        solutionName: metabolites
        solutionOnBody: false
  - type: SolutionContainerManager
    solutions:
      food: {}
      stomach:
        maxVol: 50
  # FarHorizons End

- type: entity
  parent: OrganBase
  id: OrganSlimePerson
  abstract: true
  suffix: slime person
  components:
  - type: ReattacheableLimb #FarHorizons
