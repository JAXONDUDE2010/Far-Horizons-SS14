- type: entity # starlight start
  parent: OrganHumanBrain
  id: OrganVoxBrain
  name: vox cortical stack
  description: "A cortical stack from a vox, time to find a new sleeve."
  components:
  - type: BorgBrain
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
    layers:
      - state: brain
      - state: brain-unshaded
        shader: unshaded
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - ReagentId: Silicon
          Quantity: 10
      food:
        maxVol: 20
        reagents:
        - ReagentId: Licoxide
          Quantity: 20
  - type: FlavorProfile
    flavors:
      - metallic # starlight end

- type: entity
  id: OrganVoxLungs
  parent: OrganHumanLungs
  description: "The blue, anaerobic lungs of a vox, they intake nitrogen to breathe. Any form of gaseous oxygen is lethally toxic if breathed in. Can hold up to 10L of gas."
  suffix: "vox"
  components:
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
  - type: Metabolizer
    metabolizerTypes: [ Vox ]
  - type: Lung
    alert: LowNitrogen
    #Starlight start - Make vox lungs work as a gas tank
  - type: Item
    size: Normal # Increased due to it becoming a gas tank, needs to be rebalanced for that
    heldPrefix: lungs
    shape:
    - 0,0,3,3
  - type: BreathMask
  - type: OrganBreathTool
    startActivated: true
  - type: GasTank
    air:
      volume: 10
      moles:
        Nitrogen: 4.1027581 # Prefill with 10L of nitrogen
      temperature: 293.15
    outputPressure: 21.3
  - type: OrganGasTankFillable
    targetPressure: 1000.0 # 1MPa of pressure target on refill
  - type: UseDelay
    delays:
      gasTank:
        length: 1.0
  - type: ActivatableUI
    key: enum.SharedGasTankUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SharedGasTankUiKey.Key:
        type: GasTankBoundUserInterface
      enum.SharedGasTankUiKey.OrganKey:
        type: BreathableOrganBoundUserInterface
  - type: Tag
    tags:
    - GasTank
    #Starlight end

- type: entity
  parent: OrganHumanStomach
  id: OrganVoxStomach
  name: stomach
  description: "A stomach that smells of ammonia."
  components:
  - type: Metabolizer #Skreeeee!
    metabolizerTypes: [Vox]
  - type: Stomach
#Bird vs tags
    specialDigestible:
      tags:
      - Trash
    isSpecialDigestibleExclusive: false
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi

- type: entity
  parent: OrganHumanLiver
  id: OrganVoxLiver
  name: liver
  description: "Smells flammable."
  components:
  - type: Metabolizer
    metabolizerTypes: [Vox]
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
  # Starlight start
  - type: OrganDamage 
    damage:
      types:
        Poison: 280
        Cellular: 40
        Bloodloss: 40
        Caustic: 40
        Radiation: 60
  # Starlight end

