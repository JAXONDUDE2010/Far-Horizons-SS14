name: Test

on:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ Far-Horizons ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.slnx'
      - '**.yml'
      - '**.yaml'

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:  
  yaml-lint:
    if: "!contains(github.event.pull_request.labels.*.name, 'automated pr') && github.actor != 'github-actions[bot]' && github.event.pull_request.draft == false"
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - run: dotnet run --no-build -c DebugOpt --project Content.YAMLLinter/Content.YAMLLinter.csproj
  
  unit-tests:
    if: "!contains(github.event.pull_request.labels.*.name, 'automated pr') && github.actor != 'github-actions[bot]' && github.event.pull_request.draft == false"
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - run: dotnet test --no-build -c DebugOpt Content.Tests/Content.Tests.csproj --settings .farhorizons/.integrationtests
  
  integration-tests:
    if: "!contains(github.event.pull_request.labels.*.name, 'automated pr') && github.actor != 'github-actions[bot]' && github.event.pull_request.draft == false"
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - run: |
          SWAP_PATH="/tmp/runner-swap"
          sudo swapoff $SWAP_PATH || true

          sudo fallocate -l 4G $SWAP_PATH
          sudo chmod 600 $SWAP_PATH
          sudo mkswap $SWAP_PATH
          sudo swapon $SWAP_PATH
      - uses: ./.github/actions/setup-test-env
      - run: dotnet test --no-build -c DebugOpt Content.IntegrationTests/Content.IntegrationTests.csproj --settings .farhorizons/.integrationtests --logger "trx;LogFileName=results.trx"
        env:
          DOTNET_gcServer: "1"
      - if: (!cancelled())
        uses: actions/upload-artifact@v6
        with:
          name: Event File
          path: ${{ github.event_path }}
      - if: (!cancelled())
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-results
          path: "**/results.trx"
          retention-days: 1
  
  build-release:
    if: "!contains(github.event.pull_request.labels.*.name, 'automated pr') && github.actor != 'github-actions[bot]' && github.event.pull_request.draft == false"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: git submodule update --init --recursive
        shell: bash
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - shell: bash
        run: |
          dotnet restore
          dotnet build -c Release --no-restore /m