name: Backfill Changelog

on:
  workflow_dispatch:
    inputs:
      commits_count:
        description: 'Number of recent commits to check'
        required: false
        default: '10'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  backfill-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch full history

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install pyyaml PyGithub

      - name: Find Missing Changelog PRs
        id: find_prs
        env:
          CHANGELOG_FILE_PATH: 'Resources/Changelog/ChangelogFarHorizons.yml'
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMITS_COUNT: ${{ inputs.commits_count }}
        run: |
          python ./Tools/_Starlight/backfill_changelog.py

      - name: Process Missing PRs
        if: steps.find_prs.outputs.missing_prs != '[]'
        env:
          CHANGELOG_FILE_PATH: 'Resources/Changelog/ChangelogFarHorizons.yml'
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          missing_prs='${{ steps.find_prs.outputs.missing_prs }}'
          echo "Processing PRs: $missing_prs"
          
          # Parse JSON array and process each PR
          echo "$missing_prs" | jq -r '.[]' | while read pr_number; do
            echo "Processing PR #$pr_number"
            export PR_NUMBER=$pr_number
            python ./Tools/_Starlight/update_changelog.py
            if [ $? -eq 0 ]; then
              echo "Successfully processed PR #$pr_number"
            else
              echo "Failed to process PR #$pr_number"
            fi
          done

      - name: Display changelog after backfill
        run: |
          if [ -f "Resources/Changelog/ChangelogFarHorizons.yml" ]; then
            echo "=== Changelog updated ==="
            git diff --name-only
          else
            echo "Changelog file not found"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: Backfill changelog [skip ci]
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          signoff: false
          branch: patch-changelog-backfill
          delete-branch: true
          title: '[CI] Update patchnotes for ${{ steps.get_pr.outputs.PR_NUMBER }}'
          body: |
            Automated PR to populate patchnotes
          labels: |
            automated pr
