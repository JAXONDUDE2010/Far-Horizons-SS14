name: Update Changelog

on:
  push:
    branches:
      - Far-Horizons
      
permissions:
  contents: write
  pull-requests: write
  actions: read

env:
 BRANCH_NAME: ${{ github.ref_name	}} 

jobs:
  wait-for-que:
    if: github.actor != 'github-actions[bot] && !contains(github.event.head_commit.message, 'ci-branch/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"

      - name: Install Dependencies
        run: |
          pip install PyGithub

      - name: Wait for Que to finish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_NUMBER: ${{ github.run_number }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          python ./Tools/_Starlight/wait_for_actions.py
          echo "Script exited with code $?"

  update-changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: wait-for-que
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get Pull Request Number
        id: get_pr
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MESSAGE"
          PR_NUMBER=$(echo "$COMMIT_MESSAGE" | grep -oP '(?<=Merge pull request #)\d+' || true)
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number found in commit message. Skipping changelog update."
            echo "::set-output name=PR_NUMBER::"
            exit 0
          fi
          echo "PR Number: $PR_NUMBER"
          echo "::set-output name=PR_NUMBER::$PR_NUMBER"
        
      #re checkout
      - name: Re-checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
          
      - name: Set up Python
        if: steps.get_pr.outputs.PR_NUMBER != ''
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install Dependencies
        if: steps.get_pr.outputs.PR_NUMBER != ''
        run: |
          pip install pyyaml PyGithub
    
      - name: Parse PR and Update Changelog
        if: steps.get_pr.outputs.PR_NUMBER != ''
        env:
          CHANGELOG_FILE_PATH: 'Resources/Changelog/ChangelogFarHorizons.yml'
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get_pr.outputs.PR_NUMBER }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ./Tools/_Starlight/update_changelog.py
          echo "Script exited with code $?"

      - name: Display changelog after update
        if: steps.get_pr.outputs.PR_NUMBER != ''
        run: |
          tail -n 100 "Resources/Changelog/ChangelogFarHorizons.yml"

      - name: Git status before commit
        if: steps.get_pr.outputs.PR_NUMBER != ''
        run: |
          git status
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: Update changelog for PR/${{ steps.get_pr.outputs.PR_NUMBER }} [skip ci]
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          signoff: false
          branch: ci-branch/patch-changelog-${{ steps.get_pr.outputs.PR_NUMBER }}
          delete-branch: true
          title: '[CI] Update patchnotes for ${{ steps.get_pr.outputs.PR_NUMBER }}'
          body: |
            Automated PR to populate patchnotes
          labels: |
            automated pr
          
