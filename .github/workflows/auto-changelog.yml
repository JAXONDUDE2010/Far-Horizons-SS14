name: Update Changelog

on:
  pull_request_target:
    types: [closed]
    branches: [Far-Horizons]
      
permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    if: github.event.pull_request.merged == true && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: Far-Horizons
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install pyyaml PyGithub
    
      - name: Parse PR and Update Changelog
        env:
          CHANGELOG_FILE_PATH: 'Resources/Changelog/ChangelogFarHorizons.yml'
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ./Tools/_FarHorizons/update_changelog.py
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "Update changelog for PR #${{ github.event.pull_request.number }} [skip ci]"
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: ci/patch-changelog-${{ github.event.pull_request.number }}
          delete-branch: true
          title: '[CI] Update patchnotes for #${{ github.event.pull_request.number }}'
          body: |
            Automated update to `ChangelogFarHorizons.yml` after merging PR #${{ github.event.pull_request.number }}.
          labels: |
            automated pr